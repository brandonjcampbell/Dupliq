<!DOCTYPE html>
<html lang="en">

<title>Tuo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c12; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0c12; }
  ::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
  textarea::-webkit-scrollbar-thumb { background: #2a2f3a; }
  div[style*="overflow"]::-webkit-scrollbar { width: 6px; height: 6px; }
  div[style*="overflow"]::-webkit-scrollbar-track { background: #0e1018; border-radius: 3px; }
  div[style*="overflow"]::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
  div[style*="overflow"]::-webkit-scrollbar-thumb:hover { background: #3a4050; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

// ═══════════════════════════════════════════════════════════════
// NLP UTILITIES
// ═══════════════════════════════════════════════════════════════

function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s'-]/g, " ").split(/\s+/).filter(t => t.length > 1);
}

const STOP_WORDS = new Set([
  "the","be","to","of","and","a","in","that","have","i","it","for","not","on",
  "with","he","as","you","do","at","this","but","his","by","from","they","we",
  "say","her","she","or","an","will","my","one","all","would","there","their",
  "what","so","up","out","if","about","who","get","which","go","me","when",
  "make","can","like","time","no","just","him","know","take","people","into",
  "year","your","good","some","could","them","see","other","than","then","now",
  "look","only","come","its","over","think","also","back","after","use","two",
  "how","our","work","first","well","way","even","new","want","because","any",
  "these","give","day","most","us","is","was","are","were","been","has","had",
  "did","does","am","being","more","very","much","such","own","same","should",
]);

function removeStopWords(tokens) { return tokens.filter(t => !STOP_WORDS.has(t)); }

function splitSentences(text) {
  const raw = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
  return raw.map(s => s.trim()).filter(s => s.length > 0);
}

// ═══════════════════════════════════════════════════════════════
// CSV-AWARE CHUNKING
// ═══════════════════════════════════════════════════════════════

function parseCSVLines(text) {
  // Splits text into logical CSV rows, respecting quoted fields
  // that may contain newlines, commas, and escaped quotes ("")
  const rows = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && i + 1 < text.length && text[i + 1] === '"') { current += '""'; i++; }
      else { inQuotes = !inQuotes; current += ch; }
    } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
      if (ch === "\r" && i + 1 < text.length && text[i + 1] === "\n") i++;
      if (current.trim().length > 0) rows.push(current);
      current = "";
    } else { current += ch; }
  }
  if (current.trim().length > 0) rows.push(current);
  return rows;
}

function parseCSVCells(row, delim) {
  // Splits a single logical CSV row into cells, respecting quotes
  const cells = [];
  let current = "", inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') {
      if (inQ && i + 1 < row.length && row[i + 1] === '"') { current += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === delim && !inQ) {
      cells.push(current); current = "";
    } else { current += ch; }
  }
  cells.push(current);
  return cells;
}

function detectDelimiter(headerRow) {
  // Count unquoted commas vs tabs to determine delimiter
  let commas = 0, tabs = 0, inQ = false;
  for (let i = 0; i < headerRow.length; i++) {
    const ch = headerRow[i];
    if (ch === '"') inQ = !inQ;
    else if (!inQ) {
      if (ch === ',') commas++;
      if (ch === '\t') tabs++;
    }
  }
  return tabs > commas ? "\t" : ",";
}

function isCSV(text) {
  // Use quote-aware row parser for detection
  const rows = parseCSVLines(text);
  if (rows.length < 3) return false;
  const delim = detectDelimiter(rows[0]);
  const headerCols = parseCSVCells(rows[0], delim).length;
  if (headerCols < 2) return false;
  let consistent = 0;
  for (let i = 1; i < Math.min(rows.length, 8); i++) {
    const cols = parseCSVCells(rows[i], delim).length;
    if (Math.abs(cols - headerCols) <= 1) consistent++;
  }
  return consistent >= Math.min(rows.length - 1, 4);
}

function chunkCSV(text, targetTokens) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return [text];

  const header = rows[0];
  const headerTok = tokenize(header).length;
  const dataRows = rows.slice(1);
  const chunks = [];
  let curRows = [];
  let curTok = headerTok; // header always counted toward budget

  for (const row of dataRows) {
    const rowTok = tokenize(row).length;

    // Would adding this row exceed the budget?
    if (curTok + rowTok > targetTokens && curRows.length > 0) {
      // Flush current batch: header + accumulated rows = valid CSV
      chunks.push(header + "\n" + curRows.join("\n"));
      curRows = [];
      curTok = headerTok;
    }

    // Append the whole row (never split mid-row)
    curRows.push(row);
    curTok += rowTok;
  }

  // Flush remaining rows
  if (curRows.length > 0) {
    chunks.push(header + "\n" + curRows.join("\n"));
  }

  return chunks.length > 0 ? chunks : [text];
}

function chunkText(text, targetTokens, overlap) {
  const sentences = splitSentences(text);
  const chunks = [];
  let current = [], currentLen = 0;
  for (const sentence of sentences) {
    const stk = tokenize(sentence).length;
    if (currentLen + stk > targetTokens && current.length > 0) {
      chunks.push(current.join(" "));
      let oLen = 0, oStart = current.length;
      for (let i = current.length - 1; i >= 0; i--) {
        oLen += tokenize(current[i]).length;
        if (oLen >= overlap) { oStart = i; break; }
      }
      current = current.slice(oStart);
      currentLen = current.reduce((a, s) => a + tokenize(s).length, 0);
    }
    current.push(sentence); currentLen += stk;
  }
  if (current.length > 0) chunks.push(current.join(" "));
  return chunks;
}

function chunkDocument(text, mode = "512", macroSize = 2048) {
  if (mode === "row" || mode === "paragraph") {
    return isCSV(text) ? chunkByRow(text) : chunkByParagraph(text);
  }
  if (mode === "macro") {
    const overlap = Math.floor(macroSize * 0.06);
    return isCSV(text) ? chunkCSV(text, macroSize) : chunkText(text, macroSize, overlap);
  }
  const targetTokens = parseInt(mode, 10) || 512;
  const overlap = Math.floor(targetTokens * 0.12);
  return isCSV(text) ? chunkCSV(text, targetTokens) : chunkText(text, targetTokens, overlap);
}

function subChunk(text, mode) {
  if (mode === "row") {
    return isCSV(text) ? chunkByRow(text) : chunkByParagraph(text);
  }
  var targetTokens = parseInt(mode, 10) || 256;
  if (isCSV(text)) return chunkCSV(text, targetTokens);

  // For text: try token-based split first
  var tokenResult = chunkText(text, targetTokens, Math.floor(targetTokens * 0.1));
  if (tokenResult.length >= 3) return tokenResult;

  // If token split is too coarse, try paragraphs
  var paraResult = chunkByParagraph(text);
  if (paraResult.length >= 2) return paraResult;

  // If no paragraph breaks, split by sentences
  var sentences = splitSentences(text);
  if (sentences.length >= 2) return sentences;

  // Absolute fallback: return as-is
  return [text];
}

// One chunk per CSV row (header prepended to each)
function chunkByRow(text) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return [text];
  const header = rows[0];
  return rows.slice(1).map(r => header + "\n" + r);
}

// One chunk per paragraph (split on blank lines / double newlines)
function chunkByParagraph(text) {
  const paras = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
  if (paras.length === 0) return [text];
  return paras;
}

// Single-line paragraph split for text that uses single newlines as structure
function chunkByLine(text) {
  const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return [text];
  return lines;
}

// ═══════════════════════════════════════════════════════════════
// TF-IDF + COSINE SIMILARITY
// ═══════════════════════════════════════════════════════════════

function buildVocabulary(allChunks) {
  const df = {}, N = allChunks.length;
  allChunks.forEach(chunk => {
    new Set(removeStopWords(tokenize(chunk))).forEach(t => { df[t] = (df[t] || 0) + 1; });
  });
  const vocab = Object.keys(df).filter(t => df[t] > 1 && df[t] < N * 0.85);
  const idf = {};
  vocab.forEach(t => { idf[t] = Math.log(N / df[t]) + 1; });
  return { vocab, idf };
}

function tfidfVector(chunk, vocab, idf) {
  const tokens = removeStopWords(tokenize(chunk));
  const tf = {};
  tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
  const maxTf = Math.max(...Object.values(tf), 1);
  const vec = new Float64Array(vocab.length);
  vocab.forEach((t, i) => { if (tf[t]) vec[i] = (0.5 + 0.5 * tf[t] / maxTf) * (idf[t] || 0); });
  return vec;
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  const d = Math.sqrt(na) * Math.sqrt(nb);
  return d === 0 ? 0 : dot / d;
}

function computeSimilarityMatrix(chunksA, chunksB) {
  const all = [...chunksA, ...chunksB];
  const { vocab, idf } = buildVocabulary(all);
  const vA = chunksA.map(c => tfidfVector(c, vocab, idf));
  const vB = chunksB.map(c => tfidfVector(c, vocab, idf));
  const matrix = vA.map(a => vB.map(b => cosineSimilarity(a, b)));
  return { matrix, vocab, idf };
}

// ═══════════════════════════════════════════════════════════════
// OLLAMA INTEGRATION
// ═══════════════════════════════════════════════════════════════

const DEFAULT_PROMPT_TEMPLATE = "You are a document analyst. Two text segments from different documents have a {{SCORE}}% lexical similarity score.\n\nSEGMENT A:\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B:\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nProvide a concise analysis (3-5 sentences) covering:\n1. What specific topics, concepts, or claims these segments share\n2. How they differ in perspective, scope, or detail\n3. The nature of their relationship (e.g., redundant, complementary, contradictory, one elaborates the other)\n\nBe direct and specific. No preamble.";

async function queryOllama(baseUrl, model, chunkA, chunkB, score, signal, promptTemplate) {
  const tmpl = promptTemplate || DEFAULT_PROMPT_TEMPLATE;
  const prompt = tmpl
    .replace(/\{\{SCORE\}\}/g, (score * 100).toFixed(1))
    .replace(/\{\{CHUNK_A\}\}/g, chunkA.slice(0, 1200))
    .replace(/\{\{CHUNK_B\}\}/g, chunkB.slice(0, 1200))
    .replace(/\{\{SCORE_RAW\}\}/g, score.toFixed(4));

  const resp = await fetch(baseUrl + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    signal,
    body: JSON.stringify({ model, prompt, stream: false, options: { temperature: 0.3, num_predict: 300 } }),
  });
  if (!resp.ok) throw new Error("Ollama " + resp.status);
  const data = await resp.json();
  return data.response || data.message?.content || "(no response)";
}

// ═══════════════════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════════════════

function escapeCSV(str) {
  if (!str) return '""';
  return '"' + String(str).replace(/\r?\n/g, " ").replace(/"/g, '""') + '"';
}

function exportCSV(results, interpretations) {
  const rows = ["Rank,Chunk_A,Chunk_B,Similarity_Pct,Chunk_A_Text,Chunk_B_Text,LLM_Interpretation"];
  results.pairs.slice(0, 50).forEach((m, idx) => {
    rows.push([idx+1, "A"+(m.i+1), "B"+(m.j+1), (m.score*100).toFixed(2),
      escapeCSV(results.chunksA[m.i].slice(0,2000)),
      escapeCSV(results.chunksB[m.j].slice(0,2000)),
      escapeCSV(interpretations[m.i+"-"+m.j] || ""),
    ].join(","));
  });
  const blob = new Blob(["\uFEFF" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tuo_report_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
}

// ═══════════════════════════════════════════════════════════════
// HTML REPORT EXPORT (string concat — no template literals that
// could break the outer Babel block)
// ═══════════════════════════════════════════════════════════════

function exportHTML(results, interpretations) {
  var D = new Date().toISOString().slice(0, 10);
  var allPairs = results.pairs;
  var hi = allPairs.filter(function(p) { return p.score >= 0.5; });
  var nInterp = allPairs.filter(function(p) { return !!interpretations[p.i + "-" + p.j]; }).length;
  var totalInterp = allPairs.length;
  var nA = results.chunksA.length, nB = results.chunksB.length;
  var mat = results.matrix;

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function barCol(v) { return v >= 0.8 ? "#f0c040" : v >= 0.65 ? "#f59e42" : "#818cf8"; }

  function simColorS(val) {
    if (val < 0.05) return "rgba(20,24,32,0.95)";
    var r = Math.round(255 * Math.min(1, val * 2.2));
    var g = Math.round(180 * Math.min(1, val * 1.1));
    var b = Math.round(60 + 60 * (1 - val));
    return "rgba("+r+","+g+","+b+","+(0.3+val*0.7)+")";
  }

  function relTag(interp) {
    if (!interp) return "";
    var lw = interp.toLowerCase(), tg = [];
    if (lw.indexOf("redundant") >= 0 || lw.indexOf("overlap") >= 0) tg.push("Redundant|#f8717118|#f87171");
    if (lw.indexOf("complementary") >= 0) tg.push("Complementary|#34d39918|#34d399");
    if (lw.indexOf("contradict") >= 0) tg.push("Contradictory|#fb923c18|#fb923c");
    if (lw.indexOf("elaborat") >= 0) tg.push("Elaboration|#60a5fa18|#60a5fa");
    if (tg.length === 0) tg.push("Related|#818cf818|#818cf8");
    return tg.map(function(t) { var p=t.split("|"); return '<span style="display:inline-block;font-family:JetBrains Mono,monospace;font-size:10px;padding:2px 8px;border-radius:3px;background:'+p[1]+';color:'+p[2]+';margin-right:6px;">'+p[0]+'<\/span>'; }).join("");
  }

  function statBox(label, val, col) {
    return '<div style="flex:1;background:#0e1018;padding:14px 10px;text-align:center;">'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#3a4050;letter-spacing:1px;margin-bottom:4px;">' + label + '<\/div>'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:18px;color:'+col+';font-weight:700;">'+val+'<\/div><\/div>';
  }

  function renderChunkH(text, maxRows) {
    var rows = parseCSVLines(text);
    if (rows.length >= 2) {
      var dl = detectDelimiter(rows[0]);
      var hC = parseCSVCells(rows[0], dl);
      if (hC.length >= 2) {
        var ok = 0;
        for (var x = 1; x < Math.min(rows.length, 6); x++) if (Math.abs(parseCSVCells(rows[x], dl).length - hC.length) <= 1) ok++;
        if (ok >= Math.min(rows.length - 1, 2)) {
          var limit = Math.min(rows.length - 1, maxRows || 30);
          var t = '<div style="overflow:auto;max-height:260px;border-radius:4px;border:1px solid #1e2230;"><table style="width:100%;border-collapse:collapse;font-family:JetBrains Mono,monospace;font-size:10px;line-height:1.4;"><thead style="position:sticky;top:0;"><tr>';
          for (var c = 0; c < hC.length; c++) t += '<th style="text-align:left;padding:4px 6px;background:#1a1e2a;color:#60a5fa;border-bottom:2px solid #2a3040;font-size:9px;white-space:nowrap;">'+esc(hC[c].replace(/^"|"$/g,""))+'<\/th>';
          t += '<\/tr><\/thead><tbody>';
          for (var r = 1; r <= limit; r++) { var cells = parseCSVCells(rows[r], dl); t += '<tr style="background:'+(r%2===0?'transparent':'rgba(255,255,255,0.015)')+';">'; for (var c2 = 0; c2 < hC.length; c2++) t += '<td style="padding:3px 6px;color:#9ca3af;border-bottom:1px solid #1e2230;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc((cells[c2]||"").replace(/^"|"$/g,""))+'<\/td>'; t += '<\/tr>'; }
          t += '<\/tbody><\/table><\/div>';
          return t;
        }
      }
    }
    var ds = text.slice(0, 600);
    return '<div style="font-family:IBM Plex Serif,serif;font-size:12px;color:#9ca3af;line-height:1.7;max-height:260px;overflow:auto;">'+esc(ds)+(text.length > 600 ? "\u2026" : "")+'<\/div>';
  }

  // ─── Build sections ───

  // 1. HEATMAP (static HTML table)
  var cellPx = Math.max(8, Math.min(24, Math.floor(600 / Math.max(nA, nB))));
  var heatmap = '<div style="overflow:auto;max-height:500px;margin-bottom:8px;">';
  heatmap += '<table style="border-collapse:collapse;">';
  heatmap += '<tr><td><\/td>';
  for (var j = 0; j < nB; j++) heatmap += '<td style="font-family:JetBrains Mono,monospace;font-size:7px;color:#4a5568;text-align:center;width:'+cellPx+'px;padding:1px;">B'+(j+1)+'<\/td>';
  heatmap += '<\/tr>';
  for (var i = 0; i < nA; i++) {
    heatmap += '<tr><td style="font-family:JetBrains Mono,monospace;font-size:7px;color:#4a5568;text-align:right;padding-right:3px;">A'+(i+1)+'<\/td>';
    for (var j2 = 0; j2 < nB; j2++) {
      var v = mat[i][j2];
      heatmap += '<td style="width:'+cellPx+'px;height:'+cellPx+'px;background:'+simColorS(v)+';border:1px solid #0a0c12;" title="A'+(i+1)+' B'+(j2+1)+': '+(v*100).toFixed(1)+'%"><\/td>';
    }
    heatmap += '<\/tr>';
  }
  heatmap += '<\/table><\/div>';

  // 2. MATCHES (top 50)
  var matchCards = "";
  var top50 = allPairs.slice(0, 50).filter(function(p) { return p.score >= 0.3; });
  top50.forEach(function(m, idx) {
    var k = m.i+"-"+m.j, interp = interpretations[k] || null;
    var pct = (m.score*100).toFixed(1), bc = barCol(m.score);
    matchCards += '<div style="background:#0e1018;border-radius:8px;border:1px solid '+(m.score > 0.5 ? '#f0c04020' : '#1e2230')+';padding:14px;margin-bottom:10px;page-break-inside:avoid;">';
    matchCards += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">';
    matchCards += '<span style="font-family:JetBrains Mono,monospace;font-size:16px;color:#2a2f3a;font-weight:700;">#'+(idx+1)+'<\/span>';
    matchCards += '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#60a5fa;background:#60a5fa12;padding:2px 6px;border-radius:3px;">A'+(m.i+1)+'<\/span>';
    matchCards += '<span style="color:#3a4050;font-size:10px;">\u27F7<\/span>';
    matchCards += '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#f59e42;background:#f59e4212;padding:2px 6px;border-radius:3px;">B'+(m.j+1)+'<\/span>';
    matchCards += relTag(interp);
    matchCards += '<span style="margin-left:auto;font-family:JetBrains Mono,monospace;font-size:16px;color:'+bc+';font-weight:700;">'+pct+'%<\/span>';
    matchCards += '<\/div>';
    matchCards += '<div style="display:flex;gap:8px;margin-bottom:'+(interp ? '10' : '0')+'px;">';
    matchCards += '<div style="flex:1 1 50%;min-width:0;overflow:hidden;background:#141822;border-radius:6px;padding:10px;border-left:3px solid #60a5fa30;">';
    matchCards += '<div style="font-family:JetBrains Mono,monospace;font-size:8px;color:#60a5fa;margin-bottom:4px;">A'+(m.i+1)+'<\/div>';
    matchCards += renderChunkH(results.chunksA[m.i], 15) + '<\/div>';
    matchCards += '<div style="flex:1 1 50%;min-width:0;overflow:hidden;background:#141822;border-radius:6px;padding:10px;border-left:3px solid #f59e4230;">';
    matchCards += '<div style="font-family:JetBrains Mono,monospace;font-size:8px;color:#f59e42;margin-bottom:4px;">B'+(m.j+1)+'<\/div>';
    matchCards += renderChunkH(results.chunksB[m.j], 15) + '<\/div><\/div>';
    if (interp) {
      matchCards += '<div style="background:#0c0e16;border-radius:6px;padding:10px;border:1px solid #818cf815;">';
      matchCards += '<div style="font-family:JetBrains Mono,monospace;font-size:8px;color:#818cf8;margin-bottom:4px;">\u{1F9E0} INTERPRETATION<\/div>';

    }
    matchCards += '<\/div>';
  });

  // 3. DOCUMENT VIEW (side-by-side with margin annotations)
  var docThresh = 0.5;
  function docChunk(text, idx, doc, links) {
    var r = '<div style="display:flex;'+(doc === "A" ? '' : 'flex-direction:row-reverse;')+'border-bottom:1px solid #1e223040;padding:6px 0;">';
    r += '<div style="flex:1;min-width:0;padding:0 10px;">';
    r += '<div style="font-family:JetBrains Mono,monospace;font-size:8px;color:'+(doc==="A"?"#60a5fa40":"#f59e4240")+';margin-bottom:2px;">'+doc+(idx+1)+'<\/div>';
    r += renderChunkH(text, 20) + '<\/div>';
    r += '<div style="width:48px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding-top:12px;'+(doc==="A"?"border-right:1px solid #1e223040;padding-right:4px;align-items:flex-end;":"border-left:1px solid #1e223040;padding-left:4px;align-items:flex-start;")+'">';
    if (links) {
      links.slice(0, 5).forEach(function(lk) {
        var toIdx = doc === "A" ? lk.j : lk.i;
        var toDoc = doc === "A" ? "B" : "A";
        var tCol = toDoc === "B" ? "#f59e42" : "#60a5fa";
        var alph = Math.round(20 + lk.score * 35).toString(16).padStart(2, "0");
        r += '<span style="font-family:JetBrains Mono,monospace;font-size:7px;background:'+tCol+alph+';border:1px solid '+tCol+'40;color:'+tCol+';border-radius:2px;padding:1px 3px;" title="'+(lk.score*100).toFixed(1)+'%">'+toDoc+(toIdx+1);
        if (lk.interp) r += '\u{1F9E0}';
        r += '<\/span>';
      });
      if (links.length > 5) r += '<span style="font-family:JetBrains Mono,monospace;font-size:6px;color:#3a4050;">+' + (links.length - 5) + '<\/span>';
    }
    r += '<\/div><\/div>';
    return r;
  }

  // Build link maps for doc view
  var docLinksA = {}, docLinksB = {};
  for (var di = 0; di < nA; di++) {
    for (var dj = 0; dj < nB; dj++) {
      if (mat[di][dj] >= docThresh) {
        var dInterp = interpretations[di+"-"+dj] || null;
        if (!docLinksA[di]) docLinksA[di] = [];
        docLinksA[di].push({ j: dj, score: mat[di][dj], interp: dInterp });
        if (!docLinksB[dj]) docLinksB[dj] = [];
        docLinksB[dj].push({ i: di, score: mat[di][dj], interp: dInterp });

    distBars += '<div style="width:100%;height:'+bh+'px;border-radius:2px 2px 0 0;background:rgba('+(Math.round(240*inten+40))+','+(Math.round(160*inten+60))+','+(Math.round(64+30*(1-inten)))+','+(0.4+inten*0.6)+');"><\/div>';
    distBars += '<\/div>';
  }
  distBars += '<\/div>';
  distBars += '<div style="display:flex;justify-content:space-between;font-family:JetBrains Mono,monospace;font-size:8px;color:#3a4050;margin-top:4px;"><span>0%<\/span><span>25%<\/span><span>50%<\/span><span>75%<\/span><span>100%<\/span><\/div>';

  // ─── Assemble HTML ───
  var avgAll = allPairs.length > 0 ? (allPairs.reduce(function(a,p){return a+p.score;},0)/allPairs.length*100).toFixed(1) : "0.0";
  var maxAll = allPairs.length > 0 ? (allPairs[0].score*100).toFixed(1) : "0.0";
  var linkedA = Object.keys(docLinksA).length;

function simColor(val) {
  if (val < 0.05) return "rgba(20,24,32,0.95)";
  const r = Math.round(255 * Math.min(1, val * 2.2));
  const g = Math.round(180 * Math.min(1, val * 1.1));
  const b = Math.round(60 + 60 * (1 - val));
  return "rgba("+r+","+g+","+b+","+(0.3+val*0.7)+")";
}
function simTextColor(val) { return val > 0.35 ? "#0a0c10" : "#c8ccd4"; }

const mono10 = { fontFamily: "'JetBrains Mono', monospace", fontSize: 10 };

// Detect if a chunk is valid CSV (uses shared parseCSVLines/parseCSVCells)
function isChunkCSV(text) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return false;
  const delim = detectDelimiter(rows[0]);
  const hCount = parseCSVCells(rows[0], delim).length;
  if (hCount < 2) return false;
  let ok = 0;
  for (let i = 1; i < Math.min(rows.length, 6); i++) {
    if (Math.abs(parseCSVCells(rows[i], delim).length - hCount) <= 1) ok++;
  }
  return ok >= Math.min(rows.length - 1, 2);
}

// Renders chunk text: scrollable table if CSV, prose otherwise
function ChunkContent({ text, maxLen = 600, fontSize = 12.5, maxHeight = 260 }) {
  // For CSV, don't slice mid-row — parse first, then limit rows
  if (isChunkCSV(text)) {
    const rows = parseCSVLines(text);
    const delim = detectDelimiter(rows[0]);
    const headerCells = parseCSVCells(rows[0], delim);
    const maxCols = headerCells.length;

    // Limit display rows by approximate token budget
    let displayRows = [];
    let tokCount = tokenize(rows[0]).length;
    const tokBudget = maxLen ? Math.floor(maxLen * 0.8) : Infinity;
    for (let i = 1; i < rows.length; i++) {
      const rTok = tokenize(rows[i]).length;
      if (tokCount + rTok > tokBudget && displayRows.length > 0) break;
      displayRows.push(parseCSVCells(rows[i], delim));
      tokCount += rTok;
    }
    const truncated = displayRows.length < rows.length - 1;

    return (
      <div style={{
        overflow: "auto", maxHeight, borderRadius: 4,
        border: "1px solid #1e2230",
        scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0e1018",
      }}>
        <table style={{
          width: "100%", borderCollapse: "collapse",
          fontFamily: "'JetBrains Mono', monospace", fontSize: Math.min(fontSize, 11),
          lineHeight: 1.5,
        }}>
          <thead style={{ position: "sticky", top: 0, zIndex: 2 }}>
            <tr>
              {headerCells.map((h, ci) => (
                <th key={ci} style={{
                  textAlign: "left", padding: "5px 8px",
                  background: "#1a1e2a", color: "#60a5fa",
                  borderBottom: "2px solid #2a3040",
                  fontSize: 10, letterSpacing: 0.5, fontWeight: 600,
                  whiteSpace: "nowrap",
                }}>{h.replace(/^"|"$/g, "")}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {displayRows.map((row, ri) => (
              <tr key={ri} style={{ background: ri % 2 === 0 ? "transparent" : "#ffffff04" }}>
                {Array.from({ length: maxCols }, (_, ci) => (
                  <td key={ci} style={{
                    padding: "4px 8px", color: "#9ca3af",
                    borderBottom: "1px solid #1e2230",
                    maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis",
                    whiteSpace: "nowrap",
                  }}>{(row[ci] || "").replace(/^"|"$/g, "")}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
        {truncated && <div style={{
          ...mono9, color: "#3a4050", padding: "4px 8px",
          background: "#0e1018", borderTop: "1px solid #1e2230",
          position: "sticky", bottom: 0, textAlign: "right",
        }}>
          {displayRows.length} of {rows.length - 1} rows shown {"\u2026"}
        </div>}
      </div>
    );
  }

  // Plain text
  const display = maxLen ? text.slice(0, maxLen) : text;
  const truncated = maxLen && text.length > maxLen;
  return (
    <div style={{
      fontFamily: "'IBM Plex Serif', Georgia, serif", fontSize, color: "#9ca3af",
      lineHeight: 1.7, maxHeight, overflow: "auto",
      scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0e1018",
    }}>
      {display}{truncated ? "\u2026" : ""}
    </div>
  );
}

function FileUpload({ label, color, onTextLoad, text }) {
  const fileRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const readFile = useCallback(file => {
    const reader = new FileReader();
    reader.onload = e => onTextLoad(e.target.result);
    reader.readAsText(file);
  }, [onTextLoad]);
  const handleDrop = useCallback(e => {
    e.preventDefault(); setDragging(false);
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  }, [readFile]);

  const csvInfo = text && isCSV(text) ? " \u00B7 CSV detected \u00B7 " + (parseCSVLines(text).length - 1) + " rows" : "";

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ ...mono11, letterSpacing: 2, textTransform: "uppercase", color, marginBottom: 8, fontWeight: 600 }}>{label}</div>
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        onClick={() => !text && fileRef.current?.click()}
        style={{
          border: "1.5px dashed " + (dragging ? color : "#2a2f3a"),
          borderRadius: 8, padding: text ? 0 : 32,
          background: dragging ? color + "08" : "#0e1018",
          cursor: text ? "default" : "pointer",
          transition: "all 0.2s", minHeight: 120,
        }}
      >
        <input ref={fileRef} type="file" accept=".txt,.md,.html,.csv,.json,.xml,.log,.py,.js,.ts,.tex,.rst,.tsv"
          style={{ display: "none" }}
          onChange={e => e.target.files[0] && readFile(e.target.files[0])}
        />
        {text ? (
          <div style={{ position: "relative" }}>
            <textarea value={text} onChange={e => onTextLoad(e.target.value)}
              style={{
                width: "100%", minHeight: 160, maxHeight: 280,
                background: "transparent", color: "#9ca3af",
                border: "none", resize: "vertical", padding: 14,
                fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                lineHeight: 1.7, outline: "none", boxSizing: "border-box",
              }}
            />
            <button onClick={e => { e.stopPropagation(); onTextLoad(""); }}
              style={{
                position: "absolute", top: 8, right: 8,
                background: "#1a1e28", border: "1px solid " + color + "40",
                color, borderRadius: 4, padding: "2px 8px", cursor: "pointer", ...mono11,
              }}>clear</button>
          </div>
        ) : (
          <div style={{ textAlign: "center", color: "#4a5060" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>{"\uD83D\uDCC4"}</div>
            <div style={mono11}>Drop file or click to upload</div>
            <div style={{ ...mono10, marginTop: 4, color: "#3a4050" }}>.txt .md .csv .json .xml .py .js</div>
          </div>
        )}
      </div>
      {text && <div style={{ ...mono10, color: "#4a5060", marginTop: 6 }}>{tokenize(text).length} tokens {"\u00B7"} {text.length} chars{csvInfo}</div>}
    </div>
  );
}

// ─── Fullscreen Panel wrapper ────────────────────────────────

function FullscreenPanel({ children, label }) {
  const [fs, setFs] = useState(false);
  const panelRef = useRef(null);

  useEffect(() => {
    if (!fs) return;
    const handleKey = e => { if (e.key === "Escape") setFs(false); };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [fs]);

  if (!fs) {
    return (
      <div style={{ position: "relative" }}>
        <button onClick={() => setFs(true)} title="Fullscreen" style={{
          position: "absolute", top: 8, right: 8, zIndex: 5,
          ...mono9, background: "#141822", border: "1px solid #2a2f3a",
          color: "#4a5568", borderRadius: 4, padding: "4px 8px",
          cursor: "pointer", letterSpacing: 0.5,
        }}>{"\u26F6"} fullscreen</button>
        {children}
      </div>
    );
  }

  return (
    <div ref={panelRef} style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: "#0a0c12", zIndex: 9999, display: "flex", flexDirection: "column",
      overflow: "hidden",
    }}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "8px 16px", background: "#0e1018", borderBottom: "1px solid #1e2230",
        flexShrink: 0,
      }}>
        <span style={{ ...mono10, color: "#4a5568", letterSpacing: 1 }}>{label || "FULLSCREEN"}</span>
        <button onClick={() => setFs(false)} style={{
          ...mono10, background: "#f8717118", border: "1px solid #f8717140",
          color: "#f87171", borderRadius: 4, padding: "4px 12px",
          cursor: "pointer",
        }}>ESC {"\u2715"} close</button>
      </div>
      <div style={{ flex: 1, overflow: "auto", padding: 16 }}>
        {children}
      </div>
    </div>
  );
}

// ─── Scalable Heatmap (canvas + D3 zoom) ────────────────────

function Heatmap({ matrix, chunksA, chunksB, onCellClick, selectedCell }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const transformRef = useRef(d3.zoomIdentity);
  const [hoverInfo, setHoverInfo] = useState(null);
  const [cellSize, setCellSize] = useState(20);

  const rows = matrix.length;
  const cols = matrix[0]?.length || 0;
  if (!rows || !cols) return null;

  // Label gutter
  const gutterLeft = 32;
  const gutterTop = 32;

  // Auto cell size based on container
  useEffect(() => {
    if (!containerRef.current) return;
    const w = containerRef.current.clientWidth - gutterLeft - 20;
    const h = 500;
    const auto = Math.max(6, Math.min(40, Math.floor(Math.min(w / cols, h / rows))));
    setCellSize(auto);
  }, [rows, cols]);

  const totalW = gutterLeft + cols * cellSize + 20;
  const totalH = gutterTop + rows * cellSize + 20;

  // Draw
  const draw = useCallback((transform) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cw, ch);

    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    // Cells
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const v = matrix[i][j];
        const x = gutterLeft + j * cellSize;
        const y = gutterTop + i * cellSize;
        ctx.fillStyle = simColor(v);
        ctx.fillRect(x, y, cellSize - 1, cellSize - 1);

        // Selected highlight
        if (selectedCell && selectedCell[0] === i && selectedCell[1] === j) {
          ctx.strokeStyle = "#f0c040";
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, cellSize - 1, cellSize - 1);
        }

        // Value text if cells are big enough
        if (cellSize * transform.k >= 22) {
          ctx.fillStyle = simTextColor(v);
          ctx.font = "9px JetBrains Mono, monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText((v * 100).toFixed(0), x + cellSize / 2, y + cellSize / 2);
        }
      }
    }

    // Row labels (A)
    ctx.fillStyle = "#4a5568";
    ctx.font = "9px JetBrains Mono, monospace";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    const labelStep = cellSize * transform.k < 12 ? Math.ceil(12 / (cellSize * transform.k)) : 1;
    for (let i = 0; i < rows; i += labelStep) {
      ctx.fillText("A" + (i + 1), gutterLeft - 4, gutterTop + i * cellSize + cellSize / 2);
    }

    // Col labels (B)
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    for (let j = 0; j < cols; j += labelStep) {
      ctx.save();
      ctx.translate(gutterLeft + j * cellSize + cellSize / 2, gutterTop - 4);
      ctx.rotate(-Math.PI / 4);
      ctx.fillText("B" + (j + 1), 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }, [matrix, rows, cols, cellSize, selectedCell, gutterLeft, gutterTop]);

  // Setup D3 zoom
  useEffect(() => {
    if (!canvasRef.current) return;
    const canvas = d3.select(canvasRef.current);
    const zoomBehavior = d3.zoom()
      .scaleExtent([0.2, 8])
      .on("zoom", (e) => {
        transformRef.current = e.transform;
        draw(e.transform);
        setHoverInfo(null);
      });
    canvas.call(zoomBehavior);

    // Fit to view
    const cw = canvasRef.current.clientWidth;
    const ch = canvasRef.current.clientHeight;
    const scale = Math.min(cw / totalW, ch / totalH, 2) * 0.9;
    const initTransform = d3.zoomIdentity
      .translate((cw - totalW * scale) / 2, (ch - totalH * scale) / 2)
      .scale(scale);
    canvas.call(zoomBehavior.transform, initTransform);

    return () => { canvas.on(".zoom", null); };
  }, [draw, totalW, totalH]);

  // Click handler
  const handleClick = useCallback((e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = transformRef.current;
    const mx = (e.clientX - rect.left - t.x) / t.k;
    const my = (e.clientY - rect.top - t.y) / t.k;
    const j = Math.floor((mx - gutterLeft) / cellSize);
    const i = Math.floor((my - gutterTop) / cellSize);
    if (i >= 0 && i < rows && j >= 0 && j < cols) {
      onCellClick([i, j]);
    }
  }, [rows, cols, cellSize, onCellClick, gutterLeft, gutterTop]);

  // Hover handler
  const handleMove = useCallback((e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = transformRef.current;
    const mx = (e.clientX - rect.left - t.x) / t.k;
    const my = (e.clientY - rect.top - t.y) / t.k;
    const j = Math.floor((mx - gutterLeft) / cellSize);
    const i = Math.floor((my - gutterTop) / cellSize);
    if (i >= 0 && i < rows && j >= 0 && j < cols) {
      setHoverInfo({
        x: e.clientX - rect.left + 12,
        y: e.clientY - rect.top - 8,
        i, j, score: matrix[i][j],
      });
    } else {
      setHoverInfo(null);
    }
  }, [rows, cols, cellSize, matrix, gutterLeft, gutterTop]);

  // Color legend gradient
  const legendStops = Array.from({ length: 20 }, (_, i) => {
    const v = i / 19;
    return simColor(v);
  });

  return (
    <div>
      {/* Compact legend */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <span style={{ ...mono9, color: "#3a4050" }}>{rows}{"\u00D7"}{cols} {"\u00B7"} scroll to zoom {"\u00B7"} drag to pan</span>
        <div style={{ display: "flex", alignItems: "center", gap: 4, marginLeft: "auto" }}>
          <span style={{ ...mono9, color: "#3a4050" }}>0%</span>
          <div style={{
            width: 120, height: 10, borderRadius: 3,
            background: "linear-gradient(to right, " + legendStops.join(", ") + ")",
            border: "1px solid #1e2230",
          }} />
          <span style={{ ...mono9, color: "#3a4050" }}>100%</span>
        </div>
      </div>

      {/* Canvas */}
      <div ref={containerRef} style={{ position: "relative" }}>
        <canvas
          ref={canvasRef}
          onClick={handleClick}
          onMouseMove={handleMove}
          onMouseLeave={() => setHoverInfo(null)}
          style={{
            width: "100%", height: 480, display: "block",
            background: "#0a0c12", borderRadius: 6,
            border: "1px solid #1e2230", cursor: "crosshair",
          }}
        />
        {hoverInfo && (
          <div style={{
            position: "absolute", left: hoverInfo.x, top: hoverInfo.y,
            background: "#141822ee", border: "1px solid #2a2f3a", borderRadius: 4,
            padding: "4px 8px", pointerEvents: "none", zIndex: 5,
            ...mono10, color: "#c8ccd4", whiteSpace: "nowrap",
          }}>
            A{hoverInfo.i + 1} {"\u2194"} B{hoverInfo.j + 1}: <span style={{ color: "#f0c040", fontWeight: 700 }}>{(hoverInfo.score * 100).toFixed(1)}%</span>
          </div>
        )}
      </div>
    </div>
  );
}

function InterpretBadge({ status }) {
  if (status === "done") return <span style={{ ...mono9, color: "#34d399", background: "#34d39912", padding: "2px 6px", borderRadius: 3 }}>{"\u2713"} interpreted</span>;
  if (status === "loading") return <span style={{ ...mono9, color: "#818cf8", animation: "pulse 1.2s infinite" }}>{"\u27F3"} interpreting...</span>;
  if (status === "error") return <span style={{ ...mono9, color: "#f87171", background: "#f8717112", padding: "2px 6px", borderRadius: 3 }}>{"\u2717"} failed</span>;
  return null;
}

function DrillDown({ chunkA, chunkB, macroLabelA, macroLabelB, microSize }) {
  const [subData, setSubData] = useState(null);
  const [computing, setComputing] = useState(false);
  const [expandedSub, setExpandedSub] = useState(0);

  const compute = useCallback(() => {
    setComputing(true);
    setTimeout(() => {
      const sA = subChunk(chunkA, microSize);
      const sB = subChunk(chunkB, microSize);
      const { matrix, vocab } = computeSimilarityMatrix(sA, sB);
      const pairs = [];
      for (let i = 0; i < matrix.length; i++)
        for (let j = 0; j < matrix[0].length; j++)
          pairs.push({ i, j, score: matrix[i][j] });
      pairs.sort((a, b) => b.score - a.score);
      setSubData({ subA: sA, subB: sB, matrix, pairs, vocabSize: vocab.length });
      setComputing(false);
    }, 30);
  }, [chunkA, chunkB, microSize]);

  if (!subData && !computing) {
    return (
      <div style={{
        marginTop: 10, background: "#0c0e16", borderRadius: 6,
        padding: 12, border: "1px solid #34d39920", textAlign: "center",
      }}>
        <button onClick={e => { e.stopPropagation(); compute(); }} style={{
          ...mono10, fontWeight: 600, letterSpacing: 1,
          background: "#34d39920", border: "1px solid #34d39940",
          color: "#34d399", borderRadius: 5, padding: "8px 20px",
          cursor: "pointer",
        }}>{"\u{1F50D}"} Drill Down {"\u2014"} {microSize === "row" ? "row / paragraph" : microSize + " tokens"}</button>
        <div style={{ ...mono9, color: "#2a2f3a", marginTop: 6 }}>
          Sub-chunks this pair for fine-grained comparison
        </div>
      </div>
    );
  }

  if (computing) {
    return (
      <div style={{
        marginTop: 10, background: "#0c0e16", borderRadius: 6,
        padding: 16, border: "1px solid #34d39920",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
      }}>
        <div style={{ width: 14, height: 14, border: "2px solid #34d39940", borderTopColor: "#34d399", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <span style={{ ...mono10, color: "#34d399" }}>Sub-chunking and computing similarity...</span>
      </div>
    );
  }

  const topSubs = subData.pairs.slice(0, 10);
  const avgSub = topSubs.length > 0 ? topSubs.reduce((a, p) => a + p.score, 0) / topSubs.length : 0;

  // Mini heatmap
  const mRows = subData.matrix.length;
  const mCols = subData.matrix[0]?.length || 0;
  const mCell = Math.max(10, Math.min(28, Math.floor(400 / Math.max(mRows, mCols))));

  return (
    <div style={{
      marginTop: 10, background: "#0c0e16", borderRadius: 6,
      border: "1px solid #34d39920", overflow: "hidden",
    }} onClick={e => e.stopPropagation()}>
      {/* Header */}
      <div style={{
        padding: "10px 14px", background: "#0e1018", borderBottom: "1px solid #1e2230",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ ...mono10, color: "#34d399", fontWeight: 600 }}>{"\u{1F50D}"} DRILL-DOWN</span>
          <span style={{ ...mono9, color: "#3a4050" }}>
            {subData.subA.length} {"\u00D7"} {subData.subB.length} sub-chunks
            {" \u00B7 "} vocab {subData.vocabSize}
            {" \u00B7 "} avg top-10: {(avgSub*100).toFixed(1)}%
          </span>
        </div>
        <button onClick={() => setSubData(null)} style={{
          ...mono9, background: "#1e223040", border: "1px solid #2a2f3a",
          color: "#4a5568", borderRadius: 3, padding: "2px 8px", cursor: "pointer",
        }}>{"\u2715"} close</button>
      </div>

      {/* Mini heatmap */}
      <div style={{ padding: "10px 14px", overflowX: "auto" }}>
        <div style={{ ...mono9, color: "#3a4050", marginBottom: 6 }}>
          SUB-CHUNK SIMILARITY {" \u00B7 "} {macroLabelA} subs (rows) vs {macroLabelB} subs (cols)
        </div>
        <div style={{ display: "inline-block" }}>
          {subData.matrix.map((row, ri) => (
            <div key={ri} style={{ display: "flex" }}>
              {row.map((val, ci) => (
                <div key={ci} title={"a"+(ri+1)+" \u2194 b"+(ci+1)+": "+(val*100).toFixed(1)+"%"} style={{
                  width: mCell, height: mCell, background: simColor(val),
                  border: "1px solid #0c0e16", borderRadius: 1,
                }} />
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* Top sub-matches */}
      <div style={{ padding: "10px 14px", borderTop: "1px solid #1e2230" }}>
        <div style={{ ...mono9, color: "#3a4050", marginBottom: 8 }}>TOP SUB-MATCHES</div>
        {topSubs.map((s, idx) => {
          const isOpen = expandedSub === idx;
          return (
            <div key={idx} style={{ marginBottom: 6 }}>
              <div
                onClick={() => setExpandedSub(isOpen ? -1 : idx)}
                style={{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "6px 8px", background: "#0e1018", borderRadius: 4,
                  cursor: "pointer", border: "1px solid " + (s.score > 0.4 ? "#34d39920" : "#1e2230"),
                }}
              >
                <span style={{ ...mono9, color: "#4a5568" }}>#{idx+1}</span>
                <span style={{ ...mono10, color: "#60a5fa", background: "#60a5fa12", padding: "1px 6px", borderRadius: 3 }}>a{s.i+1}</span>
                <span style={{ color: "#2a2f3a", fontSize: 10 }}>{"\u27F7"}</span>
                <span style={{ ...mono10, color: "#f59e42", background: "#f59e4212", padding: "1px 6px", borderRadius: 3 }}>b{s.j+1}</span>
                <div style={{ flex: 1, background: "#181c24", borderRadius: 3, height: 4, overflow: "hidden" }}>
                  <div style={{ width: (s.score*100)+"%", height: "100%", background: "#34d399", borderRadius: 3 }} />
                </div>
                <span style={{ ...mono10, color: "#34d399", fontWeight: 700, minWidth: 42, textAlign: "right" }}>
                  {(s.score*100).toFixed(1)}%
                </span>
              </div>
              {isOpen && (
                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                  <div style={{ flex: "1 1 50%", minWidth: 0, background: "#141822", borderRadius: 4, padding: 8, borderLeft: "2px solid #60a5fa20", overflow: "hidden" }}>
                    <div style={{ ...mono9, color: "#60a5fa", marginBottom: 4 }}>a{s.i+1}</div>
                    <ChunkContent text={subData.subA[s.i]} maxLen={400} fontSize={11} maxHeight={180} />
                  </div>
                  <div style={{ flex: "1 1 50%", minWidth: 0, background: "#141822", borderRadius: 4, padding: 8, borderLeft: "2px solid #f59e4220", overflow: "hidden" }}>
                    <div style={{ ...mono9, color: "#f59e42", marginBottom: 4 }}>b{s.j+1}</div>
                    <ChunkContent text={subData.subB[s.j]} maxLen={400} fontSize={11} maxHeight={180} />
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// LAZY CHUNK LIST — stable component (must be outside DocumentView)
// ═══════════════════════════════════════════════════════════════

function LazyChunkList({ chunks, doc, linksMap, renderFn, onLoadMore }) {
  const BATCH = 15;
  const [loaded, setLoaded] = useState(BATCH);
  const sentinelRef = useRef(null);
  const loadedRef = useRef(loaded);
  loadedRef.current = loaded;

  // Reset only when chunk count actually changes
  const prevCountRef = useRef(chunks.length);
  useEffect(() => {
    if (chunks.length !== prevCountRef.current) {
      prevCountRef.current = chunks.length;
      setLoaded(BATCH);
    }
  }, [chunks.length]);

  // IntersectionObserver on sentinel
  useEffect(() => {
    const el = sentinelRef.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && loadedRef.current < chunks.length) {
        setLoaded(prev => Math.min(prev + BATCH, chunks.length));
      }
    }, { rootMargin: "300px" });
    obs.observe(el);
    return () => obs.disconnect();
  }, [chunks.length, loaded]);

  // Expose forceLoad for scrollTo
  const forceLoadTo = useCallback((idx) => {
    setLoaded(prev => Math.max(prev, idx + 5));
  }, []);

  useEffect(() => {
    if (onLoadMore) onLoadMore(forceLoadTo);
  }, [forceLoadTo, onLoadMore]);

  const visible = chunks.slice(0, loaded);
  const remaining = chunks.length - loaded;

  return (
    <>
      {visible.map((c, i) => renderFn(c, i, doc, linksMap[i]))}
      {remaining > 0 && (
        <div ref={sentinelRef} style={{ padding: "16px 12px", textAlign: "center" }}>
          <div style={{
            ...mono9, color: "#2a2f3a", animation: "pulse 1.5s infinite",
          }}>{remaining} more chunk{remaining !== 1 ? "s" : ""} {"\u2193"}</div>
        </div>
      )}
      {remaining <= 0 && (
        <div style={{ padding: "12px", textAlign: "center" }}>
          <div style={{ ...mono9, color: "#1e2230" }}>{"\u2500".repeat(20)}</div>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════
// DOCUMENT VIEW — side-by-side annotated documents
// ═══════════════════════════════════════════════════════════════

function DocumentView({ chunksA, chunksB, matrix, interpretations, simThreshold: initThresh }) {
  const leftRef = useRef(null);
  const rightRef = useRef(null);
  const wrapperRef = useRef(null);
  const svgRef = useRef(null);
  const forceLoadARef = useRef(null);
  const forceLoadBRef = useRef(null);
  const [activeLink, setActiveLink] = useState(null);
  const tooltipRef = useRef(null);
  const [docThreshold, setDocThreshold] = useState(initThresh || 0.5);

  // Build link maps: for each chunk, which chunks in the other doc are linked?
  const { linksFromA, linksFromB } = useMemo(() => {
    const fA = {}; // fA[i] = [{ j, score, interp }, ...]
    const fB = {}; // fB[j] = [{ i, score, interp }, ...]
    for (let i = 0; i < matrix.length; i++) {
      for (let j = 0; j < (matrix[0]?.length || 0); j++) {
        if (matrix[i][j] >= docThreshold) {
          const interp = interpretations[i + "-" + j] || null;
          if (!fA[i]) fA[i] = [];
          fA[i].push({ j, score: matrix[i][j], interp });
          if (!fB[j]) fB[j] = [];
          fB[j].push({ i, score: matrix[i][j], interp });
        }
      }
    }
    // Sort by score desc
    Object.values(fA).forEach(arr => arr.sort((a, b) => b.score - a.score));
    Object.values(fB).forEach(arr => arr.sort((a, b) => b.score - a.score));
    return { linksFromA: fA, linksFromB: fB };
  }, [matrix, interpretations, docThreshold]);

  const scrollTo = useCallback((panel, idx) => {
    // Force lazy-load the target chunk if not yet rendered
    const forceRef = panel === "A" ? forceLoadARef : forceLoadBRef;
    if (forceRef.current) forceRef.current(idx);

    // Wait for DOM to update after force-load, then scroll
    const attempt = (tries) => {
      const container = panel === "A" ? leftRef.current : rightRef.current;
      if (!container) return;
      const el = container.querySelector("[data-chunk-idx='" + idx + "']");
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.style.transition = "background 0.3s";
        el.style.background = panel === "A" ? "#60a5fa12" : "#f59e4212";
        setTimeout(() => { el.style.background = "transparent"; }, 1500);
        // Redraw lines after scroll settles
        setTimeout(drawLines, 400);
      } else if (tries > 0) {
        setTimeout(() => attempt(tries - 1), 50);
      }
    };
    // Give React a frame to re-render after force-load
    requestAnimationFrame(() => attempt(10));
  }, [drawLines]);

  const handleLinkClick = useCallback((fromDoc, fromIdx, toIdx) => {
    const key = fromDoc === "A" ? ("A" + fromIdx + "-B" + toIdx) : ("B" + fromIdx + "-A" + toIdx);
    setActiveLink(key);
    const targetPanel = fromDoc === "A" ? "B" : "A";
    scrollTo(targetPanel, toIdx);
  }, [scrollTo]);

  const handleHover = useCallback((e, link, fromDoc, fromIdx) => {
    const tip = tooltipRef.current;
    if (!tip) return;
    if (!link) { tip.style.display = "none"; return; }
    const wRect = wrapperRef.current?.getBoundingClientRect();
    if (!wRect) return;
    const rect = e.currentTarget.getBoundingClientRect();
    tip.style.display = "block";
    tip.style.left = (rect.right - wRect.left + 8) + "px";
    tip.style.top = (rect.top - wRect.top) + "px";
    const fromLabel = fromDoc + (fromIdx + 1);
    const toLabel = (fromDoc === "A" ? "B" : "A") + ((fromDoc === "A" ? link.j : link.i) + 1);
    const fromColor = fromDoc === "A" ? "#60a5fa" : "#f59e42";
    const toColor = fromDoc === "A" ? "#f59e42" : "#60a5fa";
    tip.innerHTML = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'
      + '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:' + fromColor + '">' + fromLabel + '</span>'
      + '<span style="color:#3a4050;font-size:10px">\u27F7</span>'
      + '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:' + toColor + '">' + toLabel + '</span>'
      + '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#f0c040;font-weight:700">' + (link.score * 100).toFixed(1) + '%</span>'
      + '</div>'
      + (link.interp
        ? '<div style="font-family:IBM Plex Serif,serif;font-size:11.5px;color:#b0b8c8;line-height:1.7">' + link.interp.replace(/</g, "&lt;") + '</div>'
        : '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#3a4050">No LLM interpretation yet</div>');
  }, []);

  const hideTooltip = useCallback(() => {
    if (tooltipRef.current) tooltipRef.current.style.display = "none";
  }, []);

  function linkBadgeColor(score, targetDoc) {
    // Color of the target document, intensity scaled by score
    const base = targetDoc === "B" ? "#f59e42" : "#60a5fa";
    const alpha = Math.round(15 + score * 40).toString(16).padStart(2, "0");
    const borderAlpha = Math.round(30 + score * 60).toString(16).padStart(2, "0");
    return { bg: base + alpha, border: base + borderAlpha, text: base };
  }

  function renderChunkWithLinks(text, idx, doc, links) {
    return (
      <div key={idx} data-chunk-idx={idx} style={{
        display: "flex", gap: 0,
        flexDirection: doc === "A" ? "row" : "row-reverse",
        marginBottom: 2, borderBottom: "1px solid #1e223040",
        paddingBottom: 8, paddingTop: 8,
      }}>
        {/* Main content */}
        <div style={{ flex: 1, minWidth: 0, padding: "0 12px" }}>
          <div style={{
            ...mono9, color: doc === "A" ? "#60a5fa50" : "#f59e4250",
            marginBottom: 4, letterSpacing: 1,
          }}>{doc}{idx + 1}</div>
          <ChunkContent text={text} maxLen={null} fontSize={12} maxHeight={null} />
        </div>
        {/* Margin links */}
        <div style={{
          width: 52, flexShrink: 0, display: "flex", flexDirection: "column",
          alignItems: doc === "A" ? "flex-end" : "flex-start",
          gap: 3, paddingTop: 16,
          borderLeft: doc === "B" ? "1px solid #1e223040" : "none",
          borderRight: doc === "A" ? "1px solid #1e223040" : "none",
          paddingLeft: doc === "B" ? 6 : 0,
          paddingRight: doc === "A" ? 6 : 0,
        }}>
          {(links || []).slice(0, 5).map((link, li) => {
            const toIdx = doc === "A" ? link.j : link.i;
            const toLabel = (doc === "A" ? "B" : "A") + (toIdx + 1);
            const toDoc = doc === "A" ? "B" : "A";
            const c = linkBadgeColor(link.score, toDoc);
            const isActive = activeLink === (doc + idx + "-" + toLabel);
            return (
              <div
                key={li}
                data-link-from={doc + idx}
                data-link-to={toDoc + toIdx}
                data-link-score={link.score}
                onClick={(e) => { e.stopPropagation(); handleLinkClick(doc, idx, toIdx); }}
                onMouseEnter={(e) => handleHover(e, link, doc, idx)}
                onMouseLeave={hideTooltip}
                style={{
                  ...mono9, fontSize: 8,
                  background: isActive ? c.text + "30" : c.bg,
                  border: "1px solid " + (isActive ? c.text : c.border),
                  color: c.text, borderRadius: 3,
                  padding: "1px 4px", cursor: "pointer",
                  whiteSpace: "nowrap",
                  transition: "all 0.15s",
                }}
                title={(link.score * 100).toFixed(1) + "% " + toLabel}
              >
                {toLabel}
                {link.interp && <span style={{ marginLeft: 2, opacity: 0.6 }}>{"\u{1F9E0}"}</span>}
              </div>
            );
          })}
          {(links || []).length > 5 && (
            <div style={{ ...mono9, fontSize: 7, color: "#3a4050" }}>+{links.length - 5}</div>
          )}
        </div>
      </div>
    );
  }

  // ─── Draw connecting lines between matching badges ───
  const drawLines = useCallback(() => {
    const svg = svgRef.current;
    const wrapper = wrapperRef.current;
    if (!svg || !wrapper) return;
    const wRect = wrapper.getBoundingClientRect();

    // Find all badge elements with data-link-from on left (A) side
    const leftBadges = leftRef.current ? leftRef.current.querySelectorAll("[data-link-from^='A']") : [];
    // Find all badge elements with data-link-from on right (B) side
    const rightBadges = rightRef.current ? rightRef.current.querySelectorAll("[data-link-from^='B']") : [];

    // Build position map: key "A3" or "B5" -> { x, y } center of badge
    const leftPos = {};  // keyed by "A{i}" -> badge center
    const rightPos = {}; // keyed by "B{j}" -> badge center

    leftBadges.forEach(el => {
      const r = el.getBoundingClientRect();
      const fromKey = el.getAttribute("data-link-from");
      const toKey = el.getAttribute("data-link-to");
      // This badge sits in A's right margin, pointing to B
      // Store position keyed by the pair
      const pairKey = fromKey + "-" + toKey;
      leftPos[pairKey] = {
        x: r.right - wRect.left,
        y: r.top + r.height / 2 - wRect.top,
        score: parseFloat(el.getAttribute("data-link-score") || "0"),
      };
    });

    rightBadges.forEach(el => {
      const r = el.getBoundingClientRect();
      const fromKey = el.getAttribute("data-link-from");
      const toKey = el.getAttribute("data-link-to");
      // This badge sits in B's left margin, pointing to A
      // The matching pair key from A's perspective: toKey + "-" + fromKey
      const pairKey = toKey + "-" + fromKey;
      rightPos[pairKey] = {
        x: r.left - wRect.left,
        y: r.top + r.height / 2 - wRect.top,
      };
    });

    // Draw curves for pairs that have badges visible on both sides
    let paths = "";
    Object.keys(leftPos).forEach(pairKey => {
      if (!rightPos[pairKey]) return;
      const lp = leftPos[pairKey];
      const rp = rightPos[pairKey];
      const score = lp.score;
      // Color: blend between the two doc colors based on position
      const alpha = Math.round(25 + score * 50).toString(16).padStart(2, "0");
      const strokeW = 1 + score * 2;
      const isAct = activeLink && pairKey.replace("-", "") === activeLink.replace("-", "");
      const col = isAct ? "#f0c040" : "#f59e42" + alpha;
      const sw = isAct ? 2.5 : strokeW;
      // Bezier curve
      const dx = (rp.x - lp.x) * 0.4;
      paths += '<path d="M' + lp.x + ' ' + lp.y + ' C' + (lp.x + dx) + ' ' + lp.y + ' ' + (rp.x - dx) + ' ' + rp.y + ' ' + rp.x + ' ' + rp.y + '" fill="none" stroke="' + col + '" stroke-width="' + sw + '" />';
    });

    svg.innerHTML = paths;
  }, [activeLink]);

  // Redraw lines on scroll, resize, threshold change, and lazy-load DOM mutations
  useEffect(() => {
    const redraw = () => { requestAnimationFrame(drawLines); };
    // Debounced version for MutationObserver — avoids thrash from tooltip DOM changes
    let mutTimer = null;
    const debouncedRedraw = () => {
      if (mutTimer) clearTimeout(mutTimer);
      mutTimer = setTimeout(redraw, 80);
    };
    const lp = leftRef.current;
    const rp = rightRef.current;
    if (lp) lp.addEventListener("scroll", redraw, { passive: true });
    if (rp) rp.addEventListener("scroll", redraw, { passive: true });
    window.addEventListener("resize", redraw);

    // Only watch childList on the scroll containers, not subtree (avoids tooltip noise)
    const mutObs = new MutationObserver(debouncedRedraw);
    if (lp) mutObs.observe(lp, { childList: true });
    if (rp) mutObs.observe(rp, { childList: true });

    const t = setTimeout(redraw, 100);
    return () => {
      if (lp) lp.removeEventListener("scroll", redraw);
      if (rp) rp.removeEventListener("scroll", redraw);
      window.removeEventListener("resize", redraw);
      mutObs.disconnect();
      clearTimeout(t);
      if (mutTimer) clearTimeout(mutTimer);
    };
  }, [drawLines, linksFromA, linksFromB]);

  // Redraw when activeLink changes
  useEffect(() => { drawLines(); }, [activeLink, drawLines]);

  const totalLinksA = Object.values(linksFromA).reduce((s, arr) => s + arr.length, 0);
  const totalLinksB = Object.values(linksFromB).reduce((s, arr) => s + arr.length, 0);
  const linkedChunksA = Object.keys(linksFromA).length;
  const linkedChunksB = Object.keys(linksFromB).length;

  return (
    <div style={{ background: "#0e1018", borderRadius: 10 }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 16px", borderBottom: "1px solid #1e2230",
      }}>
        <div style={{ ...mono10, color: "#4a5568" }}>
          DOCUMENT VIEW {"\u00B7"} {linkedChunksA}/{chunksA.length} A chunks linked {"\u00B7"} {linkedChunksB}/{chunksB.length} B chunks linked {"\u00B7"} click margin badges to jump
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <label style={{ ...mono9, color: "#3a4050" }}>THRESHOLD</label>
          <input type="range" min="30" max="90" step="5" value={docThreshold * 100}
            onChange={e => setDocThreshold(Number(e.target.value) / 100)}
            style={{ width: 70, accentColor: "#f0c040" }}
          />
          <span style={{ ...mono9, color: "#f0c040", minWidth: 28 }}>{(docThreshold * 100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Two-panel layout with connecting lines */}
      <div ref={wrapperRef} style={{ display: "flex", height: 600, position: "relative" }}>
        {/* SVG overlay for connecting lines */}
        <svg ref={svgRef} style={{
          position: "absolute", top: 0, left: 0, width: "100%", height: "100%",
          pointerEvents: "none", zIndex: 10,
        }} />

        {/* Doc A */}
        <div style={{ flex: "1 1 50%", minWidth: 0, display: "flex", flexDirection: "column", borderRight: "2px solid #1e2230" }}>
          <div style={{
            padding: "8px 12px", background: "#0c0e16", borderBottom: "1px solid #1e2230",
            display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
          }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#60a5fa" }} />
            <span style={{ ...mono10, color: "#60a5fa", fontWeight: 600 }}>DOCUMENT A</span>
            <span style={{ ...mono9, color: "#3a4050" }}>{chunksA.length} chunks</span>
          </div>
          <div ref={leftRef} style={{
            flex: 1, overflow: "auto", position: "relative",
            scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0a0c12",
          }}>
            <LazyChunkList
              chunks={chunksA} doc="A" linksMap={linksFromA}
              renderFn={renderChunkWithLinks}
              onLoadMore={fn => { forceLoadARef.current = fn; }}
            />
          </div>
        </div>

        {/* Doc B */}
        <div style={{ flex: "1 1 50%", minWidth: 0, display: "flex", flexDirection: "column" }}>
          <div style={{
            padding: "8px 12px", background: "#0c0e16", borderBottom: "1px solid #1e2230",
            display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
          }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#f59e42" }} />
            <span style={{ ...mono10, color: "#f59e42", fontWeight: 600 }}>DOCUMENT B</span>
            <span style={{ ...mono9, color: "#3a4050" }}>{chunksB.length} chunks</span>
          </div>
          <div ref={rightRef} style={{
            flex: 1, overflow: "auto", position: "relative",
            scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0a0c12",
          }}>
            <LazyChunkList
              chunks={chunksB} doc="B" linksMap={linksFromB}
              renderFn={renderChunkWithLinks}
              onLoadMore={fn => { forceLoadBRef.current = fn; }}
            />
          </div>
        </div>

        {/* Tooltip — ref-based, no React re-renders */}
        <div ref={tooltipRef} style={{
          display: "none", position: "absolute",
          background: "#141822f0", border: "1px solid #2a2f3a", borderRadius: 6,
          padding: "8px 12px", maxWidth: 300, zIndex: 30, pointerEvents: "none",
        }} />
      </div>
    </div>
  );
}

function DistributionChart({ pairs }) {
  const buckets = useMemo(() => {
    const b = Array(20).fill(0);
    pairs.forEach(p => { b[Math.min(19, Math.floor(p.score * 20))]++; });
    return b;
  }, [pairs]);
  const mx = Math.max(...buckets, 1);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 180, padding: "0 4px" }}>
        {buckets.map((count, i) => {
          const h = Math.max(2, (count / mx) * 160), intensity = i / 19;
          return (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end" }}>
              {count > 0 && <div style={{ ...mono9, fontSize: 8, color: "#4a5568", marginBottom: 2 }}>{count}</div>}
              <div title={(i*5)+"-"+(i*5+5)+"%: "+count} style={{
                width: "100%", height: h, borderRadius: "3px 3px 0 0",
                background: "rgba("+(Math.round(240*intensity+40))+","+(Math.round(160*intensity+60))+","+(Math.round(64+30*(1-intensity)))+","+(0.4+intensity*0.6)+")",
                transition: "height 0.3s ease",
              }} />
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", ...mono9, color: "#3a4050", marginTop: 6, padding: "0 4px" }}>
        <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// GRAPH VIEW — D3 force-directed graph
// Nodes = chunks, sequential THEN edges, similarity >50% edges
// ═══════════════════════════════════════════════════════════════

function GraphView({ chunksA, chunksB, matrix, interpretations, microSize }) {
  const svgRef = useRef(null);
  const containerRef = useRef(null);
  const simRef = useRef(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const graphTooltipRef = useRef(null);
  const [simThreshold, setSimThreshold] = useState(0.5);
  const [layout, setLayout] = useState("sequence");

  // Node viewport controls — which chunk ranges are loaded
  const [rangeA, setRangeA] = useState([0, Math.min(chunksA.length, 30)]);
  const [rangeB, setRangeB] = useState([0, Math.min(chunksB.length, 30)]);

  // Reset ranges when chunks change
  useEffect(() => {
    setRangeA([0, Math.min(chunksA.length, 30)]);
    setRangeB([0, Math.min(chunksB.length, 30)]);
  }, [chunksA.length, chunksB.length]);

  const LAYOUTS = {
    sequence:    { label: "Sequence",    desc: "THEN chains + similarity cross-links" },
    bipartite:   { label: "Bipartite",   desc: "Two columns, similarity only" },
    force:       { label: "Force",       desc: "Pure force-directed, no constraints" },
    radial:      { label: "Radial",      desc: "Docs on opposing arcs" },
    similarity:  { label: "Similarity",  desc: "Pull similar chunks together" },
    grid:        { label: "Grid",        desc: "A = rows, B = columns, links at intersections" },
    concentric:  { label: "Concentric",  desc: "Most-linked nodes at center" },
    hierarchical:{ label: "Hierarchical",desc: "Top-down flow per document" },
  };

  // Visible chunk subsets
  const visA = chunksA.slice(rangeA[0], rangeA[1]);
  const visB = chunksB.slice(rangeB[0], rangeB[1]);
  const offA = rangeA[0]; // offset for mapping back to original indices
  const offB = rangeB[0];

  const graphData = useMemo(() => {
    const nodes = [];
    visA.forEach((c, i) => {
      const origIdx = offA + i;
      nodes.push({ id: "A"+(origIdx+1), doc: "A", idx: i, origIdx, label: "A"+(origIdx+1), text: c.slice(0, 300) });
    });
    visB.forEach((c, j) => {
      const origIdx = offB + j;
      nodes.push({ id: "B"+(origIdx+1), doc: "B", idx: j, origIdx, label: "B"+(origIdx+1), text: c.slice(0, 300) });
    });
    const nodeIds = new Set(nodes.map(n => n.id));

    const links = [];
    // Sequential THEN edges within visible range
    for (let i = 0; i < visA.length - 1; i++) {
      links.push({ source: "A"+(offA+i+1), target: "A"+(offA+i+2), type: "THEN", score: null });
    }
    for (let j = 0; j < visB.length - 1; j++) {
      links.push({ source: "B"+(offB+j+1), target: "B"+(offB+j+2), type: "THEN", score: null });
    }
    // Similarity edges — only between visible nodes
    for (let i = rangeA[0]; i < rangeA[1]; i++) {
      for (let j = rangeB[0]; j < rangeB[1]; j++) {
        if (matrix[i] && matrix[i][j] >= simThreshold) {
          links.push({
            source: "A"+(i+1), target: "B"+(j+1), type: "SIMILAR",
            score: matrix[i][j],
            interp: interpretations[i+"-"+j] || null,
          });
        }
      }
    }
    return { nodes, links };
  }, [visA, visB, offA, offB, matrix, interpretations, simThreshold, rangeA, rangeB]);

  useEffect(() => {
    if (!svgRef.current || !containerRef.current) return;
    const container = containerRef.current;
    const W = container.clientWidth;
    const H = 600;

    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    svg.attr("width", W).attr("height", H);

    const defs = svg.append("defs");
    ["then-arrow", "sim-arrow"].forEach((id, idx) => {
      defs.append("marker")
        .attr("id", id).attr("viewBox", "0 -5 10 10")
        .attr("refX", 22).attr("refY", 0)
        .attr("markerWidth", 6).attr("markerHeight", 6)
        .attr("orient", "auto")
        .append("path").attr("d", "M0,-4L10,0L0,4")
        .attr("fill", idx === 0 ? "#4a5568" : "#f0c04080");
    });

    const g = svg.append("g");

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.1, 6])
      .on("zoom", (e) => { g.attr("transform", e.transform); if (graphTooltipRef.current) graphTooltipRef.current.style.display = "none"; });
    svg.call(zoomBehavior);
    svg.on("click.deselect", () => setSelectedNode(null));

    const nodes = graphData.nodes.map(n => ({ ...n }));
    const totalA = visA.length, totalB = visB.length;
    const maxChain = Math.max(totalA, totalB);
    const N = nodes.length;

    // ═══ LAYOUT: filter links and set initial positions + forces ═══

    // Determine which links to include
    let links;
    const showThen = ["sequence", "hierarchical"].includes(layout);
    if (showThen) {
      links = graphData.links.map(l => ({ ...l }));
    } else {
      links = graphData.links.filter(l => l.type === "SIMILAR").map(l => ({ ...l }));
    }

    // Count similarity links per node for concentric layout
    const simCount = {};
    graphData.links.filter(l => l.type === "SIMILAR").forEach(l => {
      const s = typeof l.source === "string" ? l.source : l.source.id;
      const t = typeof l.target === "string" ? l.target : l.target.id;
      simCount[s] = (simCount[s] || 0) + 1;
      simCount[t] = (simCount[t] || 0) + 1;
    });
    const maxSimCount = Math.max(...Object.values(simCount), 1);

    // Initial positions per layout
    const cx = W / 2, cy = H / 2;
    nodes.forEach(n => {
      const total = n.doc === "A" ? totalA : totalB;
      const frac = (n.idx + 0.5) / total;

      switch (layout) {
        case "sequence":
        case "hierarchical": {
          const vExtent = Math.max(H, maxChain * 55);
          const vTop = (H - vExtent) / 2;
          n.x = (n.doc === "A" ? W * 0.25 : W * 0.75) + (Math.random() - 0.5) * 30;
          n.y = vTop + frac * vExtent;
          break;
        }
        case "bipartite": {
          n.x = n.doc === "A" ? W * 0.2 : W * 0.8;
          n.y = frac * H * 0.9 + H * 0.05;
          break;
        }
        case "force": {
          n.x = cx + (Math.random() - 0.5) * W * 0.6;
          n.y = cy + (Math.random() - 0.5) * H * 0.6;
          break;
        }
        case "radial": {
          const angleRange = Math.PI * 0.7;
          const r = Math.min(W, H) * 0.38;
          if (n.doc === "A") {
            const a = Math.PI + (Math.PI - angleRange) / 2 + frac * angleRange;
            n.x = cx + Math.cos(a) * r;
            n.y = cy + Math.sin(a) * r;
          } else {
            const a = (Math.PI - angleRange) / 2 + (1 - frac) * angleRange;
            n.x = cx + Math.cos(a) * r;
            n.y = cy + Math.sin(a) * r;
          }
          break;
        }
        case "similarity": {
          n.x = cx + (Math.random() - 0.5) * W * 0.4;
          n.y = cy + (Math.random() - 0.5) * H * 0.4;
          break;
        }
        case "grid": {
          const gapX = Math.min(50, (W - 80) / Math.max(totalB, 1));
          const gapY = Math.min(50, (H - 80) / Math.max(totalA, 1));
          if (n.doc === "A") {
            n.x = 40;
            n.y = 40 + n.idx * gapY;
          } else {
            n.x = 40 + (n.idx + 1) * gapX;
            n.y = 40;
          }
          break;
        }
        case "concentric": {
          const sc = simCount[n.id] || 0;
          const ring = 1 - sc / maxSimCount; // 0 = center, 1 = outer
          const r2 = ring * Math.min(W, H) * 0.4 + 20;
          const angle = (n.doc === "A" ? n.idx : totalA + n.idx) / N * Math.PI * 2;
          n.x = cx + Math.cos(angle) * r2;
          n.y = cy + Math.sin(angle) * r2;
          break;
        }
      }
    });

    // Force configurations per layout
    const simulation = d3.forceSimulation(nodes);

    switch (layout) {
      case "sequence": {
        const vExtent = Math.max(H, maxChain * 55);
        const vTop = (H - vExtent) / 2;
        simulation
          .force("link", d3.forceLink(links).id(d => d.id)
            .distance(d => d.type === "THEN" ? 50 : 250)
            .strength(d => d.type === "THEN" ? 2.0 : 0.06))
          .force("charge", d3.forceManyBody().strength(-140).distanceMax(500))
          .force("collision", d3.forceCollide(24))
          .force("x", d3.forceX(d => d.doc === "A" ? W * 0.3 : W * 0.7).strength(0.04))
          .force("y", d3.forceY(d => {
            const total = d.doc === "A" ? totalA : totalB;
            return vTop + (d.idx + 0.5) / total * vExtent;
          }).strength(d => {
            const total = d.doc === "A" ? totalA : totalB;
            return (d.idx === 0 || d.idx === total - 1) ? 0.15 : 0.02;
          }));
        break;
      }
      case "bipartite": {
        simulation
          .force("link", d3.forceLink(links).id(d => d.id).distance(200).strength(0.12))
          .force("charge", d3.forceManyBody().strength(-60))
          .force("collision", d3.forceCollide(20))
          .force("x", d3.forceX(d => d.doc === "A" ? W * 0.2 : W * 0.8).strength(0.6))
          .force("y", d3.forceY(d => {
            const total = d.doc === "A" ? totalA : totalB;
            return (d.idx + 0.5) / total * H * 0.9 + H * 0.05;
          }).strength(0.08));
        break;
      }
      case "force": {
        simulation
          .force("link", d3.forceLink(links).id(d => d.id).distance(100).strength(0.3))
          .force("charge", d3.forceManyBody().strength(-250))
          .force("collision", d3.forceCollide(26))
          .force("center", d3.forceCenter(cx, cy).strength(0.03));
        break;
      }
      case "radial": {
        const r = Math.min(W, H) * 0.38;
        const angleRange = Math.PI * 0.7;
        simulation
          .force("link", d3.forceLink(links).id(d => d.id).distance(180).strength(0.08))
          .force("charge", d3.forceManyBody().strength(-120))
          .force("collision", d3.forceCollide(22))
          .force("radial", d3.forceRadial(r, cx, cy).strength(0.15))
          .force("x", d3.forceX(d => {
            const total = d.doc === "A" ? totalA : totalB;
            const frac = (d.idx + 0.5) / total;
            if (d.doc === "A") {
              const a = Math.PI + (Math.PI - angleRange) / 2 + frac * angleRange;
              return cx + Math.cos(a) * r;
            } else {
              const a = (Math.PI - angleRange) / 2 + (1 - frac) * angleRange;
              return cx + Math.cos(a) * r;
            }
          }).strength(0.06))
          .force("y", d3.forceY(d => {
            const total = d.doc === "A" ? totalA : totalB;
            const frac = (d.idx + 0.5) / total;
            if (d.doc === "A") {
              const a = Math.PI + (Math.PI - angleRange) / 2 + frac * angleRange;
              return cy + Math.sin(a) * r;
            } else {
              const a = (Math.PI - angleRange) / 2 + (1 - frac) * angleRange;
              return cy + Math.sin(a) * r;
            }
          }).strength(0.06));
        break;
      }
      case "similarity": {
        simulation
          .force("link", d3.forceLink(links).id(d => d.id)
            .distance(d => 40 + (1 - (d.score || 0)) * 200)
            .strength(d => 0.1 + (d.score || 0) * 0.8))
          .force("charge", d3.forceManyBody().strength(-200))
          .force("collision", d3.forceCollide(26))
          .force("center", d3.forceCenter(cx, cy).strength(0.02));
        break;
      }
      case "grid": {
        const gapX = Math.min(50, (W - 80) / Math.max(totalB, 1));
        const gapY = Math.min(50, (H - 80) / Math.max(totalA, 1));
        simulation
          .force("link", d3.forceLink(links).id(d => d.id).distance(60).strength(0.05))
          .force("collision", d3.forceCollide(16))
          .force("x", d3.forceX(d => {
            if (d.doc === "A") return 40;
            return 40 + (d.idx + 1) * gapX;
          }).strength(0.8))
          .force("y", d3.forceY(d => {
            if (d.doc === "B") return 40;
            return 40 + (d.idx) * gapY;
          }).strength(0.8));
        break;
      }
      case "concentric": {
        simulation
          .force("link", d3.forceLink(links).id(d => d.id).distance(120).strength(0.1))
          .force("charge", d3.forceManyBody().strength(-80))
          .force("collision", d3.forceCollide(22))
          .force("radial", d3.forceRadial(d => {
            const sc = simCount[d.id] || 0;
            return (1 - sc / maxSimCount) * Math.min(W, H) * 0.4 + 20;
          }, cx, cy).strength(0.3));
