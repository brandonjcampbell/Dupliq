        break;
      }
      case "hierarchical": {
        simulation
          .force("link", d3.forceLink(links).id(d => d.id)
            .distance(d => d.type === "THEN" ? 40 : 180)
            .strength(d => d.type === "THEN" ? 1.5 : 0.05))
          .force("charge", d3.forceManyBody().strength(-100))
          .force("collision", d3.forceCollide(22))
          .force("x", d3.forceX(d => d.doc === "A" ? W * 0.3 : W * 0.7).strength(0.15))
          .force("y", d3.forceY(d => {
            const total = d.doc === "A" ? totalA : totalB;
            return (d.idx + 0.5) / total * H * 0.9 + H * 0.05;
          }).strength(0.3));
        break;
      }
    }

    simulation.alphaDecay(0.012).alphaMin(0.001).velocityDecay(0.4);
    simRef.current = simulation;

    // ═══ Rendering (shared across all layouts) ═══

    const linkLines = g.append("g").selectAll("line").data(links).enter().append("line")
      .attr("stroke", d => d.type === "THEN" ? "#4a5568" : simEdgeColor(d.score))
      .attr("stroke-width", d => d.type === "THEN" ? 2 : Math.max(1.5, (d.score || 0) * 5))
      .attr("stroke-dasharray", d => d.type === "THEN" ? "6 3" : "none")
      .attr("marker-end", d => d.type === "THEN" ? "url(#then-arrow)" : "")
      .style("cursor", d => d.type === "SIMILAR" ? "pointer" : "default")
      .style("opacity", d => d.type === "THEN" ? 0.65 : 0.7);

    const edgeLabels = g.append("g").selectAll("text").data(links.filter(l => l.type === "SIMILAR")).enter().append("text")
      .attr("text-anchor", "middle")
      .attr("fill", "#f0c04090")
      .attr("font-family", "JetBrains Mono, monospace")
      .attr("font-size", 9)
      .text(d => (d.score * 100).toFixed(0) + "%");

    const nodeCircles = g.append("g").selectAll("g").data(nodes).enter().append("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", (e, d) => {
          if (!e.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (e, d) => {
          const t = d3.zoomTransform(svg.node());
          d.fx = (e.sourceEvent.offsetX - t.x) / t.k;
          d.fy = (e.sourceEvent.offsetY - t.y) / t.k;
        })
        .on("end", (e, d) => {
          if (!e.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    nodeCircles.append("circle")
      .attr("r", 16)
      .attr("fill", d => d.doc === "A" ? "#60a5fa18" : "#f59e4218")
      .attr("stroke", d => d.doc === "A" ? "#60a5fa" : "#f59e42")
      .attr("stroke-width", 1.5);

    nodeCircles.append("text")
      .attr("text-anchor", "middle").attr("dy", 4)
      .attr("fill", d => d.doc === "A" ? "#60a5fa" : "#f59e42")
      .attr("font-family", "JetBrains Mono, monospace")
      .attr("font-size", 10)
      .attr("font-weight", 600)
      .text(d => d.label);

    nodeCircles
      .on("mouseover", (e, d) => {
        const tip = graphTooltipRef.current;
        if (!tip) return;
        const rect = container.getBoundingClientRect();
        tip.style.display = "block";
        tip.style.left = (e.clientX - rect.left + 12) + "px";
        tip.style.top = (e.clientY - rect.top - 10) + "px";
        var col = d.doc === "A" ? "#60a5fa" : "#f59e42";
        var txt = d.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        tip.innerHTML = '<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:' + col + ';margin-bottom:4px;font-weight:600;">' + d.label + '</div>'
          + '<div style="font-family:IBM Plex Serif,serif;font-size:11px;color:#8a8f9c;line-height:1.5;max-height:150px;overflow:auto;">' + txt + '\u2026</div>';
      })
      .on("mouseout", () => {
        if (graphTooltipRef.current) graphTooltipRef.current.style.display = "none";
      })
      .on("click", (e, d) => {
        e.stopPropagation();
        setSelectedNode(prev => prev && prev.id === d.id ? null : d);
      });

    linkLines.filter(d => d.type === "SIMILAR")
      .on("mouseover", function(e, d) { d3.select(this).attr("stroke-width", Math.max(3, (d.score || 0) * 8)); })
      .on("mouseout", function(e, d) { d3.select(this).attr("stroke-width", Math.max(1.5, (d.score || 0) * 5)); });

    simulation.on("tick", () => {
      linkLines
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      edgeLabels
        .attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2 - 6);
      nodeCircles.attr("transform", d => "translate("+d.x+","+d.y+")");
    });

    // Fit to view after settle
    setTimeout(() => {
      simulation.alpha(0.4).restart();
      setTimeout(() => {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
          if (n.x < minX) minX = n.x; if (n.y < minY) minY = n.y;
          if (n.x > maxX) maxX = n.x; if (n.y > maxY) maxY = n.y;
        });
        const pad = 40;
        const bw = (maxX - minX) + pad * 2;
        const bh = (maxY - minY) + pad * 2;
        const sc = Math.min(W / bw, H / bh, 1.2);
        const fcx = (minX + maxX) / 2;
        const fcy = (minY + maxY) / 2;
        svg.transition().duration(800).call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(W/2, H/2).scale(sc).translate(-fcx, -fcy)
        );
      }, 2000);
    }, 100);

    return () => { simulation.stop(); };
  }, [graphData, visA.length, visB.length, layout]);

  function simEdgeColor(score) {
    if (!score) return "#4a556840";
    if (score >= 0.8) return "#f0c040";
    if (score >= 0.65) return "#f59e42cc";
    return "#818cf8aa";
  }

  // Find links connected to selected node
  const selectedLinks = selectedNode ? graphData.links.filter(
    l => (l.source === selectedNode.id || l.target === selectedNode.id) ||
         (l.source.id === selectedNode.id || l.target.id === selectedNode.id)
  ) : [];

  const simLinks = selectedLinks.filter(l => l.type === "SIMILAR");

  return (
    <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span style={{ ...mono10, color: "#4a5568" }}>LAYOUT</span>
          <select value={layout} onChange={e => setLayout(e.target.value)}
            style={{ background: "#141822", border: "1px solid #1e2230", color: "#9ca3af", borderRadius: 4, padding: "3px 8px", ...mono10, cursor: "pointer", outline: "none" }}>
            {Object.entries(LAYOUTS).map(([k, v]) => (
              <option key={k} value={k}>{v.label}</option>
            ))}
          </select>
          <span style={{ ...mono9, color: "#2a2f3a" }}>{LAYOUTS[layout].desc}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ ...mono9, color: "#3a4050" }}>THRESHOLD</label>
          <input type="range" min="30" max="90" step="5" value={simThreshold * 100}
            onChange={e => setSimThreshold(Number(e.target.value) / 100)}
            style={{ width: 80, accentColor: "#f0c040" }}
          />
          <span style={{ ...mono9, color: "#f0c040", minWidth: 30 }}>{(simThreshold*100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Node viewport controls */}
      <div style={{
        display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap",
        background: "#0a0c12", borderRadius: 6, padding: "8px 12px", border: "1px solid #1e2230",
      }}>
        <span style={{ ...mono9, color: "#4a5568", letterSpacing: 1 }}>NODES</span>
        <span style={{ ...mono9, color: "#2a2f3a" }}>
          {visA.length + visB.length} of {chunksA.length + chunksB.length}
        </span>

        {/* Doc A range */}
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <span style={{ ...mono9, color: "#60a5fa" }}>A</span>
          <input type="number" min={0} max={rangeA[1]} value={rangeA[0]}
            onChange={e => { const v = Math.max(0, Math.min(rangeA[1], Number(e.target.value))); setRangeA([v, rangeA[1]]); }}
            style={{ width: 38, background: "#141822", border: "1px solid #60a5fa20", color: "#60a5fa", borderRadius: 3, padding: "2px 4px", ...mono9, textAlign: "center", outline: "none" }}
          />
          <input type="range" min={0} max={chunksA.length}
            value={rangeA[0]}
            onChange={e => { const v = Math.min(Number(e.target.value), rangeA[1]); setRangeA([v, rangeA[1]]); }}
            style={{ width: 50, accentColor: "#60a5fa" }}
          />
          <input type="range" min={0} max={chunksA.length}
            value={rangeA[1]}
            onChange={e => { const v = Math.max(Number(e.target.value), rangeA[0]); setRangeA([rangeA[0], v]); }}
            style={{ width: 50, accentColor: "#60a5fa" }}
          />
          <input type="number" min={rangeA[0]} max={chunksA.length} value={rangeA[1]}
            onChange={e => { const v = Math.max(rangeA[0], Math.min(chunksA.length, Number(e.target.value))); setRangeA([rangeA[0], v]); }}
            style={{ width: 38, background: "#141822", border: "1px solid #60a5fa20", color: "#60a5fa", borderRadius: 3, padding: "2px 4px", ...mono9, textAlign: "center", outline: "none" }}
          />
          <span style={{ ...mono9, color: "#60a5fa40" }}>{visA.length}/{chunksA.length}</span>
        </div>

        {/* Doc B range */}
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <span style={{ ...mono9, color: "#f59e42" }}>B</span>
          <input type="number" min={0} max={rangeB[1]} value={rangeB[0]}
            onChange={e => { const v = Math.max(0, Math.min(rangeB[1], Number(e.target.value))); setRangeB([v, rangeB[1]]); }}
            style={{ width: 38, background: "#141822", border: "1px solid #f59e4220", color: "#f59e42", borderRadius: 3, padding: "2px 4px", ...mono9, textAlign: "center", outline: "none" }}
          />
          <input type="range" min={0} max={chunksB.length}
            value={rangeB[0]}
            onChange={e => { const v = Math.min(Number(e.target.value), rangeB[1]); setRangeB([v, rangeB[1]]); }}
            style={{ width: 50, accentColor: "#f59e42" }}
          />
          <input type="range" min={0} max={chunksB.length}
            value={rangeB[1]}
            onChange={e => { const v = Math.max(Number(e.target.value), rangeB[0]); setRangeB([rangeB[0], v]); }}
            style={{ width: 50, accentColor: "#f59e42" }}
          />
          <input type="number" min={rangeB[0]} max={chunksB.length} value={rangeB[1]}
            onChange={e => { const v = Math.max(rangeB[0], Math.min(chunksB.length, Number(e.target.value))); setRangeB([rangeB[0], v]); }}
            style={{ width: 38, background: "#141822", border: "1px solid #f59e4220", color: "#f59e42", borderRadius: 3, padding: "2px 4px", ...mono9, textAlign: "center", outline: "none" }}
          />
          <span style={{ ...mono9, color: "#f59e4240" }}>{visB.length}/{chunksB.length}</span>
        </div>

        {/* Presets */}
        <div style={{ display: "flex", gap: 4, marginLeft: "auto" }}>
          {[
            { label: "All", fn: () => { setRangeA([0, chunksA.length]); setRangeB([0, chunksB.length]); } },
            { label: "20", fn: () => { setRangeA([0, Math.min(20, chunksA.length)]); setRangeB([0, Math.min(20, chunksB.length)]); } },
            { label: "10", fn: () => { setRangeA([0, Math.min(10, chunksA.length)]); setRangeB([0, Math.min(10, chunksB.length)]); } },
          ].map(p => (
            <button key={p.label} onClick={p.fn} style={{
              ...mono9, background: "#141822", border: "1px solid #1e2230",
              color: "#4a5568", borderRadius: 3, padding: "2px 8px",
              cursor: "pointer",
            }}>{p.label}</button>
          ))}
        </div>
      </div>

      {/* Compact legend */}
      <div style={{ display: "flex", gap: 14, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", border: "1.5px solid #60a5fa", background: "#60a5fa18" }} />
          <span style={{ ...mono9, color: "#60a5fa" }}>A</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", border: "1.5px solid #f59e42", background: "#f59e4218" }} />
          <span style={{ ...mono9, color: "#f59e42" }}>B</span>
        </div>
        {["sequence", "hierarchical"].includes(layout) && (
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 18, height: 0, borderTop: "1.5px dashed #4a5568" }} />
            <span style={{ ...mono9, color: "#4a5568" }}>THEN</span>
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <div style={{ width: 18, height: 0, borderTop: "2px solid #f0c040" }} />
          <span style={{ ...mono9, color: "#f0c040" }}>SIM</span>
        </div>
        <span style={{ ...mono9, color: "#2a2f3a" }}>
          {graphData.nodes.length}n {"\u00B7"} {graphData.links.filter(l => l.type === "SIMILAR").length} links {"\u00B7"} zoom + drag
        </span>
      </div>

      {/* SVG canvas */}
      <div ref={containerRef} style={{ position: "relative", background: "#0a0c12", borderRadius: 8, border: "1px solid #1e2230", overflow: "hidden" }}>
        <svg ref={svgRef} style={{ display: "block", width: "100%", height: 600 }} />

        {/* Tooltip — ref-based, no React re-renders */}
        <div ref={graphTooltipRef} style={{
          display: "none", position: "absolute",
          background: "#141822ee", border: "1px solid #2a2f3a", borderRadius: 6,
          padding: "8px 12px", maxWidth: 280, zIndex: 10, pointerEvents: "none",
        }} />
      </div>

      {/* Selected node detail panel */}
      {selectedNode && (
        <div style={{ marginTop: 14, background: "#141822", borderRadius: 8, padding: 16, border: "1px solid " + (selectedNode.doc === "A" ? "#60a5fa30" : "#f59e4230") }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{
              ...mono11, fontSize: 14, fontWeight: 700,
              color: selectedNode.doc === "A" ? "#60a5fa" : "#f59e42",
            }}>{selectedNode.label}</span>
            <span style={{ ...mono9, color: "#3a4050" }}>
              {simLinks.length} similarity link{simLinks.length !== 1 ? "s" : ""} above threshold
            </span>
          </div>
          <div style={{ marginBottom: simLinks.length > 0 ? 14 : 0 }}>
            <ChunkContent
              text={selectedNode.doc === "A" ? chunksA[selectedNode.origIdx] : chunksB[selectedNode.origIdx]}
              maxLen={800} fontSize={12.5} maxHeight={300}
            />
          </div>
          {simLinks.length > 0 && (
            <div>
              <div style={{ ...mono9, color: "#4a5568", letterSpacing: 1, marginBottom: 10 }}>CONNECTED BY SIMILARITY</div>
              {simLinks.map((l, idx) => {
                var srcId = typeof l.source === "string" ? l.source : l.source.id;
                var tgtId = typeof l.target === "string" ? l.target : l.target.id;
                var otherId = srcId === selectedNode.id ? tgtId : srcId;
                var otherDoc = otherId.charAt(0);
                var otherIdx = parseInt(otherId.slice(1), 10) - 1;
                var otherText = otherDoc === "A" ? chunksA[otherIdx] : chunksB[otherIdx];
                var selText = selectedNode.doc === "A" ? chunksA[selectedNode.origIdx] : chunksB[selectedNode.origIdx];
                var selColor = selectedNode.doc === "A" ? "#60a5fa" : "#f59e42";
                var otherColor = otherDoc === "A" ? "#60a5fa" : "#f59e42";
                return (
                  <div key={idx} style={{
                    marginBottom: 10, background: "#0c0e16", borderRadius: 8,
                    border: "1px solid #1e2230", overflow: "hidden",
                  }}>
                    {/* Header bar */}
                    <div style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",
                      borderBottom: "1px solid #1e2230", background: "#0e1018",
                    }}>
                      <span style={{ ...mono11, padding: "2px 8px", borderRadius: 4, color: selColor, background: selColor + "12" }}>
                        {selectedNode.label}
                      </span>
                      <span style={{ color: "#3a4050", fontSize: 12 }}>{"\u27F7"}</span>
                      <span style={{ ...mono11, padding: "2px 8px", borderRadius: 4, color: otherColor, background: otherColor + "12" }}>
                        {otherId}
                      </span>
                      <span style={{ ...mono11, color: "#f0c040", fontWeight: 700 }}>
                        {(l.score * 100).toFixed(1)}%
                      </span>
                      {l.interp && (
                        <span style={{ ...mono9, color: "#818cf8", background: "#818cf812", padding: "2px 6px", borderRadius: 3 }}>
                          {"\u{1F9E0}"} interpreted
                        </span>
                      )}
                    </div>
                    {/* Side-by-side chunks */}
                    <div style={{ display: "flex", gap: 1 }}>
                      <div style={{ flex: "1 1 50%", minWidth: 0, padding: 10, borderRight: "1px solid #1e2230", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: selColor, marginBottom: 4, letterSpacing: 1 }}>{selectedNode.label}</div>
                        <ChunkContent text={selText} maxLen={400} fontSize={11} maxHeight={200} />
                      </div>
                      <div style={{ flex: "1 1 50%", minWidth: 0, padding: 10, overflow: "hidden" }}>
                        <div style={{ ...mono9, color: otherColor, marginBottom: 4, letterSpacing: 1 }}>{otherId}</div>
                        <ChunkContent text={otherText} maxLen={400} fontSize={11} maxHeight={200} />
                      </div>
                    </div>
                    {/* Interpretation */}
                    {l.interp && (
                      <div style={{ padding: "8px 12px", borderTop: "1px solid #1e2230", background: "#0e1018" }}>
                        <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1, marginBottom: 4 }}>{"\u{1F9E0}"} INTERPRETATION</div>
                        <div style={{ fontFamily: "'IBM Plex Serif', serif", fontSize: 12, color: "#9ca3af", lineHeight: 1.7 }}>{l.interp}</div>
                      </div>
                    )}
                    {/* Drill-down */}
                    <div style={{ padding: "0 12px 8px" }}>
                      <DrillDown chunkA={selText} chunkB={otherText}
                        macroLabelA={selectedNode.label} macroLabelB={otherId}
                        microSize={microSize || "256"} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [textA, setTextA] = useState("");
  const [textB, setTextB] = useState("");
  const [results, setResults] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [selectedCell, setSelectedCell] = useState(null);
  const [expandedMatch, setExpandedMatch] = useState(0);
  const [tab, setTab] = useState("heatmap");
  const [chunkMode, setChunkMode] = useState("512");
  const [macroSize, setMacroSize] = useState(2048);
  const [microSize, setMicroSize] = useState("256");
  const [resultsStack, setResultsStack] = useState([]); // drill history
  const [drilling, setDrilling] = useState(false);
  const [ollamaUrl, setOllamaUrl] = useState("http://localhost:11434");
  const [ollamaModel, setOllamaModel] = useState("gpt-oss:20b");
  const [promptTemplate, setPromptTemplate] = useState(DEFAULT_PROMPT_TEMPLATE);
  const [showPromptEditor, setShowPromptEditor] = useState(false);
  const [interpretations, setInterpretations] = useState({});
  const [interpStatus, setInterpStatus] = useState({});
  const [batchInterpreting, setBatchInterpreting] = useState(false);
  const abortRef = useRef(null);

  const canRun = textA.trim().length > 20 && textB.trim().length > 20;

  const analyze = useCallback(() => {
    setProcessing(true); setResults(null); setSelectedCell(null);
    setExpandedMatch(0); setInterpretations({}); setInterpStatus({});
    setResultsStack([]);
    setTimeout(() => {
      try {
        const cA = chunkDocument(textA, chunkMode, macroSize);
        const cB = chunkDocument(textB, chunkMode, macroSize);
        const { matrix, vocab } = computeSimilarityMatrix(cA, cB);
        const pairs = [];
        for (let i = 0; i < matrix.length; i++)
          for (let j = 0; j < matrix[0].length; j++)
            pairs.push({ i, j, score: matrix[i][j] });
        pairs.sort((a, b) => b.score - a.score);
        const scores = pairs.map(p => p.score);
        setResults({
          chunksA: cA, chunksB: cB, matrix, pairs, vocabSize: vocab.length,
          stats: { avg: scores.reduce((a,b) => a+b, 0)/scores.length, max: scores[0], highCount: scores.filter(s => s > 0.3).length },
          drillLabel: chunkMode === "macro" ? "Macro " + macroSize : chunkMode === "row" ? "Row/Para" : chunkMode + " tok",
        });
      } catch (err) { console.error(err); }
      setProcessing(false);
    }, 50);
  }, [textA, textB, chunkMode, macroSize]);

  // ─── Drill All: sub-chunk every chunk at micro level, replace results ───
  const drillAll = useCallback(() => {
    if (!results || drilling) return;
    setDrilling(true);
    setTimeout(() => {
      try {
        // Sub-chunk each existing chunk
        const subChunksA = [];
        const chunkMapA = []; // maps sub-index back to parent
        results.chunksA.forEach((c, pi) => {
          const subs = subChunk(c, microSize);
          subs.forEach(s => { chunkMapA.push(pi); subChunksA.push(s); });
        });
        const subChunksB = [];
        const chunkMapB = [];
        results.chunksB.forEach((c, pi) => {
          const subs = subChunk(c, microSize);
          subs.forEach(s => { chunkMapB.push(pi); subChunksB.push(s); });
        });

        // Recompute similarity matrix on sub-chunks
        const { matrix: newMat, vocab: newVocab } = computeSimilarityMatrix(subChunksA, subChunksB);
        const newPairs = [];
        for (let i = 0; i < newMat.length; i++)
          for (let j = 0; j < newMat[0].length; j++)
            newPairs.push({ i, j, score: newMat[i][j] });
        newPairs.sort((a, b) => b.score - a.score);
        const scores = newPairs.map(p => p.score);

        // Push current state onto stack
        setResultsStack(prev => [...prev, { results, interpretations, interpStatus }]);

        // Replace results
        setResults({
          chunksA: subChunksA, chunksB: subChunksB,
          matrix: newMat, pairs: newPairs, vocabSize: newVocab.length,
          stats: { avg: scores.reduce((a,b) => a+b, 0)/scores.length, max: scores[0], highCount: scores.filter(s => s > 0.3).length },
          parentMapA: chunkMapA, parentMapB: chunkMapB,
          drillLabel: microSize === "row" ? "Row/Para" : microSize + " tok",
        });
        setSelectedCell(null);
        setExpandedMatch(0);
        // Preserve interpretations that can be mapped (clear for fresh level)
        setInterpretations({});
        setInterpStatus({});
      } catch (err) { console.error("Drill error:", err); }
      setDrilling(false);
    }, 50);
  }, [results, microSize, drilling, interpretations, interpStatus]);

  // ─── Drill Up: pop the stack ───
  const drillUp = useCallback(() => {
    if (resultsStack.length === 0) return;
    const prev = resultsStack[resultsStack.length - 1];
    setResultsStack(s => s.slice(0, -1));
    setResults(prev.results);
    setInterpretations(prev.interpretations);
    setInterpStatus(prev.interpStatus);
    setSelectedCell(null);
    setExpandedMatch(0);
  }, [resultsStack]);

  const drillDepth = resultsStack.length;

  const interpretPair = useCallback(async (i, j, score, cA, cB) => {
    const k = i+"-"+j;
    setInterpStatus(p => ({ ...p, [k]: "loading" }));
    try {
      const r = await queryOllama(ollamaUrl, ollamaModel, cA, cB, score, null, promptTemplate);
      setInterpretations(p => ({ ...p, [k]: r }));
      setInterpStatus(p => ({ ...p, [k]: "done" }));
    } catch (err) { setInterpStatus(p => ({ ...p, [k]: "error" })); }
  }, [ollamaUrl, ollamaModel, promptTemplate]);

  const batchInterpret = useCallback(async (count, minScore) => {
    if (!results) return;
    setBatchInterpreting(true);
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    // If minScore is set, interpret all pairs at or above that threshold
    // Otherwise, interpret top N by count
    const targets = minScore != null
      ? results.pairs.filter(m => m.score >= minScore)
      : results.pairs.slice(0, count);
    for (const m of targets) {
      if (ctrl.signal.aborted) break;
      const k = m.i+"-"+m.j;
      if (interpretations[k]) continue;
      setInterpStatus(p => ({ ...p, [k]: "loading" }));
      try {
        const r = await queryOllama(ollamaUrl, ollamaModel, results.chunksA[m.i], results.chunksB[m.j], m.score, ctrl.signal, promptTemplate);
        setInterpretations(p => ({ ...p, [k]: r }));
        setInterpStatus(p => ({ ...p, [k]: "done" }));
      } catch (err) {
        if (err.name === "AbortError") break;
        setInterpStatus(p => ({ ...p, [k]: "error" }));
      }
    }
    setBatchInterpreting(false);
  }, [results, ollamaUrl, ollamaModel, interpretations, promptTemplate]);

  const topMatches = results ? results.pairs.slice(0, 20) : [];
  const pairsAbove30 = results ? results.pairs.filter(p => p.score >= 0.3).length : 0;
  const interpretedCount = Object.values(interpStatus).filter(s => s === "done").length;

  const actBtn = (on, accent="#818cf8") => ({
    ...mono10, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase",
    background: on ? accent+"20" : "#141822", border: "1px solid "+(on ? accent+"50" : "#1e2230"),
    color: on ? accent : "#4a5568", borderRadius: 5, padding: "7px 16px",
    cursor: on ? "pointer" : "not-allowed", transition: "all 0.2s",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#0a0c12", color: "#c8ccd4", padding: "24px 20px", fontFamily: "'IBM Plex Sans', system-ui, sans-serif" }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>

        <div style={{ marginBottom: 32 }}>
          <div style={{ ...mono10, letterSpacing: 3, color: "#f59e42", textTransform: "uppercase", marginBottom: 4 }}>VECTOR ANALYSIS</div>
          <h1 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 28, fontWeight: 300, color: "#e8ecf4", margin: 0, letterSpacing: -0.5 }}>Tuo</h1>
          <p style={{ ...mono10, color: "#3a4050", marginTop: 6 }}>
            TF-IDF embeddings {"\u00B7"} cosine similarity {"\u00B7"} Ollama LLM interpretation {"\u00B7"} CSV + HTML export
          </p>
        </div>

        <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
          <FileUpload label="Document A" color="#60a5fa" onTextLoad={setTextA} text={textA} />
          <FileUpload label="Document B" color="#f59e42" onTextLoad={setTextB} text={textB} />
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <label style={{ ...mono10, color: "#4a5568", letterSpacing: 1 }}>CHUNKS</label>
            <select value={chunkMode} onChange={e => setChunkMode(e.target.value)}
              style={{ background: "#141822", border: "1px solid #1e2230", color: "#9ca3af", borderRadius: 4, padding: "4px 8px", ...mono11, cursor: "pointer", outline: "none" }}>
              <option value="macro">Macro (drill-down)</option>
              <option value="row">Row / Paragraph</option>
              <option value="256">256 tok</option>
              <option value="512">512 tok</option>
              <option value="768">768 tok</option>
              <option value="1024">1024 tok</option>
            </select>
          </div>
          {chunkMode === "macro" && (
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <label style={{ ...mono9, color: "#34d399", letterSpacing: 1 }}>MACRO</label>
              <select value={macroSize} onChange={e => setMacroSize(Number(e.target.value))}
                style={{ background: "#141822", border: "1px solid #34d39930", color: "#34d399", borderRadius: 4, padding: "3px 6px", ...mono10, cursor: "pointer", outline: "none" }}>
                <option value={1024}>1024</option>
                <option value={1536}>1536</option>
                <option value={2048}>2048</option>
                <option value={3072}>3072</option>
                <option value={4096}>4096</option>
              </select>
            </div>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ ...mono9, color: "#818cf8", letterSpacing: 1 }}>DRILL</label>
            <select value={microSize} onChange={e => setMicroSize(e.target.value)}
              style={{ background: "#141822", border: "1px solid #818cf830", color: "#818cf8", borderRadius: 4, padding: "3px 6px", ...mono10, cursor: "pointer", outline: "none" }}>
              <option value="row">Row / Paragraph</option>
              <option value="128">128</option>
              <option value="256">256</option>
              <option value="384">384</option>
              <option value="512">512</option>
            </select>
          </div>
          <button onClick={analyze} disabled={!canRun || processing} style={{
            ...mono11, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase",
            background: canRun && !processing ? "linear-gradient(135deg, #f59e42, #f0c040)" : "#1a1e28",
            color: canRun && !processing ? "#0a0c12" : "#3a4050",
            border: "none", borderRadius: 6, padding: "10px 28px",
            cursor: canRun && !processing ? "pointer" : "not-allowed", transition: "all 0.2s",
          }}>{processing ? "\u27F3 Computing\u2026" : "\u25B6 Analyze"}</button>
        </div>

        <div style={{
          display: "flex", alignItems: "center", gap: 10, marginBottom: 32, flexWrap: "wrap",
          background: "#0e1018", borderRadius: 8, padding: "10px 14px", border: "1px solid #1e2230",
        }}>
          <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1, marginRight: 4 }}>{"\u{1F9E0}"} OLLAMA</div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ ...mono9, color: "#3a4050" }}>URL</label>
            <input value={ollamaUrl} onChange={e => setOllamaUrl(e.target.value)} style={{
              background: "#141822", border: "1px solid #1e2230", color: "#9ca3af",
              borderRadius: 4, padding: "4px 8px", ...mono10, outline: "none", width: 200,
            }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ ...mono9, color: "#3a4050" }}>MODEL</label>
            <input value={ollamaModel} onChange={e => setOllamaModel(e.target.value)} style={{
              background: "#141822", border: "1px solid #1e2230", color: "#9ca3af",
              borderRadius: 4, padding: "4px 8px", ...mono10, outline: "none", width: 140,
            }} />
          </div>
          {results && !batchInterpreting && <>
            <button onClick={() => batchInterpret(10)} style={actBtn(true)}>{"\u25B6"} Top 10</button>
            <button onClick={() => batchInterpret(20)} style={actBtn(true)}>{"\u25B6"} Top 20</button>
            <button onClick={() => batchInterpret(null, 0.3)} style={actBtn(true, "#34d399")}>
              {"\u25B6"} All {"\u2265"}30% ({pairsAbove30})
            </button>
          </>}
          {batchInterpreting && <>
            <button onClick={() => { if(abortRef.current) abortRef.current.abort(); setBatchInterpreting(false); }} style={actBtn(true, "#f87171")}>{"\u25A0"} Stop</button>
            <span style={{ ...mono9, color: "#818cf8", animation: "pulse 1.2s infinite" }}>{interpretedCount} done</span>
          </>}
          <button onClick={() => setShowPromptEditor(!showPromptEditor)} style={{
            ...mono9, background: showPromptEditor ? "#818cf820" : "#141822",
            border: "1px solid " + (showPromptEditor ? "#818cf850" : "#1e2230"),
            color: showPromptEditor ? "#818cf8" : "#4a5568",
            borderRadius: 4, padding: "4px 10px", cursor: "pointer", marginLeft: "auto",
          }}>{"\u270E"} Prompt</button>
        </div>

        {/* Prompt editor */}
        {showPromptEditor && (
          <div style={{
            background: "#0c0e16", borderRadius: 8, padding: 14, marginBottom: 32, marginTop: -24,
            border: "1px solid #818cf820",
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1 }}>LLM PROMPT TEMPLATE</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setPromptTemplate(DEFAULT_PROMPT_TEMPLATE)} style={{
                  ...mono9, background: "#141822", border: "1px solid #1e2230",
                  color: "#4a5568", borderRadius: 3, padding: "2px 8px", cursor: "pointer",
                }}>reset default</button>
              </div>
            </div>
            {/* Preset investigation modes */}
            <div style={{ display: "flex", gap: 4, marginBottom: 8, flexWrap: "wrap" }}>
              {[
                { label: "Default", t: DEFAULT_PROMPT_TEMPLATE },
                { label: "Contradictions", t: "You are a fact-checker comparing two text segments ({{SCORE}}% similar).\n\nSEGMENT A:\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B:\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nIdentify any contradictions, conflicting claims, or inconsistencies between these segments. If none exist, state that they are consistent. Be specific about what contradicts." },
                { label: "Compliance", t: "You are a compliance auditor. Compare these two segments ({{SCORE}}% similar) for regulatory or policy alignment.\n\nSEGMENT A (SOURCE):\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B (TARGET):\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nDoes Segment B satisfy or comply with the requirements in Segment A? List any gaps, violations, or areas of non-compliance. Be specific." },
                { label: "Plagiarism", t: "You are an academic integrity analyst. These two segments have a {{SCORE}}% lexical similarity.\n\nSEGMENT A:\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B:\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nAssess whether Segment B appears to be derived from Segment A (or vice versa). Consider: paraphrasing, structural copying, shared unique phrases, and independent convergence. Rate confidence: likely copied, possibly paraphrased, likely independent." },
                { label: "Coverage", t: "You are a document coverage analyst. Segment B should cover the topics in Segment A ({{SCORE}}% overlap).\n\nSEGMENT A (REFERENCE):\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B (UNDER REVIEW):\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nWhat topics from A are covered in B? What topics from A are missing in B? What does B add that A doesn't have?" },
                { label: "Diff", t: "You are a precise change-tracker. These segments are {{SCORE}}% similar.\n\nBEFORE:\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nAFTER:\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nDescribe the specific changes: what was added, removed, modified, or reworded. Be concise and factual." },
                { label: "Q&A", t: "Given these two related text segments ({{SCORE}}% similar), answer this question about their relationship:\n\nSEGMENT A:\n\"\"\"\n{{CHUNK_A}}\n\"\"\"\n\nSEGMENT B:\n\"\"\"\n{{CHUNK_B}}\n\"\"\"\n\nHow do these segments relate to each other? What would someone need to understand from A to make sense of B, and vice versa?" },
              ].map(p => (
                <button key={p.label} onClick={() => setPromptTemplate(p.t)} style={{
                  ...mono9,
                  background: promptTemplate === p.t ? "#818cf820" : "#141822",
                  border: "1px solid " + (promptTemplate === p.t ? "#818cf850" : "#1e2230"),
                  color: promptTemplate === p.t ? "#818cf8" : "#4a5568",
                  borderRadius: 3, padding: "3px 8px", cursor: "pointer",
                }}>{p.label}</button>
              ))}
            </div>
            <textarea
              value={promptTemplate}
              onChange={e => setPromptTemplate(e.target.value)}
              style={{
                width: "100%", minHeight: 140, maxHeight: 400, resize: "vertical",
                background: "#0a0c12", color: "#9ca3af", border: "1px solid #1e2230",
                borderRadius: 6, padding: 12,
                fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                lineHeight: 1.6, outline: "none", boxSizing: "border-box",
              }}
            />
            <div style={{ ...mono9, color: "#2a2f3a", marginTop: 6, lineHeight: 1.8 }}>
              Placeholders: <span style={{ color: "#818cf8" }}>{"{{CHUNK_A}}"}</span> <span style={{ color: "#818cf8" }}>{"{{CHUNK_B}}"}</span> <span style={{ color: "#818cf8" }}>{"{{SCORE}}"}</span> (percent) <span style={{ color: "#818cf8" }}>{"{{SCORE_RAW}}"}</span> (0-1)
            </div>
          </div>
        )}

        {results && (
          <div>
            <div style={{ display: "flex", gap: 1, marginBottom: 24, borderRadius: 8, overflow: "hidden" }}>
              {[
                { l: "CHUNKS A", v: results.chunksA.length, c: "#60a5fa" },
                { l: "CHUNKS B", v: results.chunksB.length, c: "#f59e42" },
                { l: "VOCAB", v: results.vocabSize.toLocaleString(), c: "#818cf8" },
                { l: "AVG SIM", v: (results.stats.avg*100).toFixed(1)+"%", c: "#34d399" },
                { l: "MAX SIM", v: (results.stats.max*100).toFixed(1)+"%", c: "#f0c040" },
                { l: "INTERPRETED", v: interpretedCount, c: "#818cf8" },
              ].map(s => (
                <div key={s.l} style={{ flex: 1, background: "#0e1018", padding: "14px 12px", textAlign: "center" }}>
                  <div style={{ ...mono9, color: "#3a4050", letterSpacing: 1, marginBottom: 4 }}>{s.l}</div>
                  <div style={{ ...mono11, fontSize: 18, color: s.c, fontWeight: 700 }}>{s.v}</div>
                </div>
              ))}
            </div>

            {/* Drill level controls */}
            <div style={{
              display: "flex", alignItems: "center", gap: 10, marginBottom: 16,
              background: "#0c0e16", borderRadius: 8, padding: "8px 14px", border: "1px solid #1e2230",
              flexWrap: "wrap",
            }}>
              <span style={{ ...mono9, color: "#34d399", letterSpacing: 1 }}>{"\u{1F50D}"} DRILL</span>

              {/* Depth indicator */}
              <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                {Array.from({ length: drillDepth + 1 }, (_, i) => (
                  <div key={i} style={{
                    width: i === drillDepth ? 10 : 6, height: i === drillDepth ? 10 : 6,
                    borderRadius: "50%",
                    background: i === drillDepth ? "#34d399" : "#34d39940",
                    border: "1px solid #34d39960",
                    transition: "all 0.2s",
                  }} />
                ))}
                <span style={{ ...mono9, color: "#34d39960", marginLeft: 4 }}>
                  Level {drillDepth} {"\u00B7"} {results?.drillLabel || ""}
                </span>
              </div>

              {/* Drill All button */}
              <button
                onClick={drillAll}
                disabled={!results || drilling}
                style={{
                  ...mono10, fontWeight: 600, letterSpacing: 1,
                  background: results && !drilling ? "#34d39920" : "#141822",
                  border: "1px solid " + (results && !drilling ? "#34d39950" : "#1e2230"),
                  color: results && !drilling ? "#34d399" : "#3a4050",
                  borderRadius: 5, padding: "5px 14px",
                  cursor: results && !drilling ? "pointer" : "not-allowed",
                  transition: "all 0.2s",
                }}
              >
                {drilling ? "\u27F3 Drilling..." : "\u25B6 Drill All \u2193"}
              </button>

              {/* Drill Up button */}
              {drillDepth > 0 && (
                <button onClick={drillUp} style={{
                  ...mono10, fontWeight: 600, letterSpacing: 1,
                  background: "#f59e4220", border: "1px solid #f59e4250",
                  color: "#f59e42", borderRadius: 5, padding: "5px 14px", cursor: "pointer",
                }}>{"\u25B2"} Drill Up</button>
              )}

              {/* Info */}
              <span style={{ ...mono9, color: "#2a2f3a", marginLeft: "auto" }}>
                {results ? results.chunksA.length + " \u00D7 " + results.chunksB.length + " = " + (results.chunksA.length * results.chunksB.length) + " pairs" : ""}
                {drillDepth > 0 ? " \u00B7 drill up to restore parent view" : " \u00B7 drill to sub-chunk all pairs at micro level"}
              </span>
            </div>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #1e2230", marginBottom: 20 }}>
              <div style={{ display: "flex" }}>
                {["heatmap", "matches", "documents", "graph", "distribution"].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{
                    ...mono11, letterSpacing: 1, textTransform: "uppercase",
                    background: "none", border: "none",
                    color: tab === t ? "#f0c040" : "#4a5568",
                    borderBottom: tab === t ? "2px solid #f0c040" : "2px solid transparent",
                    padding: "10px 20px", cursor: "pointer", transition: "all 0.15s",
                  }}>{t}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => exportCSV(results, interpretations)} style={{
                  ...mono10, fontWeight: 600, background: "#34d39918", border: "1px solid #34d39940",
                  color: "#34d399", borderRadius: 5, padding: "6px 16px", cursor: "pointer", marginBottom: 4,
                }}>{"\u2913"} CSV</button>
                <button onClick={() => exportHTML(results, interpretations)} style={{
                  ...mono10, fontWeight: 600, background: "#60a5fa18", border: "1px solid #60a5fa40",
                  color: "#60a5fa", borderRadius: 5, padding: "6px 16px", cursor: "pointer", marginBottom: 4,
                }}>{"\u2913"} HTML Report</button>
              </div>
            </div>

            {tab === "heatmap" && (
              <FullscreenPanel label="SIMILARITY HEATMAP">
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 12 }}>SIMILARITY MATRIX {"\u00B7"} click any cell for details</div>
                <Heatmap matrix={results.matrix} chunksA={results.chunksA} chunksB={results.chunksB} onCellClick={setSelectedCell} selectedCell={selectedCell} />
                {selectedCell && (
                  <div style={{ marginTop: 16, background: "#141822", borderRadius: 8, padding: 16, border: "1px solid #f0c04020" }}>
                    <div style={{ ...mono11, color: "#f0c040", marginBottom: 12 }}>
                      A{selectedCell[0]+1} {"\u27F7"} B{selectedCell[1]+1} {"\u00B7"} {(results.matrix[selectedCell[0]][selectedCell[1]]*100).toFixed(1)}%
                    </div>
                    <div style={{ display: "flex", gap: 12 }}>
                      <div style={{ flex: "1 1 50%", minWidth: 0, borderLeft: "3px solid #60a5fa20", padding: "8px 12px", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: "#60a5fa", marginBottom: 6 }}>DOC A {"\u00B7"} CHUNK {selectedCell[0]+1}</div>
                        <ChunkContent text={results.chunksA[selectedCell[0]]} maxLen={400} fontSize={12} />
                      </div>
                      <div style={{ flex: "1 1 50%", minWidth: 0, borderLeft: "3px solid #f59e4220", padding: "8px 12px", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: "#f59e42", marginBottom: 6 }}>DOC B {"\u00B7"} CHUNK {selectedCell[1]+1}</div>
                        <ChunkContent text={results.chunksB[selectedCell[1]]} maxLen={400} fontSize={12} />
                      </div>
                    </div>
                    <DrillDown
                      chunkA={results.chunksA[selectedCell[0]]}
                      chunkB={results.chunksB[selectedCell[1]]}
                      macroLabelA={"A"+(selectedCell[0]+1)}
                      macroLabelB={"B"+(selectedCell[1]+1)}
                      microSize={microSize}
                    />
                  </div>
                )}
              </div>
              </FullscreenPanel>
            )}

            {tab === "matches" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 4 }}>TOP {topMatches.length} MATCHES {"\u00B7"} click to expand</div>
                {topMatches.map((m, idx) => {
                  const k = m.i+"-"+m.j;
                  return (
                    <MatchCard key={k} rank={idx+1} i={m.i} j={m.j} score={m.score}
                      chunkA={results.chunksA[m.i]} chunkB={results.chunksB[m.j]}
                      isExpanded={expandedMatch === idx}
                      onToggle={() => setExpandedMatch(expandedMatch === idx ? -1 : idx)}
                      interpretation={interpretations[k]} interpStatus={interpStatus[k]}
                      onInterpret={() => interpretPair(m.i, m.j, m.score, results.chunksA[m.i], results.chunksB[m.j])}
                      microSize={microSize}
                    />
                  );
                })}
              </div>
            )}

            {tab === "documents" && (
              <FullscreenPanel label="DOCUMENT VIEW">
              <DocumentView
                chunksA={results.chunksA}
                chunksB={results.chunksB}
                matrix={results.matrix}
                interpretations={interpretations}
              />
              </FullscreenPanel>
            )}

            {tab === "graph" && (
              <FullscreenPanel label="CHUNK GRAPH">
              <GraphView
                chunksA={results.chunksA}
                chunksB={results.chunksB}
                matrix={results.matrix}
                interpretations={interpretations}
                microSize={microSize}
              />
              </FullscreenPanel>
            )}

            {tab === "distribution" && (
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 16 }}>SIMILARITY SCORE DISTRIBUTION</div>
                <DistributionChart pairs={results.pairs} />
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
