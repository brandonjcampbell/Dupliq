<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dupliq</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c12; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0c12; }
  ::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
  textarea::-webkit-scrollbar-thumb { background: #2a2f3a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

// ─── NLP Utilities ───────────────────────────────────────────────

function tokenize(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s'-]/g, " ")
    .split(/\s+/)
    .filter((t) => t.length > 1);
}

const STOP_WORDS = new Set([
  "the","be","to","of","and","a","in","that","have","i","it","for","not","on",
  "with","he","as","you","do","at","this","but","his","by","from","they","we",
  "say","her","she","or","an","will","my","one","all","would","there","their",
  "what","so","up","out","if","about","who","get","which","go","me","when",
  "make","can","like","time","no","just","him","know","take","people","into",
  "year","your","good","some","could","them","see","other","than","then","now",
  "look","only","come","its","over","think","also","back","after","use","two",
  "how","our","work","first","well","way","even","new","want","because","any",
  "these","give","day","most","us","is","was","are","were","been","has","had",
  "did","does","am","being","more","very","much","such","own","same","should",
]);

function removeStopWords(tokens) {
  return tokens.filter((t) => !STOP_WORDS.has(t));
}

// ─── Chunking (sentence-boundary-aware, ~512 token target) ──────

function splitSentences(text) {
  const raw = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
  return raw.map((s) => s.trim()).filter((s) => s.length > 0);
}

function chunkDocument(text, targetTokens = 512, overlap = 64) {
  const sentences = splitSentences(text);
  const chunks = [];
  let current = [];
  let currentLen = 0;

  for (const sentence of sentences) {
    const sentTokens = tokenize(sentence).length;
    if (currentLen + sentTokens > targetTokens && current.length > 0) {
      chunks.push(current.join(" "));
      let overlapLen = 0;
      let overlapStart = current.length;
      for (let i = current.length - 1; i >= 0; i--) {
        overlapLen += tokenize(current[i]).length;
        if (overlapLen >= overlap) { overlapStart = i; break; }
      }
      current = current.slice(overlapStart);
      currentLen = current.reduce((a, s) => a + tokenize(s).length, 0);
    }
    current.push(sentence);
    currentLen += sentTokens;
  }
  if (current.length > 0) chunks.push(current.join(" "));
  return chunks;
}

// ─── TF-IDF Vectorization ───────────────────────────────────────

function buildVocabulary(allChunks) {
  const df = {};
  const N = allChunks.length;
  allChunks.forEach((chunk) => {
    const unique = new Set(removeStopWords(tokenize(chunk)));
    unique.forEach((t) => { df[t] = (df[t] || 0) + 1; });
  });
  const vocab = Object.keys(df).filter(
    (t) => df[t] > 1 && df[t] < N * 0.85
  );
  const idf = {};
  vocab.forEach((t) => { idf[t] = Math.log(N / df[t]) + 1; });
  return { vocab, idf };
}

function tfidfVector(chunk, vocab, idf) {
  const tokens = removeStopWords(tokenize(chunk));
  const tf = {};
  tokens.forEach((t) => { tf[t] = (tf[t] || 0) + 1; });
  const maxTf = Math.max(...Object.values(tf), 1);
  const vec = new Float64Array(vocab.length);
  vocab.forEach((t, i) => {
    if (tf[t]) vec[i] = (0.5 + 0.5 * tf[t] / maxTf) * (idf[t] || 0);
  });
  return vec;
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  const denom = Math.sqrt(na) * Math.sqrt(nb);
  return denom === 0 ? 0 : dot / denom;
}

// ─── Similarity Matrix Computation ──────────────────────────────

function computeSimilarityMatrix(chunksA, chunksB) {
  const allChunks = [...chunksA, ...chunksB];
  const { vocab, idf } = buildVocabulary(allChunks);
  const vecsA = chunksA.map((c) => tfidfVector(c, vocab, idf));
  const vecsB = chunksB.map((c) => tfidfVector(c, vocab, idf));
  const matrix = [];
  for (let i = 0; i < vecsA.length; i++) {
    const row = [];
    for (let j = 0; j < vecsB.length; j++) {
      row.push(cosineSimilarity(vecsA[i], vecsB[j]));
    }
    matrix.push(row);
  }
  return { matrix, vocab, idf };
}

// ─── Color helpers ──────────────────────────────────────────────

function simColor(val) {
  if (val < 0.05) return "rgba(20,24,32,0.95)";
  const r = Math.round(255 * Math.min(1, val * 2.2));
  const g = Math.round(180 * Math.min(1, val * 1.1));
  const b = Math.round(60 + 60 * (1 - val));
  return `rgba(${r},${g},${b},${0.3 + val * 0.7})`;
}

function simTextColor(val) {
  return val > 0.35 ? "#0a0c10" : "#c8ccd4";
}

// ─── Components ─────────────────────────────────────────────────

function FileUpload({ label, color, onTextLoad, text }) {
  const fileRef = useRef(null);
  const [dragging, setDragging] = useState(false);

  const readFile = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => onTextLoad(e.target.result);
    reader.readAsText(file);
  }, [onTextLoad]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragging(false);
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  }, [readFile]);

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        fontSize: 11, letterSpacing: 2, textTransform: "uppercase",
        color, marginBottom: 8, fontWeight: 600,
      }}>{label}</div>
      <div
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        onClick={() => !text && fileRef.current?.click()}
        style={{
          border: `1.5px dashed ${dragging ? color : "#2a2f3a"}`,
          borderRadius: 8, padding: text ? 0 : 32,
          background: dragging ? `${color}08` : "#0e1018",
          cursor: text ? "default" : "pointer",
          transition: "all 0.2s",
          minHeight: 120,
        }}
      >
        <input
          ref={fileRef}
          type="file"
          accept=".txt,.md,.html,.csv,.json,.xml,.log,.py,.js,.ts,.tex,.rst"
          style={{ display: "none" }}
          onChange={(e) => e.target.files[0] && readFile(e.target.files[0])}
        />
        {text ? (
          <div style={{ position: "relative" }}>
            <textarea
              value={text}
              onChange={(e) => onTextLoad(e.target.value)}
              style={{
                width: "100%", minHeight: 160, maxHeight: 280,
                background: "transparent", color: "#9ca3af",
                border: "none", resize: "vertical", padding: 14,
                fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                lineHeight: 1.7, outline: "none", boxSizing: "border-box",
              }}
            />
            <button
              onClick={(e) => { e.stopPropagation(); onTextLoad(""); }}
              style={{
                position: "absolute", top: 8, right: 8,
                background: "#1a1e28", border: `1px solid ${color}40`,
                color, borderRadius: 4, padding: "2px 8px",
                cursor: "pointer", fontSize: 11,
                fontFamily: "'JetBrains Mono', monospace",
              }}
            >clear</button>
          </div>
        ) : (
          <div style={{ textAlign: "center", color: "#4a5060" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>&#128196;</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>
              Drop file or click to upload
            </div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, marginTop: 4, color: "#3a4050" }}>
              .txt .md .html .csv .json .xml .py .js
            </div>
          </div>
        )}
      </div>
      {text && (
        <div style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
          color: "#4a5060", marginTop: 6,
        }}>
          {tokenize(text).length} tokens &middot; {text.length} chars
        </div>
      )}
    </div>
  );
}

function Heatmap({ matrix, chunksA, chunksB, onCellClick, selectedCell }) {
  if (!matrix.length) return null;
  const rows = matrix.length;
  const cols = matrix[0].length;
  const cellSize = Math.max(16, Math.min(48, Math.floor(600 / Math.max(rows, cols))));

  return (
    <div style={{ overflowX: "auto", padding: "8px 0" }}>
      <div style={{ display: "inline-block" }}>
        <div style={{ display: "flex", marginLeft: cellSize + 20 }}>
          {chunksB.map((_, j) => (
            <div key={j} style={{
              width: cellSize, textAlign: "center",
              fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
              color: "#4a5568", transform: "rotate(-45deg)",
              transformOrigin: "center", height: 30,
            }}>B{j + 1}</div>
          ))}
        </div>
        {matrix.map((row, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center" }}>
            <div style={{
              width: 20, fontFamily: "'JetBrains Mono', monospace",
              fontSize: 9, color: "#4a5568", textAlign: "right", marginRight: 4,
            }}>A{i + 1}</div>
            {row.map((val, j) => {
              const selected = selectedCell && selectedCell[0] === i && selectedCell[1] === j;
              return (
                <div
                  key={j}
                  onClick={() => onCellClick([i, j])}
                  title={`A${i + 1} \u2194 B${j + 1}: ${(val * 100).toFixed(1)}%`}
                  style={{
                    width: cellSize, height: cellSize,
                    background: simColor(val),
                    border: selected ? "2px solid #f0c040" : "1px solid #181c24",
                    borderRadius: 2, cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: cellSize > 28 ? 9 : 0,
                    fontFamily: "'JetBrains Mono', monospace",
                    color: simTextColor(val),
                    transition: "all 0.15s",
                    boxSizing: "border-box",
                  }}
                >
                  {cellSize > 28 ? (val * 100).toFixed(0) : ""}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function MatchCard({ rank, i, j, score, chunkA, chunkB, isExpanded, onToggle }) {
  const barWidth = Math.max(4, score * 100);
  return (
    <div
      onClick={onToggle}
      style={{
        background: "#0e1018", borderRadius: 8,
        border: `1px solid ${score > 0.4 ? "#f0c04030" : "#1e2230"}`,
        padding: 16, cursor: "pointer",
        transition: "all 0.2s",
      }}
    >
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 20,
          color: "#2a2f3a", fontWeight: 700, minWidth: 36,
        }}>#{rank}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
              color: "#60a5fa", background: "#60a5fa12",
              padding: "2px 8px", borderRadius: 4,
            }}>A{i + 1}</span>
            <span style={{ color: "#3a4050", fontSize: 12 }}>\u27F7</span>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
              color: "#f59e42", background: "#f59e4212",
              padding: "2px 8px", borderRadius: 4,
            }}>B{j + 1}</span>
          </div>
          <div style={{
            background: "#181c24", borderRadius: 4, height: 6, overflow: "hidden",
          }}>
            <div style={{
              width: `${barWidth}%`, height: "100%",
              background: "linear-gradient(90deg, #f59e42, #f0c040)",
              borderRadius: 4, transition: "width 0.4s ease",
            }} />
          </div>
        </div>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 18,
          color: score > 0.4 ? "#f0c040" : score > 0.2 ? "#f59e42" : "#4a5568",
          fontWeight: 700, minWidth: 60, textAlign: "right",
        }}>{(score * 100).toFixed(1)}%</div>
      </div>
      {isExpanded && (
        <div style={{ marginTop: 16, display: "flex", gap: 12 }}>
          <div style={{
            flex: 1, background: "#141822", borderRadius: 6,
            padding: 12, borderLeft: "3px solid #60a5fa30",
          }}>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
              color: "#60a5fa", marginBottom: 6, letterSpacing: 1,
            }}>DOC A &middot; CHUNK {i + 1}</div>
            <div style={{
              fontFamily: "'IBM Plex Serif', Georgia, serif", fontSize: 12.5,
              color: "#9ca3af", lineHeight: 1.7,
            }}>{chunkA.slice(0, 600)}{chunkA.length > 600 ? "\u2026" : ""}</div>
          </div>
          <div style={{
            flex: 1, background: "#141822", borderRadius: 6,
            padding: 12, borderLeft: "3px solid #f59e4230",
          }}>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
              color: "#f59e42", marginBottom: 6, letterSpacing: 1,
            }}>DOC B &middot; CHUNK {j + 1}</div>
            <div style={{
              fontFamily: "'IBM Plex Serif', Georgia, serif", fontSize: 12.5,
              color: "#9ca3af", lineHeight: 1.7,
            }}>{chunkB.slice(0, 600)}{chunkB.length > 600 ? "\u2026" : ""}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function DistributionChart({ pairs }) {
  const buckets = useMemo(() => {
    const b = Array(20).fill(0);
    pairs.forEach((p) => {
      const idx = Math.min(19, Math.floor(p.score * 20));
      b[idx]++;
    });
    return b;
  }, [pairs]);

  const max = Math.max(...buckets, 1);

  return (
    <div>
      <div style={{
        display: "flex", alignItems: "flex-end", gap: 2, height: 180,
        padding: "0 4px",
      }}>
        {buckets.map((count, i) => {
          const pct = (i * 5);
          const h = Math.max(2, (count / max) * 160);
          const intensity = i / 19;
          return (
            <div key={i} style={{
              flex: 1, display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "flex-end",
            }}>
              {count > 0 && (
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 8,
                  color: "#4a5568", marginBottom: 2,
                }}>{count}</div>
              )}
              <div
                title={`${pct}-${pct + 5}%: ${count} pairs`}
                style={{
                  width: "100%", height: h, borderRadius: "3px 3px 0 0",
                  background: `rgba(${Math.round(240 * intensity + 40)}, ${Math.round(160 * intensity + 60)}, ${Math.round(64 + 30 * (1 - intensity))}, ${0.4 + intensity * 0.6})`,
                  transition: "height 0.3s ease",
                }}
              />
            </div>
          );
        })}
      </div>
      <div style={{
        display: "flex", justifyContent: "space-between",
        fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
        color: "#3a4050", marginTop: 6, padding: "0 4px",
      }}>
        <span>0%</span>
        <span>25%</span>
        <span>50%</span>
        <span>75%</span>
        <span>100%</span>
      </div>
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────────

function App() {
  const [textA, setTextA] = useState("");
  const [textB, setTextB] = useState("");
  const [results, setResults] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [selectedCell, setSelectedCell] = useState(null);
  const [expandedMatch, setExpandedMatch] = useState(0);
  const [tab, setTab] = useState("heatmap");
  const [chunkTarget, setChunkTarget] = useState(512);

  const canRun = textA.trim().length > 20 && textB.trim().length > 20;

  const analyze = useCallback(() => {
    setProcessing(true);
    setResults(null);
    setSelectedCell(null);
    setExpandedMatch(0);
    setTimeout(() => {
      try {
        const chunksA = chunkDocument(textA, chunkTarget, Math.floor(chunkTarget * 0.12));
        const chunksB = chunkDocument(textB, chunkTarget, Math.floor(chunkTarget * 0.12));
        const { matrix, vocab } = computeSimilarityMatrix(chunksA, chunksB);

        const pairs = [];
        for (let i = 0; i < matrix.length; i++) {
          for (let j = 0; j < matrix[0].length; j++) {
            pairs.push({ i, j, score: matrix[i][j] });
          }
        }
        pairs.sort((a, b) => b.score - a.score);

        const allScores = pairs.map((p) => p.score);
        const avg = allScores.reduce((a, b) => a + b, 0) / allScores.length;
        const max = allScores[0];
        const highCount = allScores.filter((s) => s > 0.3).length;

        setResults({
          chunksA, chunksB, matrix, pairs,
          vocabSize: vocab.length,
          stats: { avg, max, highCount, totalPairs: pairs.length },
        });
      } catch (err) {
        console.error(err);
      }
      setProcessing(false);
    }, 50);
  }, [textA, textB, chunkTarget]);

  const topMatches = results ? results.pairs.slice(0, 20) : [];

  return (
    <div style={{
      minHeight: "100vh", background: "#0a0c12",
      color: "#c8ccd4", padding: "24px 20px",
      fontFamily: "'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif",
    }}>
      {/* Header */}
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        <div style={{ marginBottom: 32 }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
            letterSpacing: 3, color: "#f59e42", textTransform: "uppercase",
            marginBottom: 4,
          }}>VECTOR ANALYSIS</div>
          <h1 style={{
            fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 28,
            fontWeight: 300, color: "#e8ecf4", margin: 0, letterSpacing: -0.5,
          }}>Dupliq</h1>
          <p style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
            color: "#3a4050", marginTop: 6,
          }}>
            TF-IDF embeddings &middot; cosine similarity &middot; chunk-level cross-analysis &middot; optimized for 20B context
          </p>
        </div>

        {/* Upload area */}
        <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
          <FileUpload label="Document A" color="#60a5fa" onTextLoad={setTextA} text={textA} />
          <FileUpload label="Document B" color="#f59e42" onTextLoad={setTextB} text={textB} />
        </div>

        {/* Controls */}
        <div style={{
          display: "flex", alignItems: "center", gap: 16,
          marginBottom: 32, flexWrap: "wrap",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <label style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
              color: "#4a5568", letterSpacing: 1,
            }}>CHUNK SIZE</label>
            <select
              value={chunkTarget}
              onChange={(e) => setChunkTarget(Number(e.target.value))}
              style={{
                background: "#141822", border: "1px solid #1e2230",
                color: "#9ca3af", borderRadius: 4, padding: "4px 8px",
                fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                cursor: "pointer", outline: "none",
              }}
            >
              <option value={256}>256 tok (fine-grain)</option>
              <option value={512}>512 tok (optimal 20B)</option>
              <option value={768}>768 tok (balanced)</option>
              <option value={1024}>1024 tok (coarse)</option>
            </select>
          </div>

          <button
            onClick={analyze}
            disabled={!canRun || processing}
            style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
              fontWeight: 600, letterSpacing: 1, textTransform: "uppercase",
              background: canRun && !processing
                ? "linear-gradient(135deg, #f59e42, #f0c040)" : "#1a1e28",
              color: canRun && !processing ? "#0a0c12" : "#3a4050",
              border: "none", borderRadius: 6, padding: "10px 28px",
              cursor: canRun && !processing ? "pointer" : "not-allowed",
              transition: "all 0.2s",
            }}
          >
            {processing ? "\u27F3 Computing\u2026" : "\u25B6 Analyze"}
          </button>
        </div>

        {/* Results */}
        {results && (
          <div>
            {/* Stats bar */}
            <div style={{
              display: "flex", gap: 1, marginBottom: 24, borderRadius: 8,
              overflow: "hidden",
            }}>
              {[
                { label: "CHUNKS A", value: results.chunksA.length, color: "#60a5fa" },
                { label: "CHUNKS B", value: results.chunksB.length, color: "#f59e42" },
                { label: "VOCAB", value: results.vocabSize.toLocaleString(), color: "#818cf8" },
                { label: "AVG SIM", value: `${(results.stats.avg * 100).toFixed(1)}%`, color: "#34d399" },
                { label: "MAX SIM", value: `${(results.stats.max * 100).toFixed(1)}%`, color: "#f0c040" },
                { label: "HIGH (>30%)", value: results.stats.highCount, color: "#f87171" },
              ].map((s) => (
                <div key={s.label} style={{
                  flex: 1, background: "#0e1018", padding: "14px 12px",
                  textAlign: "center",
                }}>
                  <div style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
                    color: "#3a4050", letterSpacing: 1, marginBottom: 4,
                  }}>{s.label}</div>
                  <div style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 18,
                    color: s.color, fontWeight: 700,
                  }}>{s.value}</div>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div style={{
              display: "flex", gap: 0, marginBottom: 20,
              borderBottom: "1px solid #1e2230",
            }}>
              {["heatmap", "matches", "distribution"].map((t) => (
                <button
                  key={t}
                  onClick={() => setTab(t)}
                  style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                    letterSpacing: 1, textTransform: "uppercase",
                    background: "none", border: "none",
                    color: tab === t ? "#f0c040" : "#4a5568",
                    borderBottom: tab === t ? "2px solid #f0c040" : "2px solid transparent",
                    padding: "10px 20px", cursor: "pointer",
                    transition: "all 0.15s",
                  }}
                >{t}</button>
              ))}
            </div>

            {/* Heatmap tab */}
            {tab === "heatmap" && (
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
                  color: "#4a5568", marginBottom: 12,
                }}>
                  SIMILARITY MATRIX &middot; click any cell for details &middot; rows = Doc A chunks, cols = Doc B chunks
                </div>
                <Heatmap
                  matrix={results.matrix}
                  chunksA={results.chunksA}
                  chunksB={results.chunksB}
                  onCellClick={setSelectedCell}
                  selectedCell={selectedCell}
                />
                {selectedCell && (
                  <div style={{
                    marginTop: 16, background: "#141822", borderRadius: 8,
                    padding: 16, border: "1px solid #f0c04020",
                  }}>
                    <div style={{
                      fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                      color: "#f0c040", marginBottom: 12,
                    }}>
                      A{selectedCell[0] + 1} \u27F7 B{selectedCell[1] + 1}
                      {" \u00B7 "}
                      {(results.matrix[selectedCell[0]][selectedCell[1]] * 100).toFixed(1)}% similarity
                    </div>
                    <div style={{ display: "flex", gap: 12 }}>
                      <div style={{
                        flex: 1, borderLeft: "3px solid #60a5fa20",
                        padding: "8px 12px",
                      }}>
                        <div style={{
                          fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
                          color: "#60a5fa", marginBottom: 6,
                        }}>DOC A &middot; CHUNK {selectedCell[0] + 1}</div>
                        <div style={{
                          fontFamily: "'IBM Plex Serif', serif", fontSize: 12,
                          color: "#8a8f9c", lineHeight: 1.7,
                        }}>{results.chunksA[selectedCell[0]].slice(0, 400)}{"\u2026"}</div>
                      </div>
                      <div style={{
                        flex: 1, borderLeft: "3px solid #f59e4220",
                        padding: "8px 12px",
                      }}>
                        <div style={{
                          fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
                          color: "#f59e42", marginBottom: 6,
                        }}>DOC B &middot; CHUNK {selectedCell[1] + 1}</div>
                        <div style={{
                          fontFamily: "'IBM Plex Serif', serif", fontSize: 12,
                          color: "#8a8f9c", lineHeight: 1.7,
                        }}>{results.chunksB[selectedCell[1]].slice(0, 400)}{"\u2026"}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Matches tab */}
            {tab === "matches" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
                  color: "#4a5568", marginBottom: 4,
                }}>
                  TOP {topMatches.length} MATCHES &middot; click to expand
                </div>
                {topMatches.map((m, idx) => (
                  <MatchCard
                    key={`${m.i}-${m.j}`}
                    rank={idx + 1}
                    i={m.i} j={m.j} score={m.score}
                    chunkA={results.chunksA[m.i]}
                    chunkB={results.chunksB[m.j]}
                    isExpanded={expandedMatch === idx}
                    onToggle={() => setExpandedMatch(expandedMatch === idx ? -1 : idx)}
                  />
                ))}
              </div>
            )}

            {/* Distribution tab */}
            {tab === "distribution" && (
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
                  color: "#4a5568", marginBottom: 16,
                }}>SIMILARITY SCORE DISTRIBUTION</div>
                <DistributionChart pairs={results.pairs} />
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
