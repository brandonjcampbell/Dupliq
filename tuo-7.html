<script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

// ═══════════════════════════════════════════════════════════════
// NLP UTILITIES
// ═══════════════════════════════════════════════════════════════

function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s'-]/g, " ").split(/\s+/).filter(t => t.length > 1);
}

const STOP_WORDS = new Set([
  "the","be","to","of","and","a","in","that","have","i","it","for","not","on",
  "with","he","as","you","do","at","this","but","his","by","from","they","we",
  "say","her","she","or","an","will","my","one","all","would","there","their",
  "what","so","up","out","if","about","who","get","which","go","me","when",
  "make","can","like","time","no","just","him","know","take","people","into",
  "year","your","good","some","could","them","see","other","than","then","now",
  "look","only","come","its","over","think","also","back","after","use","two",
  "how","our","work","first","well","way","even","new","want","because","any",
  "these","give","day","most","us","is","was","are","were","been","has","had",
  "did","does","am","being","more","very","much","such","own","same","should",
]);

function removeStopWords(tokens) { return tokens.filter(t => !STOP_WORDS.has(t)); }

function splitSentences(text) {
  const raw = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
  return raw.map(s => s.trim()).filter(s => s.length > 0);
}

// ═══════════════════════════════════════════════════════════════
// CSV-AWARE CHUNKING
// ═══════════════════════════════════════════════════════════════

function parseCSVLines(text) {
  // Splits text into logical CSV rows, respecting quoted fields
  // that may contain newlines, commas, and escaped quotes ("")
  const rows = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && i + 1 < text.length && text[i + 1] === '"') { current += '""'; i++; }
      else { inQuotes = !inQuotes; current += ch; }
    } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
      if (ch === "\r" && i + 1 < text.length && text[i + 1] === "\n") i++;
      if (current.trim().length > 0) rows.push(current);
      current = "";
    } else { current += ch; }
  }
  if (current.trim().length > 0) rows.push(current);
  return rows;
}

function parseCSVCells(row, delim) {
  // Splits a single logical CSV row into cells, respecting quotes
  const cells = [];
  let current = "", inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') {
      if (inQ && i + 1 < row.length && row[i + 1] === '"') { current += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === delim && !inQ) {
      cells.push(current); current = "";
    } else { current += ch; }
  }
  cells.push(current);
  return cells;
}

function detectDelimiter(headerRow) {
  // Count unquoted commas vs tabs to determine delimiter
  let commas = 0, tabs = 0, inQ = false;
  for (let i = 0; i < headerRow.length; i++) {
    const ch = headerRow[i];
    if (ch === '"') inQ = !inQ;
    else if (!inQ) {
      if (ch === ',') commas++;
      if (ch === '\t') tabs++;
    }
  }
  return tabs > commas ? "\t" : ",";
}

function isCSV(text) {
  // Use quote-aware row parser for detection
  const rows = parseCSVLines(text);
  if (rows.length < 3) return false;
  const delim = detectDelimiter(rows[0]);
  const headerCols = parseCSVCells(rows[0], delim).length;
  if (headerCols < 2) return false;
  let consistent = 0;
  for (let i = 1; i < Math.min(rows.length, 8); i++) {
    const cols = parseCSVCells(rows[i], delim).length;
    if (Math.abs(cols - headerCols) <= 1) consistent++;
  }
  return consistent >= Math.min(rows.length - 1, 4);
}

function chunkCSV(text, targetTokens) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return [text];

  const header = rows[0];
  const headerTok = tokenize(header).length;
  const dataRows = rows.slice(1);
  const chunks = [];
  let curRows = [];
  let curTok = headerTok; // header always counted toward budget

  for (const row of dataRows) {
    const rowTok = tokenize(row).length;

    // Would adding this row exceed the budget?
    if (curTok + rowTok > targetTokens && curRows.length > 0) {
      // Flush current batch: header + accumulated rows = valid CSV
      chunks.push(header + "\n" + curRows.join("\n"));
      curRows = [];
      curTok = headerTok;
    }

    // Append the whole row (never split mid-row)
    curRows.push(row);
    curTok += rowTok;
  }

  // Flush remaining rows
  if (curRows.length > 0) {
    chunks.push(header + "\n" + curRows.join("\n"));
  }

  return chunks.length > 0 ? chunks : [text];
}

function chunkText(text, targetTokens, overlap) {
  const sentences = splitSentences(text);
  const chunks = [];
  let current = [], currentLen = 0;
  for (const sentence of sentences) {
    const stk = tokenize(sentence).length;
    if (currentLen + stk > targetTokens && current.length > 0) {
      chunks.push(current.join(" "));
      let oLen = 0, oStart = current.length;
      for (let i = current.length - 1; i >= 0; i--) {
        oLen += tokenize(current[i]).length;
        if (oLen >= overlap) { oStart = i; break; }
      }
      current = current.slice(oStart);
      currentLen = current.reduce((a, s) => a + tokenize(s).length, 0);
    }
    current.push(sentence); currentLen += stk;
  }
  if (current.length > 0) chunks.push(current.join(" "));
  return chunks;
}

function chunkDocument(text, mode = "512", macroSize = 2048) {
  if (mode === "row" || mode === "paragraph") {
    return isCSV(text) ? chunkByRow(text) : chunkByParagraph(text);
  }
  if (mode === "macro") {
    const overlap = Math.floor(macroSize * 0.06);
    return isCSV(text) ? chunkCSV(text, macroSize) : chunkText(text, macroSize, overlap);
  }
  const targetTokens = parseInt(mode, 10) || 512;
  const overlap = Math.floor(targetTokens * 0.12);
  return isCSV(text) ? chunkCSV(text, targetTokens) : chunkText(text, targetTokens, overlap);
}

function subChunk(text, targetTokens = 256) {
  if (isCSV(text)) return chunkCSV(text, targetTokens);
  return chunkText(text, targetTokens, Math.floor(targetTokens * 0.1));
}

// One chunk per CSV row (header prepended to each)
function chunkByRow(text) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return [text];
  const header = rows[0];
  return rows.slice(1).map(r => header + "\n" + r);
}

// One chunk per paragraph (split on blank lines / double newlines)
function chunkByParagraph(text) {
  const paras = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
  if (paras.length === 0) return [text];
  return paras;
}

// ═══════════════════════════════════════════════════════════════
// TF-IDF + COSINE SIMILARITY
// ═══════════════════════════════════════════════════════════════

function buildVocabulary(allChunks) {
  const df = {}, N = allChunks.length;
  allChunks.forEach(chunk => {
    new Set(removeStopWords(tokenize(chunk))).forEach(t => { df[t] = (df[t] || 0) + 1; });
  });
  const vocab = Object.keys(df).filter(t => df[t] > 1 && df[t] < N * 0.85);
  const idf = {};
  vocab.forEach(t => { idf[t] = Math.log(N / df[t]) + 1; });
  return { vocab, idf };
}

function tfidfVector(chunk, vocab, idf) {
  const tokens = removeStopWords(tokenize(chunk));
  const tf = {};
  tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
  const maxTf = Math.max(...Object.values(tf), 1);
  const vec = new Float64Array(vocab.length);
  vocab.forEach((t, i) => { if (tf[t]) vec[i] = (0.5 + 0.5 * tf[t] / maxTf) * (idf[t] || 0); });
  return vec;
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  const d = Math.sqrt(na) * Math.sqrt(nb);
  return d === 0 ? 0 : dot / d;
}

function computeSimilarityMatrix(chunksA, chunksB) {
  const all = [...chunksA, ...chunksB];
  const { vocab, idf } = buildVocabulary(all);
  const vA = chunksA.map(c => tfidfVector(c, vocab, idf));
  const vB = chunksB.map(c => tfidfVector(c, vocab, idf));
  const matrix = vA.map(a => vB.map(b => cosineSimilarity(a, b)));
  return { matrix, vocab, idf };
}

// ═══════════════════════════════════════════════════════════════
// OLLAMA INTEGRATION
// ═══════════════════════════════════════════════════════════════

async function queryOllama(baseUrl, model, chunkA, chunkB, score, signal) {
  const prompt = "You are a document analyst. Two text segments from different documents have a "
    + (score * 100).toFixed(1) + "% lexical similarity score.\n\nSEGMENT A:\n\"\"\"\n"
    + chunkA.slice(0, 1200) + "\n\"\"\"\n\nSEGMENT B:\n\"\"\"\n"
    + chunkB.slice(0, 1200) + "\n\"\"\"\n\n"
    + "Provide a concise analysis (3-5 sentences) covering:\n"
    + "1. What specific topics, concepts, or claims these segments share\n"
    + "2. How they differ in perspective, scope, or detail\n"
    + "3. The nature of their relationship (e.g., redundant, complementary, contradictory, one elaborates the other)\n\n"
    + "Be direct and specific. No preamble.";

  const resp = await fetch(baseUrl + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    signal,
    body: JSON.stringify({ model, prompt, stream: false, options: { temperature: 0.3, num_predict: 300 } }),
  });
  if (!resp.ok) throw new Error("Ollama " + resp.status);
  const data = await resp.json();
  return data.response || data.message?.content || "(no response)";
}

// ═══════════════════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════════════════

function escapeCSV(str) {
  if (!str) return '""';
  return '"' + String(str).replace(/\r?\n/g, " ").replace(/"/g, '""') + '"';
}

function exportCSV(results, interpretations) {
  const rows = ["Rank,Chunk_A,Chunk_B,Similarity_Pct,Chunk_A_Text,Chunk_B_Text,LLM_Interpretation"];
  results.pairs.slice(0, 50).forEach((m, idx) => {
    rows.push([idx+1, "A"+(m.i+1), "B"+(m.j+1), (m.score*100).toFixed(2),
      escapeCSV(results.chunksA[m.i].slice(0,2000)),
      escapeCSV(results.chunksB[m.j].slice(0,2000)),
      escapeCSV(interpretations[m.i+"-"+m.j] || ""),
    ].join(","));
  });
  const blob = new Blob(["\uFEFF" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tuo_report_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
}

// ═══════════════════════════════════════════════════════════════
// HTML REPORT EXPORT (string concat — no template literals that
// could break the outer Babel block)
// ═══════════════════════════════════════════════════════════════

function exportHTML(results, interpretations) {
  var D = new Date().toISOString().slice(0, 10);
  var hi = results.pairs.filter(function(p) { return p.score >= 0.5; });
  var nInterp = hi.filter(function(p) { return !!interpretations[p.i + "-" + p.j]; }).length;

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function barCol(v) { return v >= 0.8 ? "#f0c040" : v >= 0.65 ? "#f59e42" : "#818cf8"; }

  function relTag(interp) {
    if (!interp) return "";
    var lw = interp.toLowerCase(), tg = [];
    if (lw.indexOf("redundant") >= 0 || lw.indexOf("overlap") >= 0 || lw.indexOf("duplicate") >= 0) tg.push("Redundant|#f8717118|#f87171");
    if (lw.indexOf("complementary") >= 0 || lw.indexOf("complement") >= 0) tg.push("Complementary|#34d39918|#34d399");
    if (lw.indexOf("contradict") >= 0) tg.push("Contradictory|#fb923c18|#fb923c");
    if (lw.indexOf("elaborat") >= 0) tg.push("Elaboration|#60a5fa18|#60a5fa");
    if (tg.length === 0) tg.push("Related|#818cf818|#818cf8");
    return tg.map(function(t) { var p=t.split("|"); return '<span style="display:inline-block;font-family:JetBrains Mono,monospace;font-size:10px;padding:2px 8px;border-radius:3px;background:'+p[1]+';color:'+p[2]+';margin-right:6px;">'+p[0]+'</span>'; }).join("");
  }

  function statBox(label, val, col) {
    return '<div style="flex:1;background:#0e1018;padding:16px 12px;text-align:center;">'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#3a4050;letter-spacing:1px;margin-bottom:4px;">' + label + '</div>'
      + '<div style="font-family:JetBrains Mono,monospace;font-size:22px;color:'+col+';font-weight:700;">'+val+'</div></div>';
  }

  function renderChunkHTML(text, maxRows) {
    // Use quote-aware row parsing — never split mid-row
    var rows = parseCSVLines(text);
    if (rows.length >= 2) {
      var dl = detectDelimiter(rows[0]);
      var hCells = parseCSVCells(rows[0], dl);
      if (hCells.length >= 2) {
        // Validate CSV structure
        var ok = 0;
        for (var x = 1; x < Math.min(rows.length, 6); x++) {
          if (Math.abs(parseCSVCells(rows[x], dl).length - hCells.length) <= 1) ok++;
        }
        if (ok >= Math.min(rows.length - 1, 2)) {
          var limit = Math.min(rows.length - 1, maxRows || 30);
          var trunc = rows.length - 1 > limit;
          var tbl = '<div style="overflow:auto;max-height:280px;border-radius:4px;border:1px solid #1e2230;">';
          tbl += '<table style="width:100%;border-collapse:collapse;font-family:JetBrains Mono,monospace;font-size:11px;line-height:1.5;">';
          tbl += '<thead style="position:sticky;top:0;z-index:2;"><tr>';
          for (var c = 0; c < hCells.length; c++) {
            tbl += '<th style="text-align:left;padding:5px 8px;background:#1a1e2a;color:#60a5fa;border-bottom:2px solid #2a3040;font-size:10px;letter-spacing:0.5px;font-weight:600;white-space:nowrap;">'+esc(hCells[c].replace(/^"|"$/g,""))+'<\/th>';
          }
          tbl += '<\/tr><\/thead><tbody>';
          for (var r = 1; r <= limit; r++) {
            var cells = parseCSVCells(rows[r], dl);
            tbl += '<tr style="background:'+(r%2===0 ? 'transparent' : 'rgba(255,255,255,0.015)')+';">';
            for (var c2 = 0; c2 < hCells.length; c2++) {
              tbl += '<td style="padding:4px 8px;color:#9ca3af;border-bottom:1px solid #1e2230;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc((cells[c2]||"").replace(/^"|"$/g,""))+'<\/td>';
            }
            tbl += '<\/tr>';
          }
          tbl += '<\/tbody><\/table>';
          if (trunc) tbl += '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#3a4050;padding:4px 8px;background:#0e1018;border-top:1px solid #1e2230;position:sticky;bottom:0;text-align:right;">'+limit+' of '+(rows.length-1)+' rows shown \u2026<\/div>';
          tbl += '<\/div>';
          return tbl;
        }
      }
    }
    // Plain text fallback
    var display = text.slice(0, 800);
    var pt = text.length > 800;
    return '<div style="font-family:IBM Plex Serif,Georgia,serif;font-size:12.5px;color:#9ca3af;line-height:1.7;max-height:280px;overflow:auto;">' + esc(display) + (pt ? "\u2026" : "") + '<\/div>';
  }

  var cards = "";
  hi.forEach(function(m, idx) {
    var k = m.i+"-"+m.j, interp = interpretations[k] || null;
    var pct = (m.score*100).toFixed(1), bc = barCol(m.score);
    var chAhtml = renderChunkHTML(results.chunksA[m.i], 30);
    var chBhtml = renderChunkHTML(results.chunksB[m.j], 30);
    var bdr = m.score > 0.7 ? "#f0c04030" : "#1e2230";

    cards += '<div style="background:#0e1018;border-radius:10px;border:1px solid '+bdr+';padding:20px;margin-bottom:16px;page-break-inside:avoid;">';
    cards += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">';
    cards += '<div style="font-family:JetBrains Mono,monospace;font-size:22px;color:#2a2f3a;font-weight:700;min-width:40px;">#'+(idx+1)+'</div>';
    cards += '<div style="flex:1;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">';
    cards += '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#60a5fa;background:#60a5fa12;padding:2px 8px;border-radius:4px;">A'+(m.i+1)+'</span>';
    cards += '<span style="color:#3a4050;font-size:12px;">\u27F7</span>';
    cards += '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#f59e42;background:#f59e4212;padding:2px 8px;border-radius:4px;">B'+(m.j+1)+'</span>';
    cards += relTag(interp) + '</div>';
    cards += '<div style="background:#181c24;border-radius:4px;height:6px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:'+bc+';border-radius:4px;"></div></div></div>';
    cards += '<div style="font-family:JetBrains Mono,monospace;font-size:20px;color:'+bc+';font-weight:700;min-width:65px;text-align:right;">'+pct+'%</div></div>';
    // chunks
    cards += '<div style="display:flex;gap:12px;margin-bottom:'+(interp?"14":"0")+'px;">';
    cards += '<div style="flex:1 1 50%;min-width:0;overflow:hidden;background:#141822;border-radius:6px;padding:12px;border-left:3px solid #60a5fa30;">';
    cards += '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#60a5fa;margin-bottom:6px;letter-spacing:1px;">DOC A \u00B7 CHUNK '+(m.i+1)+'</div>';
    cards += chAhtml + '</div>';
    cards += '<div style="flex:1 1 50%;min-width:0;overflow:hidden;background:#141822;border-radius:6px;padding:12px;border-left:3px solid #f59e4230;">';
    cards += '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#f59e42;margin-bottom:6px;letter-spacing:1px;">DOC B \u00B7 CHUNK '+(m.j+1)+'</div>';
    cards += chBhtml + '</div></div>';
    // interp
    if (interp) {
      cards += '<div style="background:#0c0e16;border-radius:6px;padding:14px;border:1px solid #818cf815;">';
      cards += '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#818cf8;letter-spacing:1px;margin-bottom:8px;">\u{1F9E0} LLM INTERPRETATION</div>';
      cards += '<div style="font-family:IBM Plex Serif,serif;font-size:13px;color:#b0b8c8;line-height:1.8;">'+esc(interp)+'</div></div>';
    } else {
      cards += '<div style="background:#0c0e16;border-radius:6px;padding:10px 14px;border:1px solid #1e2230;">';
      cards += '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:#2a2f3a;">No LLM interpretation available</div></div>';
    }
    cards += '</div>';
  });

  var avgH = hi.length > 0 ? (hi.reduce(function(a,p){return a+p.score;},0)/hi.length*100).toFixed(1) : "0.0";
  var maxS = hi.length > 0 ? (hi[0].score*100).toFixed(1) : "0.0";

  var h = [];
  h.push('<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />');
  h.push('<meta name="viewport" content="width=device-width, initial-scale=1.0" />');
  h.push('<title>Tuo Report \u2014 '+D+'<\/title>');
  h.push('<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />');
  h.push('<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0c12;color:#c8ccd4;font-family:IBM Plex Sans,system-ui,sans-serif;padding:32px 20px}');
  h.push('@media print{body{background:#fff;color:#1a1a1a;padding:12px}.no-print{display:none!important}}<\/style>');
  h.push('<\/head><body><div style="max-width:900px;margin:0 auto;">');
  // header
  h.push('<div style="margin-bottom:36px;">');
  h.push('<div style="font-family:JetBrains Mono,monospace;font-size:10px;letter-spacing:3px;color:#f59e42;text-transform:uppercase;margin-bottom:4px;">TUO REPORT</div>');
  h.push('<h1 style="font-family:IBM Plex Sans,sans-serif;font-size:28px;font-weight:300;color:#e8ecf4;margin:0 0 6px;letter-spacing:-0.5px;">Document Similarity Analysis<\/h1>');
  h.push('<p style="font-family:JetBrains Mono,monospace;font-size:10px;color:#3a4050;">Generated '+D+' &middot; matches &ge; 50% &middot; '+hi.length+' pairs<\/p><\/div>');
  // stats
  h.push('<div style="display:flex;gap:1px;margin-bottom:28px;border-radius:8px;overflow:hidden;">');
  h.push(statBox("MATCHES &ge;50%", hi.length, "#f0c040"));
  h.push(statBox("AVG", avgH+"%", "#34d399"));
  h.push(statBox("MAX", maxS+"%", "#f59e42"));
  h.push(statBox("INTERPRETED", nInterp+"/"+hi.length, "#818cf8"));
  h.push(statBox("CHUNKS A", results.chunksA.length, "#60a5fa"));
  h.push(statBox("CHUNKS B", results.chunksB.length, "#f59e42"));
  h.push('<\/div>');
  // print
  h.push('<div class="no-print" style="margin-bottom:24px;">');
  h.push('<button onclick="window.print()" style="font-family:JetBrains Mono,monospace;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:#818cf820;border:1px solid #818cf850;color:#818cf8;border-radius:5px;padding:8px 20px;cursor:pointer;">\u{1F5A8} Print / Save PDF<\/button><\/div>');
  // cards
  if (hi.length === 0) {
    h.push('<div style="background:#0e1018;border-radius:10px;padding:40px;text-align:center;">');
    h.push('<div style="font-family:JetBrains Mono,monospace;font-size:14px;color:#34d399;margin-bottom:8px;">\u2713 No pairs above 50%<\/div><\/div>');
  } else {
    h.push('<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:#4a5568;margin-bottom:14px;letter-spacing:1px;">ALL MATCHES &ge; 50% &middot; ranked by score<\/div>');
    h.push(cards);
  }
  // footer
  h.push('<div style="margin-top:40px;padding-top:16px;border-top:1px solid #1e2230;">');
  h.push('<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#2a2f3a;text-align:center;">Tuo &middot; '+D+'<\/div><\/div>');
  h.push('<\/div><\/body><\/html>');

  var blob = new Blob([h.join("\n")], { type: "text/html;charset=utf-8;" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tuo_report_" + D + ".html";
  a.click();
}

function simColor(val) {
  if (val < 0.05) return "rgba(20,24,32,0.95)";
  const r = Math.round(255 * Math.min(1, val * 2.2));
  const g = Math.round(180 * Math.min(1, val * 1.1));
  const b = Math.round(60 + 60 * (1 - val));
  return "rgba("+r+","+g+","+b+","+(0.3+val*0.7)+")";
}
function simTextColor(val) { return val > 0.35 ? "#0a0c10" : "#c8ccd4"; }

const mono9 = { fontFamily: "'JetBrains Mono', monospace", fontSize: 9 };
const mono10 = { fontFamily: "'JetBrains Mono', monospace", fontSize: 10 };
const mono11 = { fontFamily: "'JetBrains Mono', monospace", fontSize: 11 };

// Detect if a chunk is valid CSV (uses shared parseCSVLines/parseCSVCells)
function isChunkCSV(text) {
  const rows = parseCSVLines(text);
  if (rows.length < 2) return false;
  const delim = detectDelimiter(rows[0]);
  const hCount = parseCSVCells(rows[0], delim).length;
  if (hCount < 2) return false;
  let ok = 0;
  for (let i = 1; i < Math.min(rows.length, 6); i++) {
    if (Math.abs(parseCSVCells(rows[i], delim).length - hCount) <= 1) ok++;
  }
  return ok >= Math.min(rows.length - 1, 2);
}

// Renders chunk text: scrollable table if CSV, prose otherwise
function ChunkContent({ text, maxLen = 600, fontSize = 12.5, maxHeight = 260 }) {
  // For CSV, don't slice mid-row — parse first, then limit rows
  if (isChunkCSV(text)) {
    const rows = parseCSVLines(text);
    const delim = detectDelimiter(rows[0]);
    const headerCells = parseCSVCells(rows[0], delim);
    const maxCols = headerCells.length;

    // Limit display rows by approximate token budget
    let displayRows = [];
    let tokCount = tokenize(rows[0]).length;
    const tokBudget = maxLen ? Math.floor(maxLen * 0.8) : Infinity;
    for (let i = 1; i < rows.length; i++) {
      const rTok = tokenize(rows[i]).length;
      if (tokCount + rTok > tokBudget && displayRows.length > 0) break;
      displayRows.push(parseCSVCells(rows[i], delim));
      tokCount += rTok;
    }
    const truncated = displayRows.length < rows.length - 1;

    return (
      <div style={{
        overflow: "auto", maxHeight, borderRadius: 4,
        border: "1px solid #1e2230",
        scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0e1018",
      }}>
        <table style={{
          width: "100%", borderCollapse: "collapse",
          fontFamily: "'JetBrains Mono', monospace", fontSize: Math.min(fontSize, 11),
          lineHeight: 1.5,
        }}>
          <thead style={{ position: "sticky", top: 0, zIndex: 2 }}>
            <tr>
              {headerCells.map((h, ci) => (
                <th key={ci} style={{
                  textAlign: "left", padding: "5px 8px",
                  background: "#1a1e2a", color: "#60a5fa",
                  borderBottom: "2px solid #2a3040",
                  fontSize: 10, letterSpacing: 0.5, fontWeight: 600,
                  whiteSpace: "nowrap",
                }}>{h.replace(/^"|"$/g, "")}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {displayRows.map((row, ri) => (
              <tr key={ri} style={{ background: ri % 2 === 0 ? "transparent" : "#ffffff04" }}>
                {Array.from({ length: maxCols }, (_, ci) => (
                  <td key={ci} style={{
                    padding: "4px 8px", color: "#9ca3af",
                    borderBottom: "1px solid #1e2230",
                    maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis",
                    whiteSpace: "nowrap",
                  }}>{(row[ci] || "").replace(/^"|"$/g, "")}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
        {truncated && <div style={{
          ...mono9, color: "#3a4050", padding: "4px 8px",
          background: "#0e1018", borderTop: "1px solid #1e2230",
          position: "sticky", bottom: 0, textAlign: "right",
        }}>
          {displayRows.length} of {rows.length - 1} rows shown {"\u2026"}
        </div>}
      </div>
    );
  }

  // Plain text
  const display = maxLen ? text.slice(0, maxLen) : text;
  const truncated = maxLen && text.length > maxLen;
  return (
    <div style={{
      fontFamily: "'IBM Plex Serif', Georgia, serif", fontSize, color: "#9ca3af",
      lineHeight: 1.7, maxHeight, overflow: "auto",
      scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0e1018",
    }}>
      {display}{truncated ? "\u2026" : ""}
    </div>
  );
}

function FileUpload({ label, color, onTextLoad, text }) {
  const fileRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const readFile = useCallback(file => {
    const reader = new FileReader();
    reader.onload = e => onTextLoad(e.target.result);
    reader.readAsText(file);
  }, [onTextLoad]);
  const handleDrop = useCallback(e => {
    e.preventDefault(); setDragging(false);
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  }, [readFile]);

  const csvInfo = text && isCSV(text) ? " \u00B7 CSV detected \u00B7 " + (parseCSVLines(text).length - 1) + " rows" : "";

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ ...mono11, letterSpacing: 2, textTransform: "uppercase", color, marginBottom: 8, fontWeight: 600 }}>{label}</div>
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        onClick={() => !text && fileRef.current?.click()}
        style={{
          border: "1.5px dashed " + (dragging ? color : "#2a2f3a"),
          borderRadius: 8, padding: text ? 0 : 32,
          background: dragging ? color + "08" : "#0e1018",
          cursor: text ? "default" : "pointer",
          transition: "all 0.2s", minHeight: 120,
        }}
      >
        <input ref={fileRef} type="file" accept=".txt,.md,.html,.csv,.json,.xml,.log,.py,.js,.ts,.tex,.rst,.tsv"
          style={{ display: "none" }}
          onChange={e => e.target.files[0] && readFile(e.target.files[0])}
        />
        {text ? (
          <div style={{ position: "relative" }}>
            <textarea value={text} onChange={e => onTextLoad(e.target.value)}
              style={{
                width: "100%", minHeight: 160, maxHeight: 280,
                background: "transparent", color: "#9ca3af",
                border: "none", resize: "vertical", padding: 14,
                fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                lineHeight: 1.7, outline: "none", boxSizing: "border-box",
              }}
            />
            <button onClick={e => { e.stopPropagation(); onTextLoad(""); }}
              style={{
                position: "absolute", top: 8, right: 8,
                background: "#1a1e28", border: "1px solid " + color + "40",
                color, borderRadius: 4, padding: "2px 8px", cursor: "pointer", ...mono11,
              }}>clear</button>
          </div>
        ) : (
          <div style={{ textAlign: "center", color: "#4a5060" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>{"\uD83D\uDCC4"}</div>
            <div style={mono11}>Drop file or click to upload</div>
            <div style={{ ...mono10, marginTop: 4, color: "#3a4050" }}>.txt .md .csv .json .xml .py .js</div>
          </div>
        )}
      </div>
      {text && <div style={{ ...mono10, color: "#4a5060", marginTop: 6 }}>{tokenize(text).length} tokens {"\u00B7"} {text.length} chars{csvInfo}</div>}
    </div>
  );
}

// ─── Scalable Heatmap (canvas + D3 zoom) ────────────────────

function Heatmap({ matrix, chunksA, chunksB, onCellClick, selectedCell }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const transformRef = useRef(d3.zoomIdentity);
  const [hoverInfo, setHoverInfo] = useState(null);
  const [cellSize, setCellSize] = useState(20);

  const rows = matrix.length;
  const cols = matrix[0]?.length || 0;
  if (!rows || !cols) return null;

  // Label gutter
  const gutterLeft = 32;
  const gutterTop = 32;

  // Auto cell size based on container
  useEffect(() => {
    if (!containerRef.current) return;
    const w = containerRef.current.clientWidth - gutterLeft - 20;
    const h = 500;
    const auto = Math.max(6, Math.min(40, Math.floor(Math.min(w / cols, h / rows))));
    setCellSize(auto);
  }, [rows, cols]);

  const totalW = gutterLeft + cols * cellSize + 20;
  const totalH = gutterTop + rows * cellSize + 20;

  // Draw
  const draw = useCallback((transform) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cw, ch);

    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    // Cells
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const v = matrix[i][j];
        const x = gutterLeft + j * cellSize;
        const y = gutterTop + i * cellSize;
        ctx.fillStyle = simColor(v);
        ctx.fillRect(x, y, cellSize - 1, cellSize - 1);

        // Selected highlight
        if (selectedCell && selectedCell[0] === i && selectedCell[1] === j) {
          ctx.strokeStyle = "#f0c040";
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, cellSize - 1, cellSize - 1);
        }

        // Value text if cells are big enough
        if (cellSize * transform.k >= 22) {
          ctx.fillStyle = simTextColor(v);
          ctx.font = "9px JetBrains Mono, monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText((v * 100).toFixed(0), x + cellSize / 2, y + cellSize / 2);
        }
      }
    }

    // Row labels (A)
    ctx.fillStyle = "#4a5568";
    ctx.font = "9px JetBrains Mono, monospace";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    const labelStep = cellSize * transform.k < 12 ? Math.ceil(12 / (cellSize * transform.k)) : 1;
    for (let i = 0; i < rows; i += labelStep) {
      ctx.fillText("A" + (i + 1), gutterLeft - 4, gutterTop + i * cellSize + cellSize / 2);
    }

    // Col labels (B)
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    for (let j = 0; j < cols; j += labelStep) {
      ctx.save();
      ctx.translate(gutterLeft + j * cellSize + cellSize / 2, gutterTop - 4);
      ctx.rotate(-Math.PI / 4);
      ctx.fillText("B" + (j + 1), 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }, [matrix, rows, cols, cellSize, selectedCell, gutterLeft, gutterTop]);

  // Setup D3 zoom
  useEffect(() => {
    if (!canvasRef.current) return;
    const canvas = d3.select(canvasRef.current);
    const zoomBehavior = d3.zoom()
      .scaleExtent([0.2, 8])
      .on("zoom", (e) => {
        transformRef.current = e.transform;
        draw(e.transform);
        setHoverInfo(null);
      });
    canvas.call(zoomBehavior);

    // Fit to view
    const cw = canvasRef.current.clientWidth;
    const ch = canvasRef.current.clientHeight;
    const scale = Math.min(cw / totalW, ch / totalH, 2) * 0.9;
    const initTransform = d3.zoomIdentity
      .translate((cw - totalW * scale) / 2, (ch - totalH * scale) / 2)
      .scale(scale);
    canvas.call(zoomBehavior.transform, initTransform);

    return () => { canvas.on(".zoom", null); };
  }, [draw, totalW, totalH]);

  // Click handler
  const handleClick = useCallback((e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = transformRef.current;
    const mx = (e.clientX - rect.left - t.x) / t.k;
    const my = (e.clientY - rect.top - t.y) / t.k;
    const j = Math.floor((mx - gutterLeft) / cellSize);
    const i = Math.floor((my - gutterTop) / cellSize);
    if (i >= 0 && i < rows && j >= 0 && j < cols) {
      onCellClick([i, j]);
    }
  }, [rows, cols, cellSize, onCellClick, gutterLeft, gutterTop]);

  // Hover handler
  const handleMove = useCallback((e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = transformRef.current;
    const mx = (e.clientX - rect.left - t.x) / t.k;
    const my = (e.clientY - rect.top - t.y) / t.k;
    const j = Math.floor((mx - gutterLeft) / cellSize);
    const i = Math.floor((my - gutterTop) / cellSize);
    if (i >= 0 && i < rows && j >= 0 && j < cols) {
      setHoverInfo({
        x: e.clientX - rect.left + 12,
        y: e.clientY - rect.top - 8,
        i, j, score: matrix[i][j],
      });
    } else {
      setHoverInfo(null);
    }
  }, [rows, cols, cellSize, matrix, gutterLeft, gutterTop]);

  // Color legend gradient
  const legendStops = Array.from({ length: 20 }, (_, i) => {
    const v = i / 19;
    return simColor(v);
  });

  return (
    <div>
      {/* Compact legend */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <span style={{ ...mono9, color: "#3a4050" }}>{rows}{"\u00D7"}{cols} {"\u00B7"} scroll to zoom {"\u00B7"} drag to pan</span>
        <div style={{ display: "flex", alignItems: "center", gap: 4, marginLeft: "auto" }}>
          <span style={{ ...mono9, color: "#3a4050" }}>0%</span>
          <div style={{
            width: 120, height: 10, borderRadius: 3,
            background: "linear-gradient(to right, " + legendStops.join(", ") + ")",
            border: "1px solid #1e2230",
          }} />
          <span style={{ ...mono9, color: "#3a4050" }}>100%</span>
        </div>
      </div>

      {/* Canvas */}
      <div ref={containerRef} style={{ position: "relative" }}>
        <canvas
          ref={canvasRef}
          onClick={handleClick}
          onMouseMove={handleMove}
          onMouseLeave={() => setHoverInfo(null)}
          style={{
            width: "100%", height: 480, display: "block",
            background: "#0a0c12", borderRadius: 6,
            border: "1px solid #1e2230", cursor: "crosshair",
          }}
        />
        {hoverInfo && (
          <div style={{
            position: "absolute", left: hoverInfo.x, top: hoverInfo.y,
            background: "#141822ee", border: "1px solid #2a2f3a", borderRadius: 4,
            padding: "4px 8px", pointerEvents: "none", zIndex: 5,
            ...mono10, color: "#c8ccd4", whiteSpace: "nowrap",
          }}>
            A{hoverInfo.i + 1} {"\u2194"} B{hoverInfo.j + 1}: <span style={{ color: "#f0c040", fontWeight: 700 }}>{(hoverInfo.score * 100).toFixed(1)}%</span>
          </div>
        )}
      </div>
    </div>
  );
}

function InterpretBadge({ status }) {
  if (status === "done") return <span style={{ ...mono9, color: "#34d399", background: "#34d39912", padding: "2px 6px", borderRadius: 3 }}>{"\u2713"} interpreted</span>;
  if (status === "loading") return <span style={{ ...mono9, color: "#818cf8", animation: "pulse 1.2s infinite" }}>{"\u27F3"} interpreting...</span>;
  if (status === "error") return <span style={{ ...mono9, color: "#f87171", background: "#f8717112", padding: "2px 6px", borderRadius: 3 }}>{"\u2717"} failed</span>;
  return null;
}
