            </div>
          </div>
          <div style={{ marginTop: 12, background: "#0c0e16", borderRadius: 6, padding: 14, border: "1px solid #818cf815" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1 }}>{"\u{1F9E0}"} LLM INTERPRETATION</div>
              {interpStatus !== "loading" && (
                <button onClick={e => { e.stopPropagation(); onInterpret(); }} style={{
                  ...mono9, background: "#818cf818", border: "1px solid #818cf830",
                  color: "#818cf8", borderRadius: 4, padding: "3px 10px", cursor: "pointer",
                }}>{interpretation ? "\u21BB re-interpret" : "\u25B6 interpret"}</button>
              )}
            </div>
            {interpStatus === "loading" && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#4a5568" }}>
                <div style={{ width: 14, height: 14, border: "2px solid #818cf840", borderTopColor: "#818cf8", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                <span style={mono10}>Querying model...</span>
              </div>
            )}
            {interpStatus === "error" && <div style={{ ...mono10, color: "#f87171", lineHeight: 1.6 }}>Could not reach Ollama. Ensure it is running at the configured URL.</div>}
            {interpretation && interpStatus !== "loading" && <div style={{ fontFamily: "'IBM Plex Serif', serif", fontSize: 13, color: "#b0b8c8", lineHeight: 1.8 }}>{interpretation}</div>}
            {!interpretation && interpStatus !== "loading" && interpStatus !== "error" && <div style={{ ...mono10, color: "#2a2f3a" }}>Click "interpret" to analyze via Ollama</div>}
          </div>
          {isMacro && (
            <DrillDown chunkA={chunkA} chunkB={chunkB} macroLabelA={"A"+(i+1)} macroLabelB={"B"+(j+1)} microSize={microSize || 256} />
          )}
        </div>
      )}
    </div>
  );
}

function DrillDown({ chunkA, chunkB, macroLabelA, macroLabelB, microSize }) {
  const [subData, setSubData] = useState(null);
  const [computing, setComputing] = useState(false);
  const [expandedSub, setExpandedSub] = useState(0);

  const compute = useCallback(() => {
    setComputing(true);
    setTimeout(() => {
      const sA = subChunk(chunkA, microSize);
      const sB = subChunk(chunkB, microSize);
      const { matrix, vocab } = computeSimilarityMatrix(sA, sB);
      const pairs = [];
      for (let i = 0; i < matrix.length; i++)
        for (let j = 0; j < matrix[0].length; j++)
          pairs.push({ i, j, score: matrix[i][j] });
      pairs.sort((a, b) => b.score - a.score);
      setSubData({ subA: sA, subB: sB, matrix, pairs, vocabSize: vocab.length });
      setComputing(false);
    }, 30);
  }, [chunkA, chunkB, microSize]);

  if (!subData && !computing) {
    return (
      <div style={{
        marginTop: 10, background: "#0c0e16", borderRadius: 6,
        padding: 12, border: "1px solid #34d39920", textAlign: "center",
      }}>
        <button onClick={e => { e.stopPropagation(); compute(); }} style={{
          ...mono10, fontWeight: 600, letterSpacing: 1,
          background: "#34d39920", border: "1px solid #34d39940",
          color: "#34d399", borderRadius: 5, padding: "8px 20px",
          cursor: "pointer",
        }}>{"\u{1F50D}"} Drill Down {"\u2014"} sub-chunk at {microSize} tokens</button>
        <div style={{ ...mono9, color: "#2a2f3a", marginTop: 6 }}>
          Splits this macro pair into fine-grained sub-chunks for detailed comparison
        </div>
      </div>
    );
  }

  if (computing) {
    return (
      <div style={{
        marginTop: 10, background: "#0c0e16", borderRadius: 6,
        padding: 16, border: "1px solid #34d39920",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
      }}>
        <div style={{ width: 14, height: 14, border: "2px solid #34d39940", borderTopColor: "#34d399", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <span style={{ ...mono10, color: "#34d399" }}>Sub-chunking and computing similarity...</span>
      </div>
    );
  }

  const topSubs = subData.pairs.slice(0, 10);
  const avgSub = topSubs.length > 0 ? topSubs.reduce((a, p) => a + p.score, 0) / topSubs.length : 0;

  // Mini heatmap
  const mRows = subData.matrix.length;
  const mCols = subData.matrix[0]?.length || 0;
  const mCell = Math.max(10, Math.min(28, Math.floor(400 / Math.max(mRows, mCols))));

  return (
    <div style={{
      marginTop: 10, background: "#0c0e16", borderRadius: 6,
      border: "1px solid #34d39920", overflow: "hidden",
    }} onClick={e => e.stopPropagation()}>
      {/* Header */}
      <div style={{
        padding: "10px 14px", background: "#0e1018", borderBottom: "1px solid #1e2230",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ ...mono10, color: "#34d399", fontWeight: 600 }}>{"\u{1F50D}"} DRILL-DOWN</span>
          <span style={{ ...mono9, color: "#3a4050" }}>
            {subData.subA.length} {"\u00D7"} {subData.subB.length} sub-chunks
            {" \u00B7 "} vocab {subData.vocabSize}
            {" \u00B7 "} avg top-10: {(avgSub*100).toFixed(1)}%
          </span>
        </div>
        <button onClick={() => setSubData(null)} style={{
          ...mono9, background: "#1e223040", border: "1px solid #2a2f3a",
          color: "#4a5568", borderRadius: 3, padding: "2px 8px", cursor: "pointer",
        }}>{"\u2715"} close</button>
      </div>

      {/* Mini heatmap */}
      <div style={{ padding: "10px 14px", overflowX: "auto" }}>
        <div style={{ ...mono9, color: "#3a4050", marginBottom: 6 }}>
          SUB-CHUNK SIMILARITY {" \u00B7 "} {macroLabelA} subs (rows) vs {macroLabelB} subs (cols)
        </div>
        <div style={{ display: "inline-block" }}>
          {subData.matrix.map((row, ri) => (
            <div key={ri} style={{ display: "flex" }}>
              {row.map((val, ci) => (
                <div key={ci} title={"a"+(ri+1)+" \u2194 b"+(ci+1)+": "+(val*100).toFixed(1)+"%"} style={{
                  width: mCell, height: mCell, background: simColor(val),
                  border: "1px solid #0c0e16", borderRadius: 1,
                }} />
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* Top sub-matches */}
      <div style={{ padding: "10px 14px", borderTop: "1px solid #1e2230" }}>
        <div style={{ ...mono9, color: "#3a4050", marginBottom: 8 }}>TOP SUB-MATCHES</div>
        {topSubs.map((s, idx) => {
          const isOpen = expandedSub === idx;
          return (
            <div key={idx} style={{ marginBottom: 6 }}>
              <div
                onClick={() => setExpandedSub(isOpen ? -1 : idx)}
                style={{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "6px 8px", background: "#0e1018", borderRadius: 4,
                  cursor: "pointer", border: "1px solid " + (s.score > 0.4 ? "#34d39920" : "#1e2230"),
                }}
              >
                <span style={{ ...mono9, color: "#4a5568" }}>#{idx+1}</span>
                <span style={{ ...mono10, color: "#60a5fa", background: "#60a5fa12", padding: "1px 6px", borderRadius: 3 }}>a{s.i+1}</span>
                <span style={{ color: "#2a2f3a", fontSize: 10 }}>{"\u27F7"}</span>
                <span style={{ ...mono10, color: "#f59e42", background: "#f59e4212", padding: "1px 6px", borderRadius: 3 }}>b{s.j+1}</span>
                <div style={{ flex: 1, background: "#181c24", borderRadius: 3, height: 4, overflow: "hidden" }}>
                  <div style={{ width: (s.score*100)+"%", height: "100%", background: "#34d399", borderRadius: 3 }} />
                </div>
                <span style={{ ...mono10, color: "#34d399", fontWeight: 700, minWidth: 42, textAlign: "right" }}>
                  {(s.score*100).toFixed(1)}%
                </span>
              </div>
              {isOpen && (
                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                  <div style={{ flex: "1 1 50%", minWidth: 0, background: "#141822", borderRadius: 4, padding: 8, borderLeft: "2px solid #60a5fa20", overflow: "hidden" }}>
                    <div style={{ ...mono9, color: "#60a5fa", marginBottom: 4 }}>a{s.i+1}</div>
                    <ChunkContent text={subData.subA[s.i]} maxLen={400} fontSize={11} maxHeight={180} />
                  </div>
                  <div style={{ flex: "1 1 50%", minWidth: 0, background: "#141822", borderRadius: 4, padding: 8, borderLeft: "2px solid #f59e4220", overflow: "hidden" }}>
                    <div style={{ ...mono9, color: "#f59e42", marginBottom: 4 }}>b{s.j+1}</div>
                    <ChunkContent text={subData.subB[s.j]} maxLen={400} fontSize={11} maxHeight={180} />
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// DOCUMENT VIEW — side-by-side annotated documents
// ═══════════════════════════════════════════════════════════════

function DocumentView({ chunksA, chunksB, matrix, interpretations, simThreshold: initThresh }) {
  const leftRef = useRef(null);
  const rightRef = useRef(null);
  const [activeLink, setActiveLink] = useState(null); // "A3-B5"
  const [hoverInterp, setHoverInterp] = useState(null); // { x, y, text, from, to, score }
  const [docThreshold, setDocThreshold] = useState(initThresh || 0.5);

  // Build link maps: for each chunk, which chunks in the other doc are linked?
  const { linksFromA, linksFromB } = useMemo(() => {
    const fA = {}; // fA[i] = [{ j, score, interp }, ...]
    const fB = {}; // fB[j] = [{ i, score, interp }, ...]
    for (let i = 0; i < matrix.length; i++) {
      for (let j = 0; j < (matrix[0]?.length || 0); j++) {
        if (matrix[i][j] >= docThreshold) {
          const interp = interpretations[i + "-" + j] || null;
          if (!fA[i]) fA[i] = [];
          fA[i].push({ j, score: matrix[i][j], interp });
          if (!fB[j]) fB[j] = [];
          fB[j].push({ i, score: matrix[i][j], interp });
        }
      }
    }
    // Sort by score desc
    Object.values(fA).forEach(arr => arr.sort((a, b) => b.score - a.score));
    Object.values(fB).forEach(arr => arr.sort((a, b) => b.score - a.score));
    return { linksFromA: fA, linksFromB: fB };
  }, [matrix, interpretations, docThreshold]);

  const scrollTo = useCallback((panel, idx) => {
    const container = panel === "A" ? leftRef.current : rightRef.current;
    if (!container) return;
    const el = container.querySelector("[data-chunk-idx='" + idx + "']");
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      // Flash highlight
      el.style.transition = "background 0.3s";
      el.style.background = panel === "A" ? "#60a5fa12" : "#f59e4212";
      setTimeout(() => { el.style.background = "transparent"; }, 1500);
    }
  }, []);

  const handleLinkClick = useCallback((fromDoc, fromIdx, toIdx) => {
    const key = fromDoc === "A" ? ("A" + fromIdx + "-B" + toIdx) : ("B" + fromIdx + "-A" + toIdx);
    setActiveLink(key);
    const targetPanel = fromDoc === "A" ? "B" : "A";
    scrollTo(targetPanel, toIdx);
  }, [scrollTo]);

  const handleHover = useCallback((e, link, fromDoc, fromIdx) => {
    if (!link) { setHoverInterp(null); return; }
    const rect = e.currentTarget.getBoundingClientRect();
    const parentRect = (fromDoc === "A" ? leftRef : rightRef).current?.getBoundingClientRect();
    if (!parentRect) return;
    setHoverInterp({
      x: rect.left - parentRect.left + rect.width + 8,
      y: rect.top - parentRect.top,
      text: link.interp,
      from: fromDoc + (fromIdx + 1),
      to: (fromDoc === "A" ? "B" : "A") + ((fromDoc === "A" ? link.j : link.i) + 1),
      score: link.score,
    });
  }, []);

  function linkBadgeColor(score, targetDoc) {
    // Color of the target document, intensity scaled by score
    const base = targetDoc === "B" ? "#f59e42" : "#60a5fa";
    const alpha = Math.round(15 + score * 40).toString(16).padStart(2, "0");
    const borderAlpha = Math.round(30 + score * 60).toString(16).padStart(2, "0");
    return { bg: base + alpha, border: base + borderAlpha, text: base };
  }

  function renderChunkWithLinks(text, idx, doc, links) {
    return (
      <div key={idx} data-chunk-idx={idx} style={{
        display: "flex", gap: 0,
        flexDirection: doc === "A" ? "row" : "row-reverse",
        marginBottom: 2, borderBottom: "1px solid #1e223040",
        paddingBottom: 8, paddingTop: 8,
      }}>
        {/* Main content */}
        <div style={{ flex: 1, minWidth: 0, padding: "0 12px" }}>
          <div style={{
            ...mono9, color: doc === "A" ? "#60a5fa50" : "#f59e4250",
            marginBottom: 4, letterSpacing: 1,
          }}>{doc}{idx + 1}</div>
          <ChunkContent text={text} maxLen={null} fontSize={12} maxHeight={null} />
        </div>
        {/* Margin links */}
        <div style={{
          width: 52, flexShrink: 0, display: "flex", flexDirection: "column",
          alignItems: doc === "A" ? "flex-end" : "flex-start",
          gap: 3, paddingTop: 16,
          borderLeft: doc === "B" ? "1px solid #1e223040" : "none",
          borderRight: doc === "A" ? "1px solid #1e223040" : "none",
          paddingLeft: doc === "B" ? 6 : 0,
          paddingRight: doc === "A" ? 6 : 0,
        }}>
          {(links || []).slice(0, 5).map((link, li) => {
            const toIdx = doc === "A" ? link.j : link.i;
            const toLabel = (doc === "A" ? "B" : "A") + (toIdx + 1);
            const toDoc = doc === "A" ? "B" : "A";
            const c = linkBadgeColor(link.score, toDoc);
            const isActive = activeLink === (doc + idx + "-" + toLabel);
            return (
              <div
                key={li}
                onClick={(e) => { e.stopPropagation(); handleLinkClick(doc, idx, toIdx); }}
                onMouseEnter={(e) => handleHover(e, link, doc, idx)}
                onMouseLeave={() => setHoverInterp(null)}
                style={{
                  ...mono9, fontSize: 8,
                  background: isActive ? c.text + "30" : c.bg,
                  border: "1px solid " + (isActive ? c.text : c.border),
                  color: c.text, borderRadius: 3,
                  padding: "1px 4px", cursor: "pointer",
                  whiteSpace: "nowrap",
                  transition: "all 0.15s",
                }}
                title={(link.score * 100).toFixed(1) + "% " + toLabel}
              >
                {toLabel}
                {link.interp && <span style={{ marginLeft: 2, opacity: 0.6 }}>{"\u{1F9E0}"}</span>}
              </div>
            );
          })}
          {(links || []).length > 5 && (
            <div style={{ ...mono9, fontSize: 7, color: "#3a4050" }}>+{links.length - 5}</div>
          )}
        </div>
      </div>
    );
  }

  const totalLinksA = Object.values(linksFromA).reduce((s, arr) => s + arr.length, 0);
  const totalLinksB = Object.values(linksFromB).reduce((s, arr) => s + arr.length, 0);
  const linkedChunksA = Object.keys(linksFromA).length;
  const linkedChunksB = Object.keys(linksFromB).length;

  return (
    <div style={{ background: "#0e1018", borderRadius: 10 }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 16px", borderBottom: "1px solid #1e2230",
      }}>
        <div style={{ ...mono10, color: "#4a5568" }}>
          DOCUMENT VIEW {"\u00B7"} {linkedChunksA}/{chunksA.length} A chunks linked {"\u00B7"} {linkedChunksB}/{chunksB.length} B chunks linked {"\u00B7"} click margin badges to jump
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <label style={{ ...mono9, color: "#3a4050" }}>THRESHOLD</label>
          <input type="range" min="30" max="90" step="5" value={docThreshold * 100}
            onChange={e => setDocThreshold(Number(e.target.value) / 100)}
            style={{ width: 70, accentColor: "#f0c040" }}
          />
          <span style={{ ...mono9, color: "#f0c040", minWidth: 28 }}>{(docThreshold * 100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Two-panel layout */}
      <div style={{ display: "flex", height: 600 }}>
        {/* Doc A */}
        <div style={{ flex: "1 1 50%", minWidth: 0, display: "flex", flexDirection: "column", borderRight: "2px solid #1e2230" }}>
          <div style={{
            padding: "8px 12px", background: "#0c0e16", borderBottom: "1px solid #1e2230",
            display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
          }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#60a5fa" }} />
            <span style={{ ...mono10, color: "#60a5fa", fontWeight: 600 }}>DOCUMENT A</span>
            <span style={{ ...mono9, color: "#3a4050" }}>{chunksA.length} chunks</span>
          </div>
          <div ref={leftRef} style={{
            flex: 1, overflow: "auto", position: "relative",
            scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0a0c12",
          }}>
            {chunksA.map((c, i) => renderChunkWithLinks(c, i, "A", linksFromA[i]))}
            {/* Hover tooltip rendered inside left panel */}
            {hoverInterp && (
              <div style={{
                position: "absolute", left: hoverInterp.x, top: hoverInterp.y,
                background: "#141822f0", border: "1px solid #2a2f3a", borderRadius: 6,
                padding: "8px 12px", maxWidth: 300, zIndex: 20, pointerEvents: "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <span style={{ ...mono10, color: hoverInterp.from.charAt(0) === "A" ? "#60a5fa" : "#f59e42" }}>{hoverInterp.from}</span>
                  <span style={{ color: "#3a4050", fontSize: 10 }}>{"\u27F7"}</span>
                  <span style={{ ...mono10, color: hoverInterp.to.charAt(0) === "A" ? "#60a5fa" : "#f59e42" }}>{hoverInterp.to}</span>
                  <span style={{ ...mono10, color: "#f0c040", fontWeight: 700 }}>{(hoverInterp.score * 100).toFixed(1)}%</span>
                </div>
                {hoverInterp.text ? (
                  <div style={{ fontFamily: "'IBM Plex Serif', serif", fontSize: 11.5, color: "#b0b8c8", lineHeight: 1.7 }}>
                    {hoverInterp.text}
                  </div>
                ) : (
                  <div style={{ ...mono9, color: "#3a4050" }}>No LLM interpretation yet</div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Doc B */}
        <div style={{ flex: "1 1 50%", minWidth: 0, display: "flex", flexDirection: "column" }}>
          <div style={{
            padding: "8px 12px", background: "#0c0e16", borderBottom: "1px solid #1e2230",
            display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
          }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#f59e42" }} />
            <span style={{ ...mono10, color: "#f59e42", fontWeight: 600 }}>DOCUMENT B</span>
            <span style={{ ...mono9, color: "#3a4050" }}>{chunksB.length} chunks</span>
          </div>
          <div ref={rightRef} style={{
            flex: 1, overflow: "auto", position: "relative",
            scrollbarWidth: "thin", scrollbarColor: "#2a2f3a #0a0c12",
          }}>
            {chunksB.map((c, j) => renderChunkWithLinks(c, j, "B", linksFromB[j]))}
          </div>
        </div>
      </div>
    </div>
  );
}

function DistributionChart({ pairs }) {
  const buckets = useMemo(() => {
    const b = Array(20).fill(0);
    pairs.forEach(p => { b[Math.min(19, Math.floor(p.score * 20))]++; });
    return b;
  }, [pairs]);
  const mx = Math.max(...buckets, 1);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 180, padding: "0 4px" }}>
        {buckets.map((count, i) => {
          const h = Math.max(2, (count / mx) * 160), intensity = i / 19;
          return (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end" }}>
              {count > 0 && <div style={{ ...mono9, fontSize: 8, color: "#4a5568", marginBottom: 2 }}>{count}</div>}
              <div title={(i*5)+"-"+(i*5+5)+"%: "+count} style={{
                width: "100%", height: h, borderRadius: "3px 3px 0 0",
                background: "rgba("+(Math.round(240*intensity+40))+","+(Math.round(160*intensity+60))+","+(Math.round(64+30*(1-intensity)))+","+(0.4+intensity*0.6)+")",
                transition: "height 0.3s ease",
              }} />
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", ...mono9, color: "#3a4050", marginTop: 6, padding: "0 4px" }}>
        <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// GRAPH VIEW — D3 force-directed graph
// Nodes = chunks, sequential THEN edges, similarity >50% edges
// ═══════════════════════════════════════════════════════════════

function GraphView({ chunksA, chunksB, matrix, interpretations }) {
  const svgRef = useRef(null);
  const containerRef = useRef(null);
  const simRef = useRef(null);
  const [tooltip, setTooltip] = useState(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [simThreshold, setSimThreshold] = useState(0.5);

  const graphData = useMemo(() => {
    const nodes = [];
    // Doc A nodes
    chunksA.forEach((c, i) => {
      nodes.push({ id: "A"+(i+1), doc: "A", idx: i, label: "A"+(i+1), text: c.slice(0, 300) });
    });
    // Doc B nodes
    chunksB.forEach((c, j) => {
      nodes.push({ id: "B"+(j+1), doc: "B", idx: j, label: "B"+(j+1), text: c.slice(0, 300) });
    });

    const links = [];
    // Sequential THEN edges within each doc
    for (let i = 0; i < chunksA.length - 1; i++) {
      links.push({ source: "A"+(i+1), target: "A"+(i+2), type: "THEN", score: null });
    }
    for (let j = 0; j < chunksB.length - 1; j++) {
      links.push({ source: "B"+(j+1), target: "B"+(j+2), type: "THEN", score: null });
    }
    // Similarity edges above threshold
    for (let i = 0; i < matrix.length; i++) {
      for (let j = 0; j < matrix[0].length; j++) {
        if (matrix[i][j] >= simThreshold) {
          links.push({
            source: "A"+(i+1), target: "B"+(j+1), type: "SIMILAR",
            score: matrix[i][j],
            interp: interpretations[i+"-"+j] || null,
          });
        }
      }
    }
    return { nodes, links };
  }, [chunksA, chunksB, matrix, interpretations, simThreshold]);

  useEffect(() => {
    if (!svgRef.current || !containerRef.current) return;
    const container = containerRef.current;
    const W = container.clientWidth;
    const H = 600;

    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    svg.attr("width", W).attr("height", H);

    // Defs for arrowheads
    const defs = svg.append("defs");
    ["then-arrow", "sim-arrow"].forEach((id, idx) => {
      defs.append("marker")
        .attr("id", id).attr("viewBox", "0 -5 10 10")
        .attr("refX", 22).attr("refY", 0)
        .attr("markerWidth", 6).attr("markerHeight", 6)
        .attr("orient", "auto")
        .append("path").attr("d", "M0,-4L10,0L0,4")
        .attr("fill", idx === 0 ? "#4a5568" : "#f0c04080");
    });

    // Main group that receives zoom transform
    const g = svg.append("g");

    // Zoom behavior — infinite canvas
    const zoomBehavior = d3.zoom()
      .scaleExtent([0.1, 6])
      .on("zoom", (e) => {
        g.attr("transform", e.transform);
        setTooltip(null); // hide tooltip during pan
      });
    svg.call(zoomBehavior);

    // Click on background to deselect
    svg.on("click.deselect", () => setSelectedNode(null));

    // Deep copy nodes/links for D3 mutation
    const nodes = graphData.nodes.map(n => ({ ...n }));
    const links = graphData.links.map(l => ({ ...l }));

    // Initial positions: A chain left, B chain right, spread vertically
    const totalA = chunksA.length, totalB = chunksB.length;
    const maxChain = Math.max(totalA, totalB);
    // Vertical extent scales with chain length — give every node ~55px of room
    const vExtent = Math.max(H, maxChain * 55);
    const vTop = (H - vExtent) / 2;

    nodes.forEach(n => {
      const total = n.doc === "A" ? totalA : totalB;
      if (n.doc === "A") {
        n.x = W * 0.25 + (Math.random() - 0.5) * 40;
      } else {
        n.x = W * 0.75 + (Math.random() - 0.5) * 40;
      }
      n.y = vTop + (n.idx + 0.5) / total * vExtent;
    });

    // Per-node y target: maps sequential index to spread-out vertical position
    function yTarget(d) {
      const total = d.doc === "A" ? totalA : totalB;
      return vTop + (d.idx + 0.5) / total * vExtent;
    }

    // Stronger pull on first/last nodes, gentler on middle
    function yStrength(d) {
      const total = d.doc === "A" ? totalA : totalB;
      if (d.idx === 0 || d.idx === total - 1) return 0.15; // endpoints: strong
      return 0.02; // middle: gentle, let THEN links do the work
    }

    // Force simulation — THEN links pull MUCH harder than similarity
    // y-force spreads each chain's endpoints apart continuously
    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id)
        .distance(d => d.type === "THEN" ? 50 : 250)
        .strength(d => d.type === "THEN" ? 2.0 : 0.06)
      )
      .force("charge", d3.forceManyBody().strength(-140).distanceMax(500))
      .force("collision", d3.forceCollide(24))
      .force("x", d3.forceX(d => d.doc === "A" ? W * 0.3 : W * 0.7).strength(0.04))
      .force("y", d3.forceY(yTarget).strength(yStrength))
      .alphaDecay(0.012)
      .alphaMin(0.001)
      .velocityDecay(0.4);

    simRef.current = simulation;

    // Links group (behind nodes)
    const linkLines = g.append("g").selectAll("line").data(links).enter().append("line")
      .attr("stroke", d => d.type === "THEN" ? "#4a5568" : simEdgeColor(d.score))
      .attr("stroke-width", d => d.type === "THEN" ? 2 : Math.max(1.5, (d.score || 0) * 5))
      .attr("stroke-dasharray", d => d.type === "THEN" ? "6 3" : "none")
      .attr("marker-end", d => d.type === "THEN" ? "url(#then-arrow)" : "")
      .style("cursor", d => d.type === "SIMILAR" ? "pointer" : "default")
      .style("opacity", d => d.type === "THEN" ? 0.65 : 0.7);

    // Edge labels for similarity
    const edgeLabels = g.append("g").selectAll("text").data(links.filter(l => l.type === "SIMILAR")).enter().append("text")
      .attr("text-anchor", "middle")
      .attr("fill", "#f0c04090")
      .attr("font-family", "JetBrains Mono, monospace")
      .attr("font-size", 9)
      .text(d => (d.score * 100).toFixed(0) + "%");

    // Node group
    const nodeCircles = g.append("g").selectAll("g").data(nodes).enter().append("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", (e, d) => {
          if (!e.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (e, d) => {
          // Account for zoom transform
          const t = d3.zoomTransform(svg.node());
          d.fx = (e.sourceEvent.offsetX - t.x) / t.k;
          d.fy = (e.sourceEvent.offsetY - t.y) / t.k;
        })
        .on("end", (e, d) => {
          if (!e.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    // Circle
    nodeCircles.append("circle")
      .attr("r", 16)
      .attr("fill", d => d.doc === "A" ? "#60a5fa18" : "#f59e4218")
      .attr("stroke", d => d.doc === "A" ? "#60a5fa" : "#f59e42")
      .attr("stroke-width", 1.5);

    // Label
    nodeCircles.append("text")
      .attr("text-anchor", "middle").attr("dy", 4)
      .attr("fill", d => d.doc === "A" ? "#60a5fa" : "#f59e42")
      .attr("font-family", "JetBrains Mono, monospace")
      .attr("font-size", 10)
      .attr("font-weight", 600)
      .text(d => d.label);

    // Hover / click on nodes
    nodeCircles
      .on("mouseover", (e, d) => {
        const rect = container.getBoundingClientRect();
        setTooltip({ x: e.clientX - rect.left, y: e.clientY - rect.top - 10, node: d });
      })
      .on("mouseout", () => setTooltip(null))
      .on("click", (e, d) => {
        e.stopPropagation();
        setSelectedNode(prev => prev && prev.id === d.id ? null : d);
      });

    // Hover on similarity edges
    linkLines.filter(d => d.type === "SIMILAR")
      .on("mouseover", function(e, d) {
        d3.select(this).attr("stroke-width", Math.max(3, (d.score || 0) * 8));
      })
      .on("mouseout", function(e, d) {
        d3.select(this).attr("stroke-width", Math.max(1.5, (d.score || 0) * 5));
      });

    // Tick — no clamping, infinite canvas
    simulation.on("tick", () => {
      linkLines
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

      edgeLabels
        .attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2 - 6);

      nodeCircles.attr("transform", d => "translate("+d.x+","+d.y+")");
    });

    // Fit to view after initial settle
    setTimeout(() => {
      simulation.alpha(0.4).restart();
      setTimeout(() => {
        // Compute bounding box of all nodes
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
          if (n.x < minX) minX = n.x;
          if (n.y < minY) minY = n.y;
          if (n.x > maxX) maxX = n.x;
          if (n.y > maxY) maxY = n.y;
        });
        const pad = 40;
        const bw = (maxX - minX) + pad * 2;
        const bh = (maxY - minY) + pad * 2;
        const scale = Math.min(W / bw, H / bh, 1.2);
        const cx = (minX + maxX) / 2;
        const cy = (minY + maxY) / 2;
        svg.transition().duration(800).call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(W/2, H/2).scale(scale).translate(-cx, -cy)
        );
      }, 2000);
    }, 100);

    return () => { simulation.stop(); };
  }, [graphData, chunksA.length, chunksB.length]);

  function simEdgeColor(score) {
    if (!score) return "#4a556840";
    if (score >= 0.8) return "#f0c040";
    if (score >= 0.65) return "#f59e42cc";
    return "#818cf8aa";
  }

  // Find links connected to selected node
  const selectedLinks = selectedNode ? graphData.links.filter(
    l => (l.source === selectedNode.id || l.target === selectedNode.id) ||
         (l.source.id === selectedNode.id || l.target.id === selectedNode.id)
  ) : [];

  const simLinks = selectedLinks.filter(l => l.type === "SIMILAR");

  return (
    <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div style={{ ...mono10, color: "#4a5568" }}>
          CHUNK GRAPH {"\u00B7"} dashed = THEN (sequential) {"\u00B7"} solid = SIMILAR ({"\u2265"}{(simThreshold*100).toFixed(0)}%)
          {"\u00B7"} scroll to zoom {"\u00B7"} drag canvas to pan {"\u00B7"} drag nodes to rearrange
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ ...mono9, color: "#3a4050" }}>THRESHOLD</label>
          <input type="range" min="30" max="90" step="5" value={simThreshold * 100}
            onChange={e => setSimThreshold(Number(e.target.value) / 100)}
            style={{ width: 80, accentColor: "#f0c040" }}
          />
          <span style={{ ...mono9, color: "#f0c040", minWidth: 30 }}>{(simThreshold*100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 20, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 12, height: 12, borderRadius: "50%", border: "2px solid #60a5fa", background: "#60a5fa18" }} />
          <span style={{ ...mono9, color: "#60a5fa" }}>Doc A chunks</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 12, height: 12, borderRadius: "50%", border: "2px solid #f59e42", background: "#f59e4218" }} />
          <span style={{ ...mono9, color: "#f59e42" }}>Doc B chunks</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 24, height: 0, borderTop: "1.5px dashed #3a4050" }} />
          <span style={{ ...mono9, color: "#3a4050" }}>THEN</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 24, height: 0, borderTop: "2px solid #f0c040" }} />
          <span style={{ ...mono9, color: "#f0c040" }}>SIMILAR</span>
        </div>
        <span style={{ ...mono9, color: "#2a2f3a" }}>
          {graphData.nodes.length} nodes {"\u00B7"} {graphData.links.filter(l => l.type === "THEN").length} sequential {"\u00B7"} {graphData.links.filter(l => l.type === "SIMILAR").length} similarity
        </span>
      </div>

      {/* SVG canvas */}
      <div ref={containerRef} style={{ position: "relative", background: "#0a0c12", borderRadius: 8, border: "1px solid #1e2230", overflow: "hidden" }}>
        <svg ref={svgRef} style={{ display: "block", width: "100%", height: 600 }} />

        {/* Tooltip */}
        {tooltip && (
          <div style={{
            position: "absolute", left: tooltip.x + 12, top: tooltip.y,
            background: "#141822ee", border: "1px solid #2a2f3a", borderRadius: 6,
            padding: "8px 12px", pointerEvents: "none", maxWidth: 280, zIndex: 10,
          }}>
            <div style={{ ...mono11, color: tooltip.node.doc === "A" ? "#60a5fa" : "#f59e42", marginBottom: 4 }}>
              {tooltip.node.label}
            </div>
            <ChunkContent text={tooltip.node.text} maxLen={250} fontSize={11} maxHeight={150} />
          </div>
        )}
      </div>

      {/* Selected node detail panel */}
      {selectedNode && (
        <div style={{ marginTop: 14, background: "#141822", borderRadius: 8, padding: 16, border: "1px solid " + (selectedNode.doc === "A" ? "#60a5fa30" : "#f59e4230") }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{
              ...mono11, fontSize: 14, fontWeight: 700,
              color: selectedNode.doc === "A" ? "#60a5fa" : "#f59e42",
            }}>{selectedNode.label}</span>
            <span style={{ ...mono9, color: "#3a4050" }}>
              {simLinks.length} similarity link{simLinks.length !== 1 ? "s" : ""} above threshold
            </span>
          </div>
          <div style={{ marginBottom: simLinks.length > 0 ? 14 : 0 }}>
            <ChunkContent
              text={selectedNode.doc === "A" ? chunksA[selectedNode.idx] : chunksB[selectedNode.idx]}
              maxLen={800} fontSize={12.5} maxHeight={300}
            />
          </div>
          {simLinks.length > 0 && (
            <div>
              <div style={{ ...mono9, color: "#4a5568", letterSpacing: 1, marginBottom: 10 }}>CONNECTED BY SIMILARITY</div>
              {simLinks.map((l, idx) => {
                var srcId = typeof l.source === "string" ? l.source : l.source.id;
                var tgtId = typeof l.target === "string" ? l.target : l.target.id;
                var otherId = srcId === selectedNode.id ? tgtId : srcId;
                var otherDoc = otherId.charAt(0);
                var otherIdx = parseInt(otherId.slice(1), 10) - 1;
                var otherText = otherDoc === "A" ? chunksA[otherIdx] : chunksB[otherIdx];
                var selText = selectedNode.doc === "A" ? chunksA[selectedNode.idx] : chunksB[selectedNode.idx];
                var selColor = selectedNode.doc === "A" ? "#60a5fa" : "#f59e42";
                var otherColor = otherDoc === "A" ? "#60a5fa" : "#f59e42";
                return (
                  <div key={idx} style={{
                    marginBottom: 10, background: "#0c0e16", borderRadius: 8,
                    border: "1px solid #1e2230", overflow: "hidden",
                  }}>
                    {/* Header bar */}
                    <div style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",
                      borderBottom: "1px solid #1e2230", background: "#0e1018",
                    }}>
                      <span style={{ ...mono11, padding: "2px 8px", borderRadius: 4, color: selColor, background: selColor + "12" }}>
                        {selectedNode.label}
                      </span>
                      <span style={{ color: "#3a4050", fontSize: 12 }}>{"\u27F7"}</span>
                      <span style={{ ...mono11, padding: "2px 8px", borderRadius: 4, color: otherColor, background: otherColor + "12" }}>
                        {otherId}
                      </span>
                      <span style={{ ...mono11, color: "#f0c040", fontWeight: 700 }}>
                        {(l.score * 100).toFixed(1)}%
                      </span>
                      {l.interp && (
                        <span style={{ ...mono9, color: "#818cf8", background: "#818cf812", padding: "2px 6px", borderRadius: 3 }}>
                          {"\u{1F9E0}"} interpreted
                        </span>
                      )}
                    </div>
                    {/* Side-by-side chunks */}
                    <div style={{ display: "flex", gap: 1 }}>
                      <div style={{ flex: "1 1 50%", minWidth: 0, padding: 10, borderRight: "1px solid #1e2230", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: selColor, marginBottom: 4, letterSpacing: 1 }}>{selectedNode.label}</div>
                        <ChunkContent text={selText} maxLen={400} fontSize={11} maxHeight={200} />
                      </div>
                      <div style={{ flex: "1 1 50%", minWidth: 0, padding: 10, overflow: "hidden" }}>
                        <div style={{ ...mono9, color: otherColor, marginBottom: 4, letterSpacing: 1 }}>{otherId}</div>
                        <ChunkContent text={otherText} maxLen={400} fontSize={11} maxHeight={200} />
                      </div>
                    </div>
                    {/* Interpretation */}
                    {l.interp && (
                      <div style={{ padding: "8px 12px", borderTop: "1px solid #1e2230", background: "#0e1018" }}>
                        <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1, marginBottom: 4 }}>{"\u{1F9E0}"} INTERPRETATION</div>
                        <div style={{ fontFamily: "'IBM Plex Serif', serif", fontSize: 12, color: "#9ca3af", lineHeight: 1.7 }}>{l.interp}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [textA, setTextA] = useState("");
  const [textB, setTextB] = useState("");
  const [results, setResults] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [selectedCell, setSelectedCell] = useState(null);
  const [expandedMatch, setExpandedMatch] = useState(0);
  const [tab, setTab] = useState("heatmap");
  const [chunkMode, setChunkMode] = useState("512");
  const [macroSize, setMacroSize] = useState(2048);
  const [microSize, setMicroSize] = useState(256);
  const [ollamaUrl, setOllamaUrl] = useState("http://localhost:11434");
  const [ollamaModel, setOllamaModel] = useState("gpt-oss:20b");
  const [interpretations, setInterpretations] = useState({});
  const [interpStatus, setInterpStatus] = useState({});
  const [batchInterpreting, setBatchInterpreting] = useState(false);
  const abortRef = useRef(null);

  const canRun = textA.trim().length > 20 && textB.trim().length > 20;

  const analyze = useCallback(() => {
    setProcessing(true); setResults(null); setSelectedCell(null);
    setExpandedMatch(0); setInterpretations({}); setInterpStatus({});
    setTimeout(() => {
      try {
        const cA = chunkDocument(textA, chunkMode, macroSize);
        const cB = chunkDocument(textB, chunkMode, macroSize);
        const { matrix, vocab } = computeSimilarityMatrix(cA, cB);
        const pairs = [];
        for (let i = 0; i < matrix.length; i++)
          for (let j = 0; j < matrix[0].length; j++)
            pairs.push({ i, j, score: matrix[i][j] });
        pairs.sort((a, b) => b.score - a.score);
        const scores = pairs.map(p => p.score);
        setResults({
          chunksA: cA, chunksB: cB, matrix, pairs, vocabSize: vocab.length,
          stats: { avg: scores.reduce((a,b) => a+b, 0)/scores.length, max: scores[0], highCount: scores.filter(s => s > 0.3).length },
        });
      } catch (err) { console.error(err); }
      setProcessing(false);
    }, 50);
  }, [textA, textB, chunkMode, macroSize]);

  const interpretPair = useCallback(async (i, j, score, cA, cB) => {
    const k = i+"-"+j;
    setInterpStatus(p => ({ ...p, [k]: "loading" }));
    try {
      const r = await queryOllama(ollamaUrl, ollamaModel, cA, cB, score);
      setInterpretations(p => ({ ...p, [k]: r }));
      setInterpStatus(p => ({ ...p, [k]: "done" }));
    } catch (err) { setInterpStatus(p => ({ ...p, [k]: "error" })); }
  }, [ollamaUrl, ollamaModel]);

  const batchInterpret = useCallback(async (count, minScore) => {
    if (!results) return;
    setBatchInterpreting(true);
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    // If minScore is set, interpret all pairs at or above that threshold
    // Otherwise, interpret top N by count
    const targets = minScore != null
      ? results.pairs.filter(m => m.score >= minScore)
      : results.pairs.slice(0, count);
    for (const m of targets) {
      if (ctrl.signal.aborted) break;
      const k = m.i+"-"+m.j;
      if (interpretations[k]) continue;
      setInterpStatus(p => ({ ...p, [k]: "loading" }));
      try {
        const r = await queryOllama(ollamaUrl, ollamaModel, results.chunksA[m.i], results.chunksB[m.j], m.score, ctrl.signal);
        setInterpretations(p => ({ ...p, [k]: r }));
        setInterpStatus(p => ({ ...p, [k]: "done" }));
      } catch (err) {
        if (err.name === "AbortError") break;
        setInterpStatus(p => ({ ...p, [k]: "error" }));
      }
    }
    setBatchInterpreting(false);
  }, [results, ollamaUrl, ollamaModel, interpretations]);

  const topMatches = results ? results.pairs.slice(0, 20) : [];
  const pairsAbove30 = results ? results.pairs.filter(p => p.score >= 0.3).length : 0;
  const interpretedCount = Object.values(interpStatus).filter(s => s === "done").length;

  const actBtn = (on, accent="#818cf8") => ({
    ...mono10, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase",
    background: on ? accent+"20" : "#141822", border: "1px solid "+(on ? accent+"50" : "#1e2230"),
    color: on ? accent : "#4a5568", borderRadius: 5, padding: "7px 16px",
    cursor: on ? "pointer" : "not-allowed", transition: "all 0.2s",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#0a0c12", color: "#c8ccd4", padding: "24px 20px", fontFamily: "'IBM Plex Sans', system-ui, sans-serif" }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>

        <div style={{ marginBottom: 32 }}>
          <div style={{ ...mono10, letterSpacing: 3, color: "#f59e42", textTransform: "uppercase", marginBottom: 4 }}>VECTOR ANALYSIS</div>
          <h1 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 28, fontWeight: 300, color: "#e8ecf4", margin: 0, letterSpacing: -0.5 }}>Tuo</h1>
          <p style={{ ...mono10, color: "#3a4050", marginTop: 6 }}>
            TF-IDF embeddings {"\u00B7"} cosine similarity {"\u00B7"} Ollama LLM interpretation {"\u00B7"} CSV + HTML export
          </p>
        </div>

        <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
          <FileUpload label="Document A" color="#60a5fa" onTextLoad={setTextA} text={textA} />
          <FileUpload label="Document B" color="#f59e42" onTextLoad={setTextB} text={textB} />
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <label style={{ ...mono10, color: "#4a5568", letterSpacing: 1 }}>CHUNKS</label>
            <select value={chunkMode} onChange={e => setChunkMode(e.target.value)}
              style={{ background: "#141822", border: "1px solid #1e2230", color: "#9ca3af", borderRadius: 4, padding: "4px 8px", ...mono11, cursor: "pointer", outline: "none" }}>
              <option value="macro">Macro (drill-down)</option>
              <option value="row">Row / Paragraph</option>
              <option value="256">256 tok</option>
              <option value="512">512 tok</option>
              <option value="768">768 tok</option>
              <option value="1024">1024 tok</option>
            </select>
          </div>
          {chunkMode === "macro" && (
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <label style={{ ...mono9, color: "#34d399", letterSpacing: 1 }}>MACRO</label>
                <select value={macroSize} onChange={e => setMacroSize(Number(e.target.value))}
                  style={{ background: "#141822", border: "1px solid #34d39930", color: "#34d399", borderRadius: 4, padding: "3px 6px", ...mono10, cursor: "pointer", outline: "none" }}>
                  <option value={1024}>1024</option>
                  <option value={1536}>1536</option>
                  <option value={2048}>2048</option>
                  <option value={3072}>3072</option>
                  <option value={4096}>4096</option>
                </select>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <label style={{ ...mono9, color: "#818cf8", letterSpacing: 1 }}>MICRO</label>
                <select value={microSize} onChange={e => setMicroSize(Number(e.target.value))}
                  style={{ background: "#141822", border: "1px solid #818cf830", color: "#818cf8", borderRadius: 4, padding: "3px 6px", ...mono10, cursor: "pointer", outline: "none" }}>
                  <option value={128}>128</option>
                  <option value={256}>256</option>
                  <option value={384}>384</option>
                  <option value={512}>512</option>
                </select>
              </div>
            </div>
          )}
          <button onClick={analyze} disabled={!canRun || processing} style={{
            ...mono11, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase",
            background: canRun && !processing ? "linear-gradient(135deg, #f59e42, #f0c040)" : "#1a1e28",
            color: canRun && !processing ? "#0a0c12" : "#3a4050",
            border: "none", borderRadius: 6, padding: "10px 28px",
            cursor: canRun && !processing ? "pointer" : "not-allowed", transition: "all 0.2s",
          }}>{processing ? "\u27F3 Computing\u2026" : "\u25B6 Analyze"}</button>
        </div>

        <div style={{
          display: "flex", alignItems: "center", gap: 10, marginBottom: 32, flexWrap: "wrap",
          background: "#0e1018", borderRadius: 8, padding: "10px 14px", border: "1px solid #1e2230",
        }}>
          <div style={{ ...mono9, color: "#818cf8", letterSpacing: 1, marginRight: 4 }}>{"\u{1F9E0}"} OLLAMA</div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ ...mono9, color: "#3a4050" }}>URL</label>
            <input value={ollamaUrl} onChange={e => setOllamaUrl(e.target.value)} style={{
              background: "#141822", border: "1px solid #1e2230", color: "#9ca3af",
              borderRadius: 4, padding: "4px 8px", ...mono10, outline: "none", width: 200,
            }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ ...mono9, color: "#3a4050" }}>MODEL</label>
            <input value={ollamaModel} onChange={e => setOllamaModel(e.target.value)} style={{
              background: "#141822", border: "1px solid #1e2230", color: "#9ca3af",
              borderRadius: 4, padding: "4px 8px", ...mono10, outline: "none", width: 140,
            }} />
          </div>
          {results && !batchInterpreting && <>
            <button onClick={() => batchInterpret(10)} style={actBtn(true)}>{"\u25B6"} Top 10</button>
            <button onClick={() => batchInterpret(20)} style={actBtn(true)}>{"\u25B6"} Top 20</button>
            <button onClick={() => batchInterpret(null, 0.3)} style={actBtn(true, "#34d399")}>
              {"\u25B6"} All {"\u2265"}30% ({pairsAbove30})
            </button>
          </>}
          {batchInterpreting && <>
            <button onClick={() => { if(abortRef.current) abortRef.current.abort(); setBatchInterpreting(false); }} style={actBtn(true, "#f87171")}>{"\u25A0"} Stop</button>
            <span style={{ ...mono9, color: "#818cf8", animation: "pulse 1.2s infinite" }}>{interpretedCount} done</span>
          </>}
        </div>

        {results && (
          <div>
            <div style={{ display: "flex", gap: 1, marginBottom: 24, borderRadius: 8, overflow: "hidden" }}>
              {[
                { l: "CHUNKS A", v: results.chunksA.length, c: "#60a5fa" },
                { l: "CHUNKS B", v: results.chunksB.length, c: "#f59e42" },
                { l: "VOCAB", v: results.vocabSize.toLocaleString(), c: "#818cf8" },
                { l: "AVG SIM", v: (results.stats.avg*100).toFixed(1)+"%", c: "#34d399" },
                { l: "MAX SIM", v: (results.stats.max*100).toFixed(1)+"%", c: "#f0c040" },
                { l: "INTERPRETED", v: interpretedCount, c: "#818cf8" },
              ].map(s => (
                <div key={s.l} style={{ flex: 1, background: "#0e1018", padding: "14px 12px", textAlign: "center" }}>
                  <div style={{ ...mono9, color: "#3a4050", letterSpacing: 1, marginBottom: 4 }}>{s.l}</div>
                  <div style={{ ...mono11, fontSize: 18, color: s.c, fontWeight: 700 }}>{s.v}</div>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #1e2230", marginBottom: 20 }}>
              <div style={{ display: "flex" }}>
                {["heatmap", "matches", "documents", "graph", "distribution"].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{
                    ...mono11, letterSpacing: 1, textTransform: "uppercase",
                    background: "none", border: "none",
                    color: tab === t ? "#f0c040" : "#4a5568",
                    borderBottom: tab === t ? "2px solid #f0c040" : "2px solid transparent",
                    padding: "10px 20px", cursor: "pointer", transition: "all 0.15s",
                  }}>{t}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => exportCSV(results, interpretations)} style={{
                  ...mono10, fontWeight: 600, background: "#34d39918", border: "1px solid #34d39940",
                  color: "#34d399", borderRadius: 5, padding: "6px 16px", cursor: "pointer", marginBottom: 4,
                }}>{"\u2913"} CSV</button>
                <button onClick={() => exportHTML(results, interpretations)} style={{
                  ...mono10, fontWeight: 600, background: "#60a5fa18", border: "1px solid #60a5fa40",
                  color: "#60a5fa", borderRadius: 5, padding: "6px 16px", cursor: "pointer", marginBottom: 4,
                }}>{"\u2913"} HTML Report</button>
              </div>
            </div>

            {tab === "heatmap" && (
              <FullscreenPanel label="SIMILARITY HEATMAP">
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 12 }}>SIMILARITY MATRIX {"\u00B7"} click any cell for details</div>
                <Heatmap matrix={results.matrix} chunksA={results.chunksA} chunksB={results.chunksB} onCellClick={setSelectedCell} selectedCell={selectedCell} />
                {selectedCell && (
                  <div style={{ marginTop: 16, background: "#141822", borderRadius: 8, padding: 16, border: "1px solid #f0c04020" }}>
                    <div style={{ ...mono11, color: "#f0c040", marginBottom: 12 }}>
                      A{selectedCell[0]+1} {"\u27F7"} B{selectedCell[1]+1} {"\u00B7"} {(results.matrix[selectedCell[0]][selectedCell[1]]*100).toFixed(1)}%
                    </div>
                    <div style={{ display: "flex", gap: 12 }}>
                      <div style={{ flex: "1 1 50%", minWidth: 0, borderLeft: "3px solid #60a5fa20", padding: "8px 12px", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: "#60a5fa", marginBottom: 6 }}>DOC A {"\u00B7"} CHUNK {selectedCell[0]+1}</div>
                        <ChunkContent text={results.chunksA[selectedCell[0]]} maxLen={400} fontSize={12} />
                      </div>
                      <div style={{ flex: "1 1 50%", minWidth: 0, borderLeft: "3px solid #f59e4220", padding: "8px 12px", overflow: "hidden" }}>
                        <div style={{ ...mono9, color: "#f59e42", marginBottom: 6 }}>DOC B {"\u00B7"} CHUNK {selectedCell[1]+1}</div>
                        <ChunkContent text={results.chunksB[selectedCell[1]]} maxLen={400} fontSize={12} />
                      </div>
                    </div>
                  </div>
                )}
              </div>
              </FullscreenPanel>
            )}

            {tab === "matches" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 4 }}>TOP {topMatches.length} MATCHES {"\u00B7"} click to expand</div>
                {topMatches.map((m, idx) => {
                  const k = m.i+"-"+m.j;
                  return (
                    <MatchCard key={k} rank={idx+1} i={m.i} j={m.j} score={m.score}
                      chunkA={results.chunksA[m.i]} chunkB={results.chunksB[m.j]}
                      isExpanded={expandedMatch === idx}
                      onToggle={() => setExpandedMatch(expandedMatch === idx ? -1 : idx)}
                      interpretation={interpretations[k]} interpStatus={interpStatus[k]}
                      onInterpret={() => interpretPair(m.i, m.j, m.score, results.chunksA[m.i], results.chunksB[m.j])}
                      isMacro={chunkMode === "macro"}
                      microSize={microSize}
                    />
                  );
                })}
              </div>
            )}

            {tab === "documents" && (
              <FullscreenPanel label="DOCUMENT VIEW">
              <DocumentView
                chunksA={results.chunksA}
                chunksB={results.chunksB}
                matrix={results.matrix}
                interpretations={interpretations}
              />
              </FullscreenPanel>
            )}

            {tab === "graph" && (
              <FullscreenPanel label="CHUNK GRAPH">
              <GraphView
                chunksA={results.chunksA}
                chunksB={results.chunksB}
                matrix={results.matrix}
                interpretations={interpretations}
              />
              </FullscreenPanel>
            )}

            {tab === "distribution" && (
              <div style={{ background: "#0e1018", borderRadius: 10, padding: 20 }}>
                <div style={{ ...mono10, color: "#4a5568", marginBottom: 16 }}>SIMILARITY SCORE DISTRIBUTION</div>
                <DistributionChart pairs={results.pairs} />
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
